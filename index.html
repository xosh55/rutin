var CAL_CATS={training:{l:"Träning",c:T.danger},peptide:{l:"Peptider",c:T.accent},business:{l:"Företag",c:T.accent2},private:{l:"Privat",c:T.pin},health:{l:"Hälsa",c:T.success}};
var PRIO_C={"high":"#ff6b6b","medium":"#fdcb6e","low":"#00b894"};
var PRIO_L={"high":"🔴","medium":"🟡","low":"🟢"};

function TabCalendar({calData,saveCal}){
  var cal=calData||{events:[],tasks:[]};
  const[view,setView]=useState("day");
  const[selDate,setSelDate]=useState(new Date());
  const[addMode,setAddMode]=useState(null);
  const[selEvent,setSelEvent]=useState(null);

  var events=cal.events||[],tasks=cal.tasks||[];
  var sd=dk(selDate),dow=selDate.getDay();

  // Auto-events
  var autoEvents=[];
  // MMA
  if([1,3,5].includes(dow))autoEvents.push({id:"auto-mma",name:"MMA",time:"17:30",duration:60,category:"training",auto:true});
  if([2,4].includes(dow))autoEvents.push({id:"auto-mma",name:"Muay Thai",time:"19:00",duration:90,category:"training",auto:true});
  if(dow===6)autoEvents.push({id:"auto-mma",name:"MMA / Sparring",time:"12:00",duration:60,category:"training",auto:true});
  // Gym
  var gymNames=["Bröst + sido-delts","Rygg + biceps lätt","Ben + axlar","Armar + MMA-core","Rygg + biceps tungt","Axlar + triceps","BB svaga punkter"];
  if(dow!==0)autoEvents.push({id:"auto-gym",name:"Gym: "+gymNames[dow],time:dow===0?"10:00":[2,4].includes(dow)?"17:00":"18:30",duration:[1,3,5].includes(dow)?30:60,category:"training",auto:true});
  // Kreditbetalning
  if(dow===0)autoEvents.push({id:"auto-credit",name:"Kreditbetalning",time:"12:00",category:"business",auto:true});
  // Lönedag
  if(selDate.getDate()===25)autoEvents.push({id:"auto-salary",name:"Lönedag",category:"private",auto:true,allDay:true});
  // Budget reset
  if(selDate.getDate()===25)autoEvents.push({id:"auto-budget",name:"Budget-reset (rörlig)",category:"private",auto:true,allDay:true});
  // Peptid-events från PLAN_DATA
  PLAN_DATA.forEach(function(p){
    if(p.start&&dk(selDate)===p.start)autoEvents.push({id:"auto-pep-start-"+p.id,name:p.name+" — START",category:"health",auto:true,allDay:true});
    if(p.end&&dk(selDate)===p.end)autoEvents.push({id:"auto-pep-end-"+p.id,name:p.name+" — SLUT",category:"health",auto:true,allDay:true});
    if(p.pauses)p.pauses.forEach(function(pa){
      if(dk(selDate)===pa.from)autoEvents.push({id:"auto-pep-pause-"+p.id,name:p.name+" — PAUS START",category:"health",auto:true,allDay:true});
      if(dk(selDate)===pa.to)autoEvents.push({id:"auto-pep-resume-"+p.id,name:p.name+" — RESTART",category:"health",auto:true,allDay:true});
    });
  });

  // Recurring events
  function matchesRecurring(ev,date){
    if(!ev.recurring&&!ev.specificDays)return false;
    var start=new Date(ev.date+"T12:00"),d=new Date(date+"T12:00");
    if(d<start)return false;
    if(ev.specificDays&&ev.specificDays.length>0)return ev.specificDays.includes(d.getDay());
    var r=ev.recurring;
    if(r==="daily")return true;
    if(r==="weekly"){return d.getDay()===start.getDay()}
    if(r==="biweekly"){var diff=Math.round((d-start)/86400000);return diff%14===0}
    if(r==="monthly"){return d.getDate()===start.getDate()}
    return false;
  }
  var recurringEvents=events.filter(function(e){return(e.recurring||e.specificDays)&&e.date!==sd&&matchesRecurring(e,sd)}).map(function(e){return{...e,isRecurring:true}});

  var dayEvents=events.filter(function(e){return e.date===sd}).concat(autoEvents).concat(recurringEvents);
  var dayTasks=tasks.filter(function(t){return t.date===sd});

  const[conflict,setConflict]=useState(null);

  function checkConflict(ev){
    if(!ev.time)return null;
    var p=ev.time.split(':').map(Number),eStart=p[0]*60+p[1],eEnd=eStart+(ev.duration||30);
    var all=dayEvents.filter(function(e){return e.time});
    for(var i=0;i<all.length;i++){
      var a=all[i],ap=a.time.split(':').map(Number),aStart=ap[0]*60+ap[1],aEnd=aStart+(a.duration||30);
      if(eStart<aEnd&&eEnd>aStart)return a.name;
    }
    return null;
  }
  function addEvent(ev){var c=checkConflict(ev);if(c){setConflict({ev:ev,with:c})}else{saveCal({...cal,events:[...events,{id:uid(),...ev,date:sd}]});setAddMode(null)}}
  function forceAddEvent(ev){saveCal({...cal,events:[...events,{id:uid(),...ev,date:sd}]});setAddMode(null);setConflict(null)}
  function addTask(t){saveCal({...cal,tasks:[...tasks,{id:uid(),...t,date:sd,done:false}]});setAddMode(null)}
  function toggleTask(id){saveCal({...cal,tasks:tasks.map(function(t){return t.id===id?{...t,done:!t.done}:t})})}
  function rmEvent(id){saveCal({...cal,events:events.filter(function(e){return e.id!==id})});setSelEvent(null)}
  function rmTask(id){saveCal({...cal,tasks:tasks.filter(function(t){return t.id!==id})})}

  function eventsOnDate(d){var k=dk(d);var count=events.filter(function(e){return e.date===k}).length;var dow2=d.getDay();if([1,2,3,4,5,6].includes(dow2))count++;if([1,2,3,4,5,6].includes(dow2))count++;return count}
  function tasksOnDate(d){return tasks.filter(function(t){return t.date===dk(d)}).length}

  // Buffer: add 10 min to all events
  function displayTime(ev){if(!ev.time)return"Heldag";var t=ev.time;if(ev.buffer&&ev.duration){var mins=parseInt(t.split(":")[0])*60+parseInt(t.split(":")[1])-10;var h=Math.floor(mins/60);var m=mins%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+" (var där)"+" → "+t+" start"}return t+(ev.duration?" · "+ev.duration+"min":"")}

  return(<div style={{padding:"14px 18px 100px",animation:"fi .2s ease-out"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:20,fontWeight:800}}>Kalender</div>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <button onClick={function(){try{if('Notification' in window){if(Notification.permission==='default')Notification.requestPermission();else if(Notification.permission==='granted')new Notification('KM Stack',{body:'Notiser aktiva ✓'})}}catch(e){}}} style={{background:"none",border:"none",cursor:"pointer",padding:4,opacity:(function(){try{return typeof Notification!=='undefined'&&Notification.permission==='granted'?1:0.3}catch(e){return 0.3}})()}}>
          <span style={{fontSize:14}}>🔔</span>
        </button>
      <div style={{display:"flex",gap:3}}>
        {[{k:"day",l:"Dag"},{k:"timeline",l:"Live"},{k:"week",l:"Vecka"},{k:"month",l:"Månad"}].map(function(v){return <button key={v.k} onClick={function(){setView(v.k)}} style={{padding:"5px 8px",borderRadius:6,border:view===v.k?"1px solid "+T.accent:"1px solid "+T.border,background:view===v.k?T.accent+"15":"transparent",color:view===v.k?T.accent:T.muted,fontSize:9,fontWeight:600,cursor:"pointer"}}>{v.l}</button>})}
      </div>
    </div>

    {/* DAG-NAVIGERING */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={function(){var n=new Date(selDate);n.setDate(n.getDate()-1);setSelDate(n)}} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"6px 10px",cursor:"pointer"}}><Ic n="chevL" s={16} c={T.text}/></button>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:16,fontWeight:700}}>{DAYS_FULL[dow]}</div>
        <div style={{fontSize:11,color:T.muted}}>{selDate.getDate()+" "+MONTHS_FULL[selDate.getMonth()]+" "+selDate.getFullYear()}</div>
      </div>
      <button onClick={function(){var n=new Date(selDate);n.setDate(n.getDate()+1);setSelDate(n)}} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"6px 10px",cursor:"pointer"}}><Ic n="chevR" s={16} c={T.text}/></button>
    </div>
    <div style={{display:"flex",justifyContent:"center",marginBottom:14}}>
      <button onClick={function(){setSelDate(new Date())}} style={{padding:"4px 14px",borderRadius:6,border:"1px solid "+(dk(selDate)===dk(new Date())?T.accent:T.border),background:dk(selDate)===dk(new Date())?T.accent+"15":"transparent",color:dk(selDate)===dk(new Date())?T.accent:T.muted,fontSize:10,fontWeight:600,cursor:"pointer"}}>Idag</button>
    </div>

    {/* DAGVY — APPLE STYLE */}
    {view==="day"&&<div>
      {/* Tasks överst */}
      {dayTasks.length>0&&<div style={{marginBottom:10}}>
        {dayTasks.sort(function(a,b){var po={"high":0,"medium":1,"low":2};return(po[a.priority]||1)-(po[b.priority]||1)}).map(function(t){return <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:T.card,border:"1px solid "+(t.done?T.success+"22":T.border),borderRadius:8,marginBottom:2,opacity:t.done?0.4:1}}>
          <button onClick={function(){toggleTask(t.id)}} style={{width:18,height:18,borderRadius:4,border:t.done?"none":"2px solid "+T.border,background:t.done?T.success:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{t.done&&<Ic n="check" s={10} c="#fff"/>}</button>
          <span style={{fontSize:9,flexShrink:0}}>{PRIO_L[t.priority]||"🟡"}</span>
          <div style={{flex:1}}><div style={{fontSize:11,fontWeight:600,textDecoration:t.done?"line-through":"none"}}>{t.name}</div></div>
          <button onClick={function(){rmTask(t.id)}} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Ic n="trash" s={10} c={T.subtle}/></button>
        </div>})}
      </div>}

      {/* Timrutnät */}
      {(function(){var startH=6,endH=23,now=new Date(),nowH=now.getHours(),nowMin=now.getMinutes(),isToday=dk(selDate)===dk(new Date());
        var hours=[];for(var h=startH;h<=endH;h++)hours.push(h);
        var tEvents=dayEvents.filter(function(e){return e.time}).map(function(e){
          var p=e.time.split(":").map(Number);
          return{...e,startM:p[0]*60+p[1],endM:p[0]*60+p[1]+(e.duration||30)}
        });
        var HOUR_H=56;
        return <div style={{position:"relative",marginBottom:14}}>
          {hours.map(function(h){
            var hEvents=tEvents.filter(function(e){return e.startM<(h+1)*60&&e.endM>h*60});
            return <div key={h} style={{display:"flex",minHeight:HOUR_H,borderBottom:"1px solid "+T.border+"44"}}>
              <div style={{width:40,flexShrink:0,paddingTop:2,textAlign:"right",paddingRight:8}}>
                <span style={{fontSize:9,fontWeight:600,fontFamily:"'JetBrains Mono'",color:T.subtle}}>{String(h).padStart(2,"0")}:00</span>
              </div>
              <div style={{flex:1,position:"relative",minHeight:HOUR_H}}>
                {hEvents.map(function(ev){
                  var top=Math.max(0,(ev.startM-h*60)/60)*HOUR_H;
                  var height=Math.min(HOUR_H,((Math.min(ev.endM,(h+1)*60)-Math.max(ev.startM,h*60))/60)*HOUR_H);
                  var cc=CAL_CATS[ev.category]||{c:T.muted};
                  if(ev.startM>=h*60&&ev.startM<(h+1)*60)return <div key={ev.id} onClick={function(){if(!ev.auto)setSelEvent(ev)}} style={{position:"absolute",top:top,left:2,right:2,minHeight:Math.max(24,height),background:cc.c+"20",border:"1px solid "+cc.c+"44",borderLeft:"3px solid "+cc.c,borderRadius:6,padding:"3px 6px",cursor:ev.auto?"default":"pointer",overflow:"hidden",zIndex:2}}>
                    <div style={{fontSize:10,fontWeight:700,color:cc.c,lineHeight:1.2}}>{ev.name}</div>
                    <div style={{fontSize:8,color:T.subtle}}>{ev.time}{ev.duration?" · "+ev.duration+"m":""}{ev.place?" · "+ev.place:""}</div>
                    {ev.auto&&<span style={{fontSize:7,color:T.subtle}}>AUTO</span>}
                  </div>;
                  return null;
                })}
              </div>
            </div>
          })}
          {/* Nu-linje */}
          {isToday&&nowH>=startH&&nowH<=endH&&<div style={{position:"absolute",left:40,right:0,top:((nowH-startH)*60+nowMin)/60*HOUR_H,zIndex:5,pointerEvents:"none"}}>
            <div style={{display:"flex",alignItems:"center"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:T.danger,marginLeft:-4}}/>
              <div style={{flex:1,height:2,background:T.danger}}/>
            </div>
          </div>}
        </div>
      })()}

      {/* Add buttons */}
      <div style={{display:"flex",gap:4}}>
        <button onClick={function(){setAddMode("event")}} style={{flex:1,padding:10,borderRadius:8,border:"1px dashed "+T.accent,background:T.accent+"08",color:T.accent,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Event</button>
        <button onClick={function(){setAddMode("task")}} style={{flex:1,padding:10,borderRadius:8,border:"1px dashed "+T.accent2,background:T.accent2+"08",color:T.accent2,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Task</button>
      </div>
      {addMode==="event"&&<CalEventForm onSave={addEvent} onClose={function(){setAddMode(null)}}/>}
      {addMode==="task"&&<CalTaskForm onSave={addTask} onClose={function(){setAddMode(null)}}/>}

      {selEvent&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={function(){setSelEvent(null)}}>
        <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:20,width:"100%",maxWidth:340,animation:"fi .1s ease-out"}} onClick={function(e){e.stopPropagation()}}>
          <div style={{fontSize:16,fontWeight:800,marginBottom:4}}>{selEvent.name}</div>
          <div style={{fontSize:11,color:T.muted,marginBottom:4}}>{displayTime(selEvent)}</div>
          {selEvent.place&&<div style={{fontSize:11,color:T.accent2,marginBottom:4}}>📍 {selEvent.place}</div>}
          {selEvent.note&&<div style={{fontSize:11,color:T.text,marginBottom:10}}>{selEvent.note}</div>}
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){rmEvent(selEvent.id)}} style={{flex:1,padding:10,borderRadius:8,border:"1px solid "+T.danger,background:T.danger+"0d",color:T.danger,fontSize:12,fontWeight:600,cursor:"pointer"}}>Radera</button>
            <button onClick={function(){setSelEvent(null)}} style={{flex:1,padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>Stäng</button>
          </div>
        </div>
      </div>}
      {conflict&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:20}} onClick={function(){setConflict(null)}}>
        <div style={{background:T.card,border:"1px solid "+T.warning+"44",borderRadius:14,padding:20,width:"100%",maxWidth:340,animation:"fi .1s ease-out"}} onClick={function(e){e.stopPropagation()}}>
          <div style={{fontSize:14,fontWeight:800,color:T.warning,marginBottom:8}}>⚠️ Konflikt</div>
          <div style={{fontSize:12,color:T.text,marginBottom:4}}><strong>{conflict.ev.name}</strong> krockar med <strong>{conflict.with}</strong></div>
          <div style={{display:"flex",gap:6,marginTop:10}}>
            <button onClick={function(){setConflict(null)}} style={{flex:1,padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>Avbryt</button>
            <button onClick={function(){forceAddEvent(conflict.ev)}} style={{flex:1,padding:10,borderRadius:8,border:"none",background:T.warning,color:"#000",fontSize:12,fontWeight:700,cursor:"pointer"}}>Boka ändå</button>
          </div>
        </div>
      </div>}
    </div>}

    {/* TIDSLINJE — LEVANDE */}
    {view==="timeline"&&<div>
      {/* Nästa upp */}
      {(function(){var now=new Date(),nowM=now.getHours()*60+now.getMinutes();var isToday=dk(selDate)===dk(new Date());
        if(!isToday)return null;
        var upcoming=dayEvents.filter(function(e){if(!e.time)return false;var p=e.time.split(":").map(Number);return p[0]*60+p[1]>nowM}).sort(function(a,b){return a.time.localeCompare(b.time)});
        if(!upcoming.length)return null;
        var next=upcoming[0],np=next.time.split(":").map(Number),nextM=np[0]*60+np[1];
        var diff=nextM-nowM,bufferM=nextM-10;
        var bH=Math.floor(bufferM/60),bMi=bufferM%60;
        var cc=CAL_CATS[next.category]||{c:T.accent};
        return <div style={{background:"linear-gradient(135deg,"+cc.c+"18,"+cc.c+"08)",border:"1px solid "+cc.c+"33",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:10,color:T.muted}}>NÄSTA UPP</div>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"'JetBrains Mono'",color:diff<=30?T.danger:cc.c}}>{diff>60?Math.floor(diff/60)+"h "+diff%60+"min":diff+"min"}</div>
          </div>
          <div style={{fontSize:16,fontWeight:800,color:T.text}}>{next.name}</div>
          <div style={{fontSize:11,color:T.subtle,marginTop:2}}>{next.time}{next.place?" · 📍 "+next.place:""}{next.duration?" · "+next.duration+"min":""}</div>
          <div style={{fontSize:10,color:cc.c,marginTop:4}}>Var där {String(bH).padStart(2,"0")+":"+String(bMi).padStart(2,"0")} (10 min buffert)</div>
        </div>
      })()}

      {/* Tasks överst */}
      {dayTasks.length>0&&<div style={{marginBottom:12}}>
        {dayTasks.sort(function(a,b){var po={"high":0,"medium":1,"low":2};return(po[a.priority]||1)-(po[b.priority]||1)}).map(function(t){return <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:T.card,border:"1px solid "+(t.done?T.success+"22":T.border),borderRadius:8,marginBottom:3,opacity:t.done?0.4:1}}>
          <button onClick={function(){toggleTask(t.id)}} style={{width:20,height:20,borderRadius:5,border:t.done?"none":"2px solid "+T.border,background:t.done?T.success:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{t.done&&<Ic n="check" s={12} c="#fff"/>}</button>
          <span style={{fontSize:10,flexShrink:0}}>{PRIO_L[t.priority]||"🟡"}</span>
          <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,textDecoration:t.done?"line-through":"none"}}>{t.name}</div>{t.time&&<div style={{fontSize:9,color:T.subtle}}>{t.time}</div>}</div>
          <button onClick={function(){rmTask(t.id)}} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Ic n="trash" s={12} c={T.subtle}/></button>
        </div>})}
      </div>}

      {/* Tidslinje */}
      {(function(){var now=new Date(),nowH=now.getHours(),nowMin=now.getMinutes(),nowM=nowH*60+nowMin;
        var isToday=dk(selDate)===dk(new Date());
        var allItems=dayEvents.filter(function(e){return e.time}).map(function(e){var p=e.time.split(":").map(Number);return{...e,mins:p[0]*60+p[1],isEvent:true}}).concat(
          dayTasks.filter(function(t){return t.time}).map(function(t){var p=t.time.split(":").map(Number);return{...t,mins:p[0]*60+p[1],isTask:true}})
        ).sort(function(a,b){return a.mins-b.mins});

        // Add heldag events
        var heldagEvents=dayEvents.filter(function(e){return!e.time});

        if(!allItems.length&&!heldagEvents.length&&!dayTasks.filter(function(t){return!t.time}).length)return <div style={{textAlign:"center",padding:30,color:T.subtle,fontSize:12}}>Ingen planerad</div>;

        return <div style={{position:"relative",paddingLeft:50}}>
          {/* Heldag events */}
          {heldagEvents.map(function(ev){var cc=CAL_CATS[ev.category]||{c:T.muted};return <div key={ev.id} style={{marginBottom:6,marginLeft:4,padding:"6px 10px",background:cc.c+"12",border:"1px solid "+cc.c+"33",borderRadius:8}}>
            <div style={{fontSize:11,fontWeight:600,color:cc.c}}>{ev.name}</div>
          </div>})}

          {/* Tidsblock */}
          {allItems.map(function(item,i){
            var h=Math.floor(item.mins/60),m=item.mins%60;
            var timeStr=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
            var isPast=isToday&&item.mins<nowM;
            var isCurrent=isToday&&item.mins<=nowM&&item.mins+(item.duration||30)>nowM;
            var cc=item.isTask?{c:PRIO_C[item.priority]||T.accent2}:CAL_CATS[item.category]||{c:T.muted};

            return <div key={item.id||i} style={{position:"relative",marginBottom:2}}>
              {/* "Du är här"-linje */}
              {isToday&&i>0&&allItems[i-1].mins<nowM&&item.mins>=nowM&&<div style={{position:"relative",margin:"8px 0",marginLeft:-50}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{fontSize:9,fontWeight:800,color:T.danger,width:44,textAlign:"right",fontFamily:"'JetBrains Mono'"}}>{String(nowH).padStart(2,"0")+":"+String(nowMin).padStart(2,"0")}</div>
                  <div style={{flex:1,height:2,background:T.danger,borderRadius:1}}/>
                </div>
                <div style={{position:"absolute",left:44,top:-4,width:10,height:10,borderRadius:"50%",background:T.danger}}/>
              </div>}

              <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <div style={{position:"absolute",left:-50,width:44,textAlign:"right",fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono'",color:isPast?T.subtle:isCurrent?T.danger:T.muted,paddingTop:8}}>{timeStr}</div>

  function inM(k){var p=k.split("-").map(Number);return p[0]===month.y&&p[1]-1===month.m}

  // Budget period expenses (for "kvar att spendera")
  var bpExp=0;for(var k in en)if(inBP(k))en[k].forEach(function(e){bpExp+=e.amount});

  // Month totals (for overview)
  var mExp=0,mIncFixed=0,mIncVar=0;
  for(var k in en)if(inM(k))en[k].forEach(function(e){mExp+=e.amount});
  for(var k in inc)if(inM(k))inc[k].forEach(function(e){if(e.type==="fast")mIncFixed+=e.amount;else mIncVar+=e.amount});
  var mInc=mIncFixed+mIncVar;
  var totalFx=fx.reduce(function(s,f){return s+f.amount},0);

  // Liquidity: base + all income - all expenses
  var allInc=0,allExp=0;
  for(var k in inc)inc[k].forEach(function(e){allInc+=e.amount});
  for(var k in en)en[k].forEach(function(e){allExp+=e.amount});
  var liquidity=baseLiq+allInc-allExp;

  function sv(n){saveEco(n)}
  function addExp(amt,note){var d=dk(new Date()),ne={...en};if(!ne[d])ne[d]=[];ne[d]=[{id:uid(),time:new Date().toTimeString().slice(0,5),amount:amt,note:note},...ne[d]];sv({...eco,entries:ne});setAddMode(null)}
  function addInc(amt,note,type){var d=dk(new Date()),ni={...inc};if(!ni[d])ni[d]=[];ni[d]=[{id:uid(),time:new Date().toTimeString().slice(0,5),amount:amt,note:note,type:type},...ni[d]];sv({...eco,income:ni});setAddMode(null)}
  function rmEntry(et,date,id){var obj={...(et==="exp"?en:inc)};obj[date]=obj[date].filter(function(x){return x.id!==id});if(!obj[date].length)delete obj[date];sv({...eco,[et==="exp"?"entries":"income"]:obj});setEditEntry(null)}
  function addSave(gid,amt){sv({...eco,savings:{...savings,goals:savings.goals.map(function(g){return g.id===gid?{...g,saved:g.saved+amt}:g})}})}
  function addGoal(n,t){sv({...eco,savings:{...savings,goals:[...savings.goals,{id:uid(),name:n,target:t,saved:0}]}})}
  function rmGoal(id){sv({...eco,savings:{...savings,goals:savings.goals.filter(function(g){return g.id!==id})}})}
  function addInvest(inv){sv({...eco,investments:[...investments,{id:uid(),date:dk(new Date()),status:"active",...inv}]})}
  function rmInvest(id){sv({...eco,investments:investments.filter(function(i){return i.id!==id})})}
  function sellInvest(id,actual){sv({...eco,investments:investments.map(function(i){return i.id===id?{...i,status:"sold",actualReturn:actual}:i})})}
  function renameGoal(id,name){sv({...eco,savings:{...savings,goals:savings.goals.map(function(g){return g.id===id?{...g,name:name}:g})}})}  function updFixed(list){sv({...eco,fixedExpenses:list})}
  function updBudget(v){sv({...eco,budget:{monthly:v}})}

  var MN=function(){return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
    <button onClick={function(){setMonth(function(p){return p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1}})}} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"6px 10px",cursor:"pointer",color:T.text}}><Ic n="chevL" s={16} c={T.text}/></button>
    <div style={{fontSize:15,fontWeight:700}}>{MONTHS_FULL[month.m]} {month.y}</div>
    <button onClick={function(){setMonth(function(p){return p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1}})}} style={{background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"6px 10px",cursor:"pointer",color:T.text}}><Ic n="chevR" s={16} c={T.text}/></button>
  </div>};

  return(<div style={{padding:"14px 18px 100px",animation:"fi .2s ease-out"}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>Ekonomi</div>
    <div style={{display:"flex",gap:3,marginBottom:14}}>
      {[{k:"daily",l:"Daglig"},{k:"overview",l:"Översikt"},{k:"savings",l:"Sparmål"}].map(function(s){return <button key={s.k} onClick={function(){setSub(s.k)}} style={{flex:1,padding:"7px 0",borderRadius:8,border:sub===s.k?"1px solid "+T.accent:"1px solid "+T.border,background:sub===s.k?"rgba(108,92,231,0.1)":T.card,color:sub===s.k?T.accent:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{s.l}</button>})}
    </div>

    {/* DAGLIG */}
    {sub==="daily"&&<div>
      {/* Likvida medel */}
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={function(){var v=prompt("Uppdatera likvida medel (kr):",liquidity);if(v&&!isNaN(v))sv({...eco,liquidity:Number(v)-allInc+allExp})}}>
        <div><div style={{fontSize:9,color:T.muted}}>Likvida medel</div><div style={{fontSize:22,fontWeight:900,fontFamily:"'JetBrains Mono'",color:T.accent2}}>{liquidity.toLocaleString("sv")} kr</div></div>
        <Ic n="edit" s={14} c={T.subtle}/>
      </div>

      {/* Kvar att spendera */}
      <div style={{background:"linear-gradient(135deg,rgba(108,92,231,0.12),rgba(0,206,201,0.08))",border:"1px solid rgba(108,92,231,0.2)",borderRadius:14,padding:"14px",textAlign:"center",marginBottom:12}}>
        <div style={{fontSize:10,color:T.muted}}>Kvar att spendera</div>
        <div style={{fontSize:26,fontWeight:900,fontFamily:"'JetBrains Mono'",color:cap-bpExp>=0?T.success:T.danger}}>{(cap-bpExp).toLocaleString("sv")} kr</div>
        <div style={{fontSize:9,color:T.subtle}}>av {cap.toLocaleString("sv")} · resetas {resetDay}:e varje mån</div>
        <div style={{height:4,background:T.surface,borderRadius:2,marginTop:6,overflow:"hidden"}}>
          <div style={{height:"100%",width:Math.min(100,bpExp/Math.max(cap,1)*100)+"%",background:cap-bpExp>=0?T.accent:T.danger,borderRadius:2}}/>
        </div>
      </div>

      {/* Dagssummering */}
      {(function(){var today=dk(new Date()),dI=0,dE=0;
        if(inc[today])inc[today].forEach(function(e){dI+=e.amount});
        if(en[today])en[today].forEach(function(e){dE+=e.amount});
        if(dI===0&&dE===0)return null;
        return <div style={{display:"flex",gap:6,marginBottom:12}}>
          {[{l:"In idag",v:"+"+dI.toLocaleString("sv"),c:T.success},{l:"Ut idag",v:"−"+dE.toLocaleString("sv"),c:T.danger},{l:"Netto",v:(dI-dE>=0?"+":"")+(dI-dE).toLocaleString("sv"),c:dI-dE>=0?T.accent2:T.danger}].map(function(c,i){return <div key={i} style={{flex:1,background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px 4px",textAlign:"center"}}>
            <div style={{fontSize:8,color:T.muted}}>{c.l}</div>
            <div style={{fontSize:13,fontWeight:800,fontFamily:"'JetBrains Mono'",color:c.c}}>{c.v}</div>
          </div>})}
        </div>
      })()}

      <div style={{display:"flex",gap:4,marginBottom:12}}>
        <button onClick={function(){setAddMode("inc")}} style={{flex:1,padding:12,borderRadius:10,border:"1px solid "+T.success+"44",background:T.success+"08",color:T.success,fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Inkomst</button>
        <button onClick={function(){setAddMode("exp")}} style={{flex:1,padding:12,borderRadius:10,border:"1px solid "+T.danger+"44",background:T.danger+"08",color:T.danger,fontSize:13,fontWeight:700,cursor:"pointer"}}>− Utgift</button>
      </div>

      {addMode==="inc"&&<div style={{background:T.card,border:"1px solid "+T.success+"33",borderRadius:12,padding:14,marginBottom:10,animation:"fi .15s ease-out"}}>
        <IncForm onSave={addInc} onClose={function(){setAddMode(null)}}/>
      </div>}
      {addMode==="exp"&&<div style={{background:T.card,border:"1px solid "+T.danger+"33",borderRadius:12,padding:14,marginBottom:10,animation:"fi .15s ease-out"}}>
        <ExpForm onSave={addExp} onClose={function(){setAddMode(null)}}/>
      </div>}

      {(function(){var today=dk(new Date()),all={};
        for(var k in en){if(inM(k)){if(!all[k])all[k]=[];en[k].forEach(function(e){all[k].push({...e,date:k,et:"exp"})})}}
        for(var k in inc){if(inM(k)){if(!all[k])all[k]=[];inc[k].forEach(function(e){all[k].push({...e,date:k,et:"inc"})})}}
        var days=Object.keys(all).sort().reverse();
        if(!days.length)return <div style={{textAlign:"center",padding:30,color:T.subtle,fontSize:12}}>Inga transaktioner</div>;
        return days.map(function(d){var items=all[d],dI=0,dE=0;items.forEach(function(e){if(e.et==="inc")dI+=e.amount;else dE+=e.amount});
          return <div key={d} style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:700,color:d===today?T.accent:T.text}}>{d===today?"Idag":new Date(d+"T12:00").toLocaleDateString("sv",{weekday:"short",day:"numeric",month:"short"})}</span>
              <span style={{fontSize:10,fontFamily:"'JetBrains Mono'"}}>{dI>0&&<span style={{color:T.success}}>+{dI.toLocaleString("sv")} </span>}{dE>0&&<span style={{color:T.danger}}>−{dE.toLocaleString("sv")}</span>}</span>
            </div>
            {items.sort(function(a,b){return(b.time||"").localeCompare(a.time||"")}).map(function(e){
              var isI=e.et==="inc";
              return <div key={e.id} onClick={function(){setEditEntry(e)}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:isI?T.success+"06":T.card,border:"1px solid "+(isI?T.success+"15":T.border),borderRadius:8,marginBottom:2,cursor:"pointer"}}>
                <div style={{width:4,height:22,borderRadius:2,background:isI?(e.type==="fast"?T.success:T.accent2):T.danger,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600}}>{e.note||(isI?(e.type==="fast"?"Lön":"Inkomst"):"Utgift")}</div>
                  <div style={{fontSize:9,color:T.subtle}}>{isI?(e.type==="fast"?"Fast":"Rörlig"):"Rörlig"}{e.time?" · "+e.time:""}</div>
                </div>
                <div style={{fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono'",color:isI?T.success:T.text}}>{isI?"+":"−"}{e.amount.toLocaleString("sv")}</div>
              </div>})}
          </div>})
      })()}
      <MN/>
      {editEntry&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={function(){setEditEntry(null)}}>
        <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:20,width:"100%",maxWidth:340,animation:"fi .1s ease-out"}} onClick={function(e){e.stopPropagation()}}>
          <div style={{fontSize:22,fontWeight:800,fontFamily:"'JetBrains Mono'",color:editEntry.et==="inc"?T.success:T.text}}>{editEntry.amount.toLocaleString("sv")} kr</div>
          <div style={{fontSize:11,color:T.muted,marginBottom:14}}>{editEntry.note||"—"} · {editEntry.time||""}</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){rmEntry(editEntry.et,editEntry.date,editEntry.id)}} style={{flex:1,padding:10,borderRadius:8,border:"1px solid "+T.danger,background:T.danger+"0d",color:T.danger,fontSize:12,fontWeight:600,cursor:"pointer"}}>Radera</button>
            <button onClick={function(){setEditEntry(null)}} style={{flex:1,padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>Stäng</button>
          </div>
        </div>
      </div>}
    </div>}

    {/* ÖVERSIKT */}
    {sub==="overview"&&<div>
      <MN/>
      {/* Inkomst vs Mål */}
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:700}}>Inkomst denna månad</span>
          <span style={{fontSize:16,fontWeight:800,fontFamily:"'JetBrains Mono'",color:mInc>=42000?T.success:T.accent2}}>{mInc.toLocaleString("sv")} kr</span>
        </div>
        <div style={{height:6,background:T.surface,borderRadius:3,overflow:"hidden",marginBottom:4}}>
          <div style={{height:"100%",width:Math.min(100,mInc/42000*100)+"%",background:mInc>=42000?"linear-gradient(90deg,"+T.success+","+T.accent2+")":T.accent,borderRadius:3}}/>
        </div>
        <div style={{fontSize:9,color:T.subtle}}>{Math.round(mInc/42000*100)}% av mål 42 000 kr{mInc>42000?" · Överskott: "+(mInc-42000).toLocaleString("sv")+" kr":""}</div>
      </div>

      {/* Fördelningsplan */}
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>Månadsfördelning</div>
        {[{n:"Fasta",a:13500,c:T.warning},{n:"Rörlig",a:cap,c:T.danger},{n:"Buffert → Semester",a:4500,c:T.accent},{n:"Krypto Cold Wallet",a:15000,c:T.accent2},{n:"Verksamhetskassa USDT",a:5000,c:"#f39c12"}].map(function(r){return <div key={r.n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid "+T.border+"66"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:4,height:16,borderRadius:2,background:r.c}}/>
            <span style={{fontSize:12,fontWeight:600}}>{r.n}</span>
          </div>
          <span style={{fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono'",color:r.c}}>{r.a.toLocaleString("sv")}</span>
        </div>})}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,marginTop:4}}>
          <span style={{fontSize:12,fontWeight:800}}>Totalt</span>
          <span style={{fontSize:14,fontWeight:900,fontFamily:"'JetBrains Mono'",color:T.text}}>42 000</span>
        </div>
        {mInc>42000&&<div style={{marginTop:8,padding:"8px 10px",background:T.success+"10",border:"1px solid "+T.success+"33",borderRadius:8}}>
          <div style={{fontSize:11,fontWeight:700,color:T.success}}>Överskott: {(mInc-42000).toLocaleString("sv")} kr → Överskottskonto</div>
        </div>}
      </div>

      {/* Netto */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
        {[{l:"Netto",v:mInc-mExp-totalFx,c:mInc-mExp-totalFx>=0?T.success:T.danger},{l:"Utgifter (rörlig)",v:mExp,c:T.danger}].map(function(c,i){return <div key={i} style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
          <div style={{fontSize:9,color:T.muted}}>{c.l}</div>
          <div style={{fontSize:16,fontWeight:800,fontFamily:"'JetBrains Mono'",color:c.c}}>{c.v.toLocaleString("sv")}</div>
        </div>})}
      </div>

      {/* Årsmål */}
      {(function(){var yg=eco.yearGoal||{target:150000,year:2026};var totalSaved=savings.goals.reduce(function(s,g){return s+g.saved},0);var now=new Date();var monthsPassed=now.getMonth()+1;var monthsLeft=Math.max(1,12-monthsPassed);var pct=yg.target>0?Math.min(100,Math.round(totalSaved/yg.target*100)):0;var perMonth=monthsLeft>0?Math.round((yg.target-totalSaved)/monthsLeft):0;
        return <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:12,padding:14,marginBottom:12}} onClick={function(){var v=prompt("Årsmål "+yg.year+" (kr):",yg.target);if(v&&!isNaN(v))sv({...eco,yearGoal:{...yg,target:Number(v)}})}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:12,fontWeight:700}}>Mål {yg.year}</div>
            <div style={{fontSize:9,color:T.subtle,cursor:"pointer"}}>tryck för att ändra</div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"'JetBrains Mono'",color:T.accent2}}>{totalSaved.toLocaleString("sv")}</div>
            <div style={{fontSize:12,color:T.muted}}>av {yg.target.toLocaleString("sv")} kr</div>
          </div>
          <div style={{height:8,background:T.surface,borderRadius:4,overflow:"hidden",marginBottom:6}}>
            <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+T.accent+","+T.accent2+")",borderRadius:4}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.subtle}}>
            <span>{pct}% · {monthsPassed} mån gått</span>
            <span>{perMonth>0?"Behöver "+perMonth.toLocaleString("sv")+"/mån":"Klart!"}</span>
          </div>
        </div>
      })()}

      {/* Fasta */}
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:12,fontWeight:700}}>Fasta utgifter</span>
          <button onClick={function(){setEditFixed(!editFixed)}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic n={editFixed?"x":"edit"} s={14} c={T.muted}/></button>
        </div>
        {fx.map(function(f){return <div key={f.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",fontSize:12}}>
          <span>{f.name}</span><span style={{fontWeight:700,fontFamily:"'JetBrains Mono'",color:T.warning}}>{f.amount.toLocaleString("sv")}</span>
        </div>})}
        <div style={{borderTop:"1px solid "+T.border,marginTop:6,paddingTop:6,display:"flex",justifyContent:"space-between",fontSize:12}}>
          <span style={{fontWeight:700}}>Totalt</span>
          <span style={{fontWeight:800,fontFamily:"'JetBrains Mono'",color:T.warning}}>{totalFx.toLocaleString("sv")} kr</span>
        </div>
        {editFixed&&<div style={{marginTop:10}}>
          {fx.map(function(f,i){return <div key={f.id} style={{display:"flex",gap:4,marginBottom:4}}>

            <input defaultValue={f.amount} type="number" onBlur={function(e){var nl=[...fx];nl[i]={...nl[i],amount:Number(e.target.value)||0};updFixed(nl)}} style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:11,fontFamily:"'JetBrains Mono'",outline:"none"}}/>
            <button onClick={function(){updFixed(fx.filter(function(_,j){return j!==i}))}} style={{padding:4,background:"none",border:"none",cursor:"pointer"}}><Ic n="trash" s={12} c={T.danger}/></button>
          </div>})}
          <button onClick={function(){updFixed([...fx,{id:uid(),name:"Ny",amount:0}])}} style={{width:"100%",padding:6,borderRadius:6,border:"1px dashed "+T.border,background:"transparent",color:T.muted,fontSize:10,cursor:"pointer",marginTop:4}}>+ Lägg till</button>
          <button onClick={function(){var v=prompt("Rörlig budget/mån:",cap);if(v&&!isNaN(v))updBudget(Number(v))}} style={{width:"100%",padding:6,borderRadius:6,border:"1px solid "+T.accent,background:T.accent+"0a",color:T.accent,fontSize:10,fontWeight:600,cursor:"pointer",marginTop:4}}>Ändra rörlig budget ({cap} kr)</button>
        </div>}
      </div>
    </div>}

    {/* SPARMÅL + INVESTERINGAR */}
    {sub==="savings"&&<div>
      {/* Totalt sparat */}
      <div style={{background:"linear-gradient(135deg,rgba(0,206,201,0.1),rgba(108,92,231,0.08))",border:"1px solid rgba(0,206,201,0.2)",borderRadius:14,padding:"14px",textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:10,color:T.muted}}>Totalt sparat</div>
        <div style={{fontSize:28,fontWeight:900,fontFamily:"'JetBrains Mono'",color:T.accent2}}>{savings.goals.reduce(function(s,g){return s+g.saved},0).toLocaleString("sv")} kr</div>
      </div>

      {/* Sparmål */}
      {savings.goals.map(function(g){var hasTgt=g.target>0;var pct=hasTgt?Math.min(100,Math.round(g.saved/g.target*100)):0;
        var alloc=((eco.budget&&eco.budget.allocations)||[]).find(function(a){return a.goalId===g.id});var perMonth=alloc?alloc.amount:0;
        var mo=hasTgt&&perMonth>0&&g.saved<g.target?Math.ceil((g.target-g.saved)/perMonth):null;
        var done=hasTgt&&g.saved>=g.target;
        return <div key={g.id} style={{background:T.card,border:"1px solid "+(done?T.success+"33":T.border),borderRadius:12,padding:14,marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:6}} onClick={function(){var n=prompt("Nytt namn:",g.name);if(n&&n.trim())renameGoal(g.id,n.trim())}}>
              {done&&<span style={{fontSize:10,color:T.success}}>✓</span>}
              <span style={{fontSize:13,fontWeight:700,color:done?T.success:T.text,borderBottom:"1px dashed "+T.border,cursor:"pointer"}}>{g.name}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {perMonth>0&&<span style={{fontSize:9,color:T.subtle,fontFamily:"'JetBrains Mono'"}}>{perMonth.toLocaleString("sv")}/mån</span>}
              <button onClick={function(){if(confirm("Radera "+g.name+"?"))rmGoal(g.id)}} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Ic n="trash" s={12} c={T.subtle}/></button>
            </div>
          </div>
          <div style={{fontSize:22,fontWeight:900,fontFamily:"'JetBrains Mono'",color:T.accent2,marginBottom:4}}>{g.saved.toLocaleString("sv")} kr</div>
          {hasTgt&&<div>
            <div style={{height:6,background:T.surface,borderRadius:3,overflow:"hidden",marginBottom:4}}>
              <div style={{height:"100%",width:pct+"%",background:done?T.success:"linear-gradient(90deg,"+T.accent+","+T.accent2+")",borderRadius:3}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.subtle,marginBottom:6}}>
              <span>{pct}%</span><span>{done?"Klart!":Math.max(0,g.target-g.saved).toLocaleString("sv")+" kr kvar"}</span>
            </div>
            {mo&&<div style={{fontSize:9,color:T.accent,marginBottom:6}}>~{mo} mån kvar</div>}
          </div>}
          <button onClick={function(){var v=prompt("Spara (kr):");if(v&&!isNaN(v)&&Number(v)>0)addSave(g.id,Number(v))}} style={{width:"100%",padding:9,borderRadius:8,border:"none",background:T.accent,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>Spara →</button>
        </div>})}

      <button onClick={function(){var n=prompt("Namn:");if(!n)return;var t=prompt("Mål (kr, 0 = inget tak):")||"0";addGoal(n.trim(),Number(t)||0)}} style={{width:"100%",padding:10,borderRadius:8,border:"1px dashed "+T.accent,background:T.accent+"08",color:T.accent,fontSize:11,fontWeight:700,cursor:"pointer",marginBottom:14}}>+ Nytt sparmål</button>

      {/* Investeringar */}
      <div style={{marginTop:10}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Investeringar</div>
        {investments.filter(function(i){return i.status!=="sold"}).length>0&&<div style={{display:"flex",gap:6,marginBottom:10}}>
          <div style={{flex:1,background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:9,color:T.muted}}>Investerat</div>
            <div style={{fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono'",color:T.accent}}>{investments.filter(function(i){return i.status!=="sold"}).reduce(function(s,i){return s+i.amount},0).toLocaleString("sv")}</div>
          </div>
          <div style={{flex:1,background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontSize:9,color:T.muted}}>Förväntat värde</div>
            <div style={{fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono'",color:T.success}}>{investments.filter(function(i){return i.status!=="sold"}).reduce(function(s,i){return s+(i.expectedValue||i.amount)},0).toLocaleString("sv")}</div>
          </div>
        </div>}
        {investments.filter(function(i){return i.status!=="sold"}).map(function(inv){var ev=inv.expectedValue||inv.amount;var profit=ev-inv.amount;return <div key={inv.id} style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:12,marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:700}}>{inv.name}</span><span style={{fontSize:9,color:T.subtle}}>{inv.date}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:T.muted}}>Investerat</div>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono'"}}>{inv.amount.toLocaleString("sv")}</div>
            </div>
            <div style={{background:T.surface,borderRadius:6,padding:"4px 8px"}}>
              <span style={{fontSize:10,fontWeight:800,color:profit>0?T.success:T.muted}}>+{profit.toLocaleString("sv")}</span>
            </div>
            <div style={{flex:1,textAlign:"right"}}>
              <div style={{fontSize:9,color:T.muted}}>Förväntat</div>
              <div style={{fontSize:15,fontWeight:700,fontFamily:"'JetBrains Mono'",color:T.success}}>{ev.toLocaleString("sv")}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:4}}>
            <button onClick={function(){var v=prompt("Faktisk avkastning:");if(v&&!isNaN(v))sellInvest(inv.id,Number(v))}} style={{flex:1,padding:6,borderRadius:6,border:"1px solid "+T.success,background:T.success+"0a",color:T.success,fontSize:10,fontWeight:600,cursor:"pointer"}}>Avsluta</button>
            <button onClick={function(){if(confirm("Radera?"))rmInvest(inv.id)}} style={{padding:6,borderRadius:6,border:"1px solid "+T.border,background:"transparent",cursor:"pointer"}}><Ic n="trash" s={12} c={T.subtle}/></button>
          </div>
        </div>})}
        <button onClick={function(){var n=prompt("Vad? (t.ex. TS lager)");if(!n)return;var a=prompt("Investerat belopp (kr):");if(!a||isNaN(a))return;var ev=prompt("Förväntat värde (kr):");if(!ev||isNaN(ev))return;addInvest({name:n.trim(),amount:Number(a),expectedValue:Number(ev)})}} style={{width:"100%",padding:8,borderRadius:8,border:"1px dashed "+T.accent,background:T.accent+"08",color:T.accent,fontSize:10,fontWeight:700,cursor:"pointer",marginTop:4}}>+ Ny investering</button>
      </div>

      {investments.filter(function(i){return i.status==="sold"}).length>0&&<div style={{marginTop:10}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,marginBottom:6}}>Avslutade</div>
        {investments.filter(function(i){return i.status==="sold"}).map(function(inv){var p=(inv.actualReturn||0)-inv.amount;return <div key={inv.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:T.card,border:"1px solid "+T.border,borderRadius:8,marginBottom:2,opacity:0.5}}>
          <div><div style={{fontSize:11,fontWeight:600}}>{inv.name}</div><div style={{fontSize:9,color:T.subtle}}>{inv.date}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono'",color:p>=0?T.success:T.danger}}>{p>=0?"+":""}{p.toLocaleString("sv")}</div></div>
        </div>})}
      </div>}
    </div>}
  </div>);
}

function IncForm({onSave,onClose}){
  const[amt,setAmt]=useState("");const[note,setNote]=useState("");const[type,setType]=useState("rorlig");
  return(<div>
    <div style={{fontSize:13,fontWeight:700,color:T.success,marginBottom:8}}>Ny inkomst</div>
    <input value={amt} onChange={function(e){setAmt(e.target.value)}} placeholder="Belopp (kr)" type="number" inputMode="numeric" autoFocus style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none",marginBottom:6}}/>
    <input value={note} onChange={function(e){setNote(e.target.value)}} placeholder="Anteckning" style={{width:"100%",padding:"7px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:11,outline:"none",marginBottom:8}}/>
    <div style={{display:"flex",gap:4,marginBottom:10}}>
      {[{k:"fast",l:"Fast (lön)"},{k:"rorlig",l:"Rörlig (företag)"}].map(function(s){return <button key={s.k} onClick={function(){setType(s.k)}} style={{flex:1,padding:"7px 0",borderRadius:6,border:type===s.k?"1px solid "+T.success:"1px solid "+T.border,background:type===s.k?T.success+"15":"transparent",color:type===s.k?T.success:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{s.l}</button>})}
    </div>
    <div style={{display:"flex",gap:6}}>
      <button onClick={onClose} style={{flex:1,padding:9,borderRadius:8,border:"1px solid "+T.border,background:"transparent",color:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>Avbryt</button>
      <button onClick={function(){if(amt&&!isNaN(amt))onSave(Number(amt),note,type)}} style={{flex:2,padding:9,borderRadius:8,border:"none",background:T.success,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",opacity:amt?"1":"0.4"}}>Spara</button>
    </div>
  </div>);
}

function ExpForm({onSave,onClose}){
  const[amt,setAmt]=useState("");const[note,setNote]=useState("");
  return(<div>
    <div style={{fontSize:13,fontWeight:700,color:T.danger,marginBottom:8}}>Ny utgift</div>
    <input value={amt} onChange={function(e){setAmt(e.target.value)}} placeholder="Belopp (kr)" type="number" inputMode="numeric" autoFocus style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none",marginBottom:6}}/>
    <input value={note} onChange={function(e){setNote(e.target.value)}} placeholder="Anteckning" style={{width:"100%",padding:"7px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:11,outline:"none",marginBottom:8}}/>
    <div style={{display:"flex",gap:6}}>
      <button onClick={onClose} style={{flex:1,padding:9,borderRadius:8,border:"1px solid "+T.border,background:"transparent",color:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>Avbryt</button>
      <button onClick={function(){if(amt&&!isNaN(amt))onSave(Number(amt),note)}} style={{flex:2,padding:9,borderRadius:8,border:"none",background:T.danger,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",opacity:amt?"1":"0.4"}}>Spara</button>
    </div>
  </div>);
}


function App(){
  const[items,setItems]=useState(null);
  const[checks,setChecks]=useState({});
  const[ecoData,setEcoData]=useState(DEFAULT_ECO);
  const[calData,setCalData]=useState({events:[],tasks:[]});
  const[loading,setLoading]=useState(true);
  const[selDate,setSelDate]=useState(new Date());
  const[modal,setModal]=useState(null);
  const[tab,setTab]=useState("today");
  const skipRef=useRef(false);

  useEffect(()=>{var timeout=setTimeout(function(){setItems(function(v){return v||DEFAULT_ITEMS});setLoading(false)},3000);(async()=>{try{
    var r1=await sb.from('health_data').select('data').eq('id','config').single();
    if(r1.data&&r1.data.data&&r1.data.data.items)setItems(r1.data.data.items);
    else{setItems(DEFAULT_ITEMS);await sb.from('health_data').upsert({id:'config',data:{items:DEFAULT_ITEMS},updated_at:new Date().toISOString()})}
    var r2=await sb.from('health_data').select('data').eq('id','checks').single();
    if(r2.data&&r2.data.data)setChecks(r2.data.data);
    else{setChecks({});await sb.from('health_data').upsert({id:'checks',data:{},updated_at:new Date().toISOString()})}
    var r3=await sb.from('health_data').select('data').eq('id','economy').single();
    if(r3.data&&r3.data.data)setEcoData(r3.data.data);
    else{await sb.from('health_data').upsert({id:'economy',data:DEFAULT_ECO,updated_at:new Date().toISOString()})}
    var r4=await sb.from('health_data').select('data').eq('id','calendar').single();
    if(r4.data&&r4.data.data)setCalData(r4.data.data);
    else{await sb.from('health_data').upsert({id:'calendar',data:{events:[],tasks:[]},updated_at:new Date().toISOString()})}
  }catch(e){setItems(DEFAULT_ITEMS);setChecks({})}clearTimeout(timeout);setLoading(false)})()},[]);

  useEffect(()=>{try{var ch=sb.channel('health-sync').on('postgres_changes',{event:'*',schema:'public',table:'health_data'},payload=>{if(!skipRef.current&&payload.new){if(payload.new.id==='config'&&payload.new.data&&payload.new.data.items)setItems(payload.new.data.items);if(payload.new.id==='checks'&&payload.new.data)setChecks(payload.new.data);if(payload.new.id==='economy'&&payload.new.data)setEcoData(payload.new.data);if(payload.new.id==='calendar'&&payload.new.data)setCalData(payload.new.data)}skipRef.current=false}).subscribe();return()=>sb.removeChannel(ch)}catch(e){console.warn('Realtime disabled:',e)}},[]);

  // Notification system
  const notifiedRef=useRef({});
  useEffect(function(){
    try{
    if(!('Notification' in window))return;
    if(Notification.permission==='default')Notification.requestPermission().catch(function(){});
    var iv=setInterval(function(){
      try{
      if(Notification.permission!=='granted')return;
      var now=new Date(),today=dk(now),nowM=now.getHours()*60+now.getMinutes();
      var evts=((calData&&calData.events)||[]).filter(function(e){return e.date===today&&e.time&&e.notify});
      evts.forEach(function(e){
        var p=e.time.split(':').map(Number),eM=p[0]*60+p[1];
        var diff=eM-nowM;
        if(diff>0&&diff<=e.notify&&!notifiedRef.current[e.id+today]){
          notifiedRef.current[e.id+today]=true;
          try{new Notification('KM Stack — '+e.name,{body:(diff<=1?'NU':'Om '+diff+' min')+(e.place?' · 📍 '+e.place:''),icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⚡</text></svg>',tag:e.id})}catch(err){}
        }
      });
      // Also check recurring
      ((calData&&calData.events)||[]).filter(function(e){return e.recurring&&e.time&&e.notify&&e.date!==today}).forEach(function(e){
        var start=new Date(e.date+'T12:00'),d=new Date(today+'T12:00');
        if(d<start)return;
        var match=false;
        if(e.recurring==='daily')match=true;
        if(e.recurring==='weekly')match=d.getDay()===start.getDay();
        if(e.recurring==='biweekly'){var df=Math.round((d-start)/86400000);match=df%14===0}
        if(e.recurring==='monthly')match=d.getDate()===start.getDate();
        if(!match)return;
        var p=e.time.split(':').map(Number),eM=p[0]*60+p[1],diff=eM-nowM;
        if(diff>0&&diff<=e.notify&&!notifiedRef.current[e.id+today]){
          notifiedRef.current[e.id+today]=true;
          try{new Notification('KM Stack — '+e.name,{body:'Om '+diff+' min'+(e.place?' · 📍 '+e.place:''),tag:e.id+today})}catch(err){}
        }
      });
      }catch(e){}
    },30000);
    return function(){clearInterval(iv)};
    }catch(e){console.warn('Notifications disabled')}
  },[calData]);

  const saveItems=useCallback(async(ni)=>{setItems(ni);skipRef.current=true;try{await sb.from('health_data').upsert({id:'config',data:{items:ni},updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveChecks=useCallback(async(nc)=>{setChecks(nc);skipRef.current=true;try{await sb.from('health_data').upsert({id:'checks',data:nc,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveEco=useCallback(async(ne)=>{setEcoData(ne);skipRef.current=true;try{await sb.from('health_data').upsert({id:'economy',data:ne,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveCal=useCallback(async(nc)=>{setCalData(nc);skipRef.current=true;try{await sb.from('health_data').upsert({id:'calendar',data:nc,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);

  function toggleCheck(id){var nc={...checks},d=dk(selDate);if(!nc[d])nc[d]={};nc[d][id]=!nc[d][id];if(!nc[d][id])delete nc[d][id];saveChecks(nc)}
  function updateItem(item){saveItems(items.map(i=>i.id===item.id?item:i));setModal(null)}
  function deleteItem(id){saveItems(items.filter(i=>i.id!==id));setModal(null)}
  function addItem(item){saveItems([...items,item]);setModal(null)}

  if(loading||!items)return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted}}>Laddar...</div>;

  return(<div style={{minHeight:"100vh",background:T.bg,color:T.text,maxWidth:480,margin:"0 auto"}}>
    {tab==="today"&&<TabToday items={items} checks={checks} selDate={selDate} setSelDate={setSelDate} toggleCheck={toggleCheck} saveChecks={saveChecks}/>}
    {tab==="calendar"&&<TabCalendar calData={calData} saveCal={saveCal}/>}
    {tab==="info"&&<TabInfo items={items} saveItems={saveItems} setModal={setModal}/>}
    {tab==="economy"&&<TabEconomy ecoData={ecoData} saveEco={saveEco}/>}

    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",justifyContent:"space-around",padding:"8px 0 12px",borderTop:"1px solid "+T.border,background:"rgba(10,10,15,0.97)",backdropFilter:"blur(20px)",zIndex:50}}>
      {[{k:"today",n:"check",l:"Idag"},{k:"calendar",n:"calendar",l:"Kalender"},{k:"info",n:"info",l:"Info"},{k:"economy",n:"bar",l:"Ekonomi"}].map(n=>
        <button key={n.k} onClick={()=>setTab(n.k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",color:tab===n.k?T.accent:T.subtle,fontSize:9,fontWeight:600}}><Ic n={n.n} s={18} c={tab===n.k?T.accent:T.subtle}/>{n.l}</button>
      )}
    </nav>

    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={()=>setModal(null)}>
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:22,width:"100%",maxWidth:380,maxHeight:"80vh",overflowY:"auto",animation:"fi .1s ease-out"}} onClick={e=>e.stopPropagation()}>
        {modal==="add"&&<AddForm onSave={addItem} onClose={()=>setModal(null)}/>}
        {(modal&&modal.type)==="edit"&&<EditForm item={modal.item} onSave={updateItem} onDelete={deleteItem} onClose={()=>setModal(null)}/>}
      </div>
    </div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
