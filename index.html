function App(){

    var focusOnHome=(D.focusItems||[]).filter(function(fi){return!fi.snoozedUntil||fi.snoozedUntil<=today}).map(function(fi){return{id:fi.id,text:fi.text,priority:fi.priority||"medium",deadline:fi.deadline,done:false,coName:fi.company||"Fokus",pjName:({comm:"Komm",meeting:"Moten",admin:"Admin",decision:"Beslut"})[fi.category]||"Fokus",isFocus:true}});
    /* Privat-steg med deadline */
    var privStepsOnHome=[];(D.personalProjects||[]).forEach(function(p){if(p.archived||p.done)return;(p.steps||[]).forEach(function(s){if(!s.done&&s.deadline)privStepsOnHome.push({id:s.id,text:s.text,priority:"medium",deadline:s.deadline,done:false,coName:"Privat",pjName:p.text,isPrivStep:true,pjId:p.id})});(p.subprojects||[]).forEach(function(sp){(sp.steps||[]).forEach(function(s){if(!s.done&&s.deadline)privStepsOnHome.push({id:s.id,text:s.text,priority:"medium",deadline:s.deadline,done:false,coName:"Privat",pjName:p.text+" \u2192 "+sp.text,isPrivStep:true,pjId:p.id})})});(p.roadmaps||[]).forEach(function(rm){(rm.tasks||[]).forEach(function(t){if(!t.done&&t.deadline)privStepsOnHome.push({id:t.id,text:t.text,priority:"medium",deadline:t.deadline,done:false,coName:"Privat",pjName:p.text+" \u2192 "+rm.name,isPrivStep:true,isRmTask:true,pjId:p.id})})})});
    /* Markera pausade företag */
    var pausedCoIds={};cos.forEach(function(c){if(c.companyPhase==="paused")pausedCoIds[c.id]=true});
    var atWithPause=at.filter(t=>!t.done&&!t.fromSprint).map(function(t){return{...t,isPaused:!!pausedCoIds[t.coId]}});
    var allPrio=[...atWithPause,...focusOnHome,...privStepsOnHome].sort((a,b)=>{
      var pa={high:0,medium:1,low:2};var da=daysTo(a.deadline),db=daysTo(b.deadline);
      if(da!==null&&da<=0&&(db===null||db>0))return-1;if(db!==null&&db<=0&&(da===null||da>0))return 1;
      if((pa[a.priority]||1)!==(pa[b.priority]||1))return(pa[a.priority]||1)-(pa[b.priority]||1);
      if(da!==null&&db!==null)return da-db;if(da!==null)return-1;if(db!==null)return 1;return 0;
    });
    var todayTasks=allPrio.filter(t=>daysTo(t.deadline)!==null&&daysTo(t.deadline)<=0);
    var weekTasks=allPrio.filter(t=>daysTo(t.deadline)!==null&&daysTo(t.deadline)>0&&daysTo(t.deadline)<=7);
    var doneToday=at.filter(t=>t.done&&t.doneDate===today).length;
    var overdue=todayTasks.filter(t=>daysTo(t.deadline)<0).length;
    /* Smart "gor detta nu" — mest brådskande task across everything */
    var topTask=allPrio[0]||null;
    function togHome(t){if(t.isFocus){save({...D,focusItems:(D.focusItems||[]).filter(i=>i.id!==t.id)})}else if(t.isPrivStep){var np=(D.personalProjects||[]).map(function(p){if(p.id!==t.pjId)return p;return{...p,lastActivity:today,steps:(p.steps||[]).map(function(s){return s.id===t.id?{...s,done:true,doneDate:today}:s}),subprojects:(p.subprojects||[]).map(function(sp){return{...sp,steps:(sp.steps||[]).map(function(s){return s.id===t.id?{...s,done:true,doneDate:today}:s})}}),roadmaps:(p.roadmaps||[]).map(function(rm){return{...rm,tasks:(rm.tasks||[]).map(function(tk){return tk.id===t.id?{...tk,done:true,doneDate:today}:tk})}})}});save({...D,personalProjects:np})}else{togTask(t.coId,t.pjId,t.id)}}
    /* Warnings */
    var warnings=[];
    cos.forEach(c=>{
      if(c.sprint&&c.sprint.active&&c.sprint.deadline&&daysTo(c.sprint.deadline)<0)warnings.push({type:"overdue",text:c.name+": sprint forsenad!",c:T.danger,ic:"flag"});
      if(!c.sprint||!c.sprint.active){var ds=daysSince(c.lastActive);if(ds>7&&c.projects.length>0)warnings.push({type:"sleeping",text:c.name+": ingen aktivitet pa "+ds+" dagar",c:T.warning,ic:"clock"})}
    });

    return<div style={{padding:"16px 16px 100px",animation:"fi .2s ease-out"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div><div style={{fontSize:11,color:T.accent,fontWeight:600}}>{greeting}, Km</div><div style={{fontSize:18,fontWeight:800}}>{now.toLocaleDateString("sv-SE",{weekday:"long",day:"numeric",month:"long"})}</div></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:8,color:syncStatus==="saving"?T.accent:syncStatus==="error"?T.danger:T.success,display:"flex",alignItems:"center",gap:3}}><div style={{width:5,height:5,borderRadius:3,background:syncStatus==="saving"?T.accent:syncStatus==="error"?T.danger:T.success,animation:syncStatus==="saving"?"pulse 1s infinite":"none"}}/>{syncStatus==="saving"?"Synkar...":syncStatus==="error"?"Fel":"Synkad"}</div>
          <div style={{textAlign:"center"}}><div style={{fontSize:18,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:streak.count?T.warning:T.subtle}}>{streak.count}</div><div style={{fontSize:7,color:T.muted}}>streak</div></div>
        </div>
      </div>

      {/* Sok */}
      <GlobalSearch D={D} goCo={goCo}/>

      {/* Warnings */}
      {warnings.length>0&&<div style={{marginBottom:12}}>
        {warnings.map((w,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",borderRadius:7,background:w.c+"10",border:"1px solid "+w.c+"25",marginBottom:3}}>
          <Ic n={w.ic} s={12} c={w.c}/><span style={{fontSize:10,fontWeight:600,color:w.c,flex:1}}>{w.text}</span>
        </div>)}
      </div>}

      {/* GOR DETTA NU */}
      {topTask&&homeView==="today"&&<div style={{background:"linear-gradient(135deg,rgba(108,92,231,0.1),rgba(0,206,201,0.06))",border:"1px solid rgba(108,92,231,0.2)",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
        <div style={{fontSize:8,fontWeight:700,color:T.accent,letterSpacing:1,marginBottom:6}}>GOR DETTA NU</div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>togHome(topTask)} style={{width:28,height:28,borderRadius:8,border:"2px solid "+T.accent,background:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="check" s={14} c={T.accent}/></button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700}}>{topTask.text}</div>
            <div style={{fontSize:9,color:T.muted,marginTop:2}}>{topTask.coName} → {topTask.pjName}{topTask.deadline?" | "+dlL(daysTo(topTask.deadline)):""}</div>
          </div>
          <span style={{fontSize:8,fontWeight:700,padding:"2px 6px",borderRadius:4,background:PRIO[topTask.priority].bg,color:PRIO[topTask.priority].c}}>{PRIO[topTask.priority].l}</span>
        </div>
      </div>}

      {/* Stats-rad */}
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        {[{v:activeSprints.length,l:"sprints",c:T.accent,ic:"flag"},{v:doneToday,l:"klart idag",c:T.success,ic:"check"},{v:overdue,l:"forsenade",c:overdue?T.danger:T.success,ic:"clock"},{v:allPrio.length,l:"tasks",c:allPrio.length?T.warning:T.success,ic:"target"}].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"8px 4px",borderRadius:8,background:T.card,border:"1px solid "+T.border}}>
          <Ic n={s.ic} s={12} c={s.c}/><div style={{fontSize:16,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:s.c,marginTop:2}}>{s.v}</div><div style={{fontSize:7,color:T.muted}}>{s.l}</div>
        </div>)}
      </div>

      {/* Velocity — mini completion graph */}
      {(()=>{
        var last7=[];for(var di=6;di>=0;di--){var dd=new Date();dd.setDate(dd.getDate()-di);var ds=dk(dd);var cnt=at.filter(t=>t.done&&t.doneDate===ds).length;last7.push({date:ds,count:cnt,dow:dd.toLocaleDateString("sv-SE",{weekday:"short"}).slice(0,2)})}
        var maxC=Math.max(1,...last7.map(d=>d.count));var total7=last7.reduce((a,d)=>a+d.count,0);var avg=(total7/7).toFixed(1);
        var sprintsThisWeek=0;var weekStart=new Date();weekStart.setDate(weekStart.getDate()-6);var wsStr=dk(weekStart);
        cos.forEach(c=>(c.sprintHistory||[]).forEach(s=>{if(s.completedAt&&s.completedAt>=wsStr)sprintsThisWeek++}));
        return<div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 12px",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:9,fontWeight:700,color:T.muted}}>VELOCITY (7 dagar)</div>
            <div style={{display:"flex",gap:8}}>
              <span style={{fontSize:9,color:T.accent}}><span style={{fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{avg}</span> tasks/dag</span>
              {sprintsThisWeek>0&&<span style={{fontSize:9,color:T.success}}><span style={{fontWeight:800,fontFamily:"'JetBrains Mono',monospace"}}>{sprintsThisWeek}</span> sprint{sprintsThisWeek>1?"s":""} klar{sprintsThisWeek>1?"a":""}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"flex-end",height:36}}>
            {last7.map((d,i)=>{var h=maxC>0?Math.max(3,d.count/maxC*32):3;var isToday=d.date===today;return<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{fontSize:7,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:d.count>0?T.success:T.subtle}}>{d.count||""}</div>
              <div style={{width:"100%",height:h,borderRadius:2,background:isToday?"linear-gradient(180deg,"+T.accent+","+T.accent2+")":d.count>0?T.success+"60":T.surface,transition:"height .3s"}}/>
              <div style={{fontSize:7,color:isToday?T.accent:T.subtle,fontWeight:isToday?700:400}}>{d.dow}</div>
            </div>})}
          </div>
        </div>;
      })()}

      {/* Toggle 7 dagar/Nasta vecka/Mal */}
      <div style={{display:"flex",gap:3,marginBottom:14}}>
        {[["today","Idag"],["week","Nasta vecka"],["goals","Mal"]].map(([k,l])=><button key={k} onClick={()=>setHomeView(k)} style={{flex:1,padding:"8px 0",borderRadius:8,fontSize:11,fontWeight:700,border:"1px solid "+(homeView===k?T.accent:T.border),background:homeView===k?"rgba(108,92,231,0.1)":"transparent",color:homeView===k?T.accent:T.muted,cursor:"pointer"}}>{l}</button>)}
      </div>

      {/* VECKA — dag för dag, allt blandat */}
      {homeView==="today"&&<div>
        {(()=>{
          var dayNames=["sondag","mandag","tisdag","onsdag","torsdag","fredag","lordag"];

          function renderTaskRow(t){var dimmed=t.isPaused;return<div key={t.id} style={{opacity:dimmed?0.4:1}}>
            <TaskRow t={{...t,inMyDay:isMyDay(t.id)}} showCtx compact onToggle={function(){togHome(t)}} onGo={function(){if(!t.isFocus&&!t.isPrivStep)goCo(t.coId);if(t.isPrivStep)setTab("private")}} onMyDay={t.isFocus||t.isPrivStep?null:function(){togMyDay(t.coId,t.pjId,t.id)}}/>
          </div>}

          function renderSprintCard(c){var borderC=c.urgency==="overdue"?T.danger:c.urgency==="today"?T.warning:c.urgency==="soon"?T.accent:c.color;var isExp=editItem&&editItem._expSprint===c.id;
            return<div key={"sp_"+c.id} style={{marginBottom:4}}>
              <div onClick={function(){setEditItem(isExp?null:{_expSprint:c.id})}} style={{background:T.card,border:"1px solid "+borderC+"40",borderLeft:"3px solid "+borderC,borderRadius:isExp?"10px 10px 0 0":10,padding:"10px 14px",cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:28,height:28,borderRadius:6,background:c.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n={c.icon||"briefcase"} s={12} c="#fff"/></div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700}}>{c.name}</div>
                    <div style={{fontSize:9,color:T.muted}}>{c.spDone}/{c.spTotal} tasks</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:c.pct>=80?T.success:T.text}}>{c.pct}%</div>
                    {c.dl!==null&&<div style={{fontSize:8,fontWeight:700,color:c.urgency==="overdue"?T.danger:c.urgency==="today"?T.warning:c.dl<=2?T.accent:T.subtle}}>{c.dl<0?"\u26a0 "+Math.abs(c.dl)+"d sen":c.dl===0?"Idag!":c.dl+"d kvar"}</div>}
                  </div>
                </div>
                <div style={{height:3,borderRadius:2,background:T.surface,marginTop:6}}><div style={{height:"100%",borderRadius:2,background:c.urgency==="overdue"?"linear-gradient(90deg,"+T.danger+","+T.warning+")":"linear-gradient(90deg,"+c.color+","+T.accent+")",width:c.pct+"%"}}/></div>
              </div>
              {isExp&&<div style={{background:T.surface,border:"1px solid "+borderC+"25",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"8px 12px",maxHeight:200,overflowY:"auto"}}>
                {c.spTasks.slice(0,8).map(function(t){return<div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid "+T.border}}>
                  <button onClick={function(e){e.stopPropagation();togTask(t.coId||c.id,t.pjId||(c.projects[0]?c.projects[0].id:""),t.id)}} style={{width:16,height:16,borderRadius:4,border:"2px solid "+T.border,background:"transparent",cursor:"pointer",flexShrink:0}}/>
                  <span style={{fontSize:10,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.text}</span>
                  <span style={{fontSize:7,fontWeight:700,padding:"1px 4px",borderRadius:3,background:PRIO[t.priority].bg,color:PRIO[t.priority].c}}>{PRIO[t.priority].l}</span>
                </div>})}
                {c.spTasks.length>8&&<div style={{fontSize:8,color:T.subtle,textAlign:"center",padding:4}}>+{c.spTasks.length-8} till</div>}
                <button onClick={function(e){e.stopPropagation();setTab("roadmap")}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,width:"100%",padding:"6px 0",borderRadius:6,background:"transparent",border:"1px dashed "+T.border,color:T.accent,fontSize:9,fontWeight:600,cursor:"pointer",marginTop:4}}>Oppna roadmap \u2192</button>
              </div>}
            </div>}

          /* Privat-projekt kort */
          var privActive=(D.personalProjects||[]).filter(function(p){return!p.archived&&!p.done});
          function renderPrivCard(p){var steps=p.steps||[];var subs=p.subprojects||[];var mainDone=steps.filter(function(s){return s.done}).length;var subTotal=0;var subDone=0;subs.forEach(function(sp){(sp.steps||[]).forEach(function(s){subTotal++;if(s.done)subDone++})});var rmTotal=0;var rmDone=0;(p.roadmaps||[]).forEach(function(rm){(rm.tasks||[]).forEach(function(t){rmTotal++;if(t.done)rmDone++})});var totalS=steps.length+subTotal+rmTotal;var totalD=mainDone+subDone+rmDone;var pct=totalS?Math.round(totalD/totalS*100):0;var tierV=TIERS[p.tier]||TIERS["+"];var nextStep=steps.find(function(s){return!s.done});var isExp=editItem&&editItem._expPriv===p.id;
            return<div key={"pv_"+p.id} style={{marginBottom:4}}>
              <div onClick={function(){setEditItem(isExp?null:{_expPriv:p.id})}} style={{background:T.card,border:"1px solid "+tierV.c+"20",borderLeft:"3px solid "+tierV.c,borderRadius:isExp?"10px 10px 0 0":10,padding:"10px 14px",cursor:"pointer"}}>

                  </div>

                    <div style={{fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:pct>=80?T.success:T.muted}}>{pct}%</div>
                    <div style={{fontSize:8,color:T.subtle}}>{totalD}/{totalS}</div>
                  </div>
                </div>
                {totalS>0&&<div style={{height:3,borderRadius:2,background:T.surface,marginTop:6}}><div style={{height:"100%",borderRadius:2,background:tierV.c,width:pct+"%"}}/></div>}
              </div>
              {isExp&&<div style={{background:T.surface,border:"1px solid "+tierV.c+"15",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"8px 12px",maxHeight:200,overflowY:"auto"}}>
                {steps.filter(function(s){return!s.done}).slice(0,6).map(function(s){return<div key={s.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"1px solid "+T.border}}>
                  <div style={{width:6,height:6,borderRadius:3,background:s===nextStep?tierV.c:T.border,flexShrink:0}}/>
                  <span style={{fontSize:10,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.text}</span>
                  {s.deadline&&<span style={{fontSize:7,color:dlC(daysTo(s.deadline),false)}}>{dlL(daysTo(s.deadline))}</span>}
                </div>})}
                <button onClick={function(e){e.stopPropagation();setTab("private")}} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,width:"100%",padding:"6px 0",borderRadius:6,background:"transparent",border:"1px dashed "+T.border,color:T.accent,fontSize:9,fontWeight:600,cursor:"pointer",marginTop:4}}>Oppna projekt \u2192</button>
              </div>}
            </div>}

          /* Bygg 7 dagar */
          var days=[];
          for(var di=0;di<7;di++){
            var dd=new Date();dd.setDate(dd.getDate()+di);var ds=dk(dd);
            var dayTasks=allPrio.filter(function(t){return t.deadline===ds});
            var daySprints=[];var dayPriv=[];
            if(di===0){
              var overdueTasks=allPrio.filter(function(t){return daysTo(t.deadline)!==null&&daysTo(t.deadline)<0});
              var noDeadline=allPrio.filter(function(t){return!t.deadline});
              dayTasks=[...overdueTasks,...dayTasks];
              daySprints=activeSprints.filter(function(sp){return!sp.sprint.deadline||daysTo(sp.sprint.deadline)<=0});
              dayPriv=privActive.filter(function(p){return!p.deadline||daysTo(p.deadline)<=0});
            } else {
              daySprints=activeSprints.filter(function(sp){return sp.sprint.deadline&&sp.sprint.deadline===ds});
              dayPriv=privActive.filter(function(p){return p.deadline&&p.deadline===ds});
            }
            var label=di===0?"IDAG":di===1?"IMORGON":dayNames[dd.getDay()]+" "+dd.getDate()+"/"+(dd.getMonth()+1);
            days.push({date:ds,label:label,tasks:dayTasks,noDeadline:di===0?noDeadline:[],sprints:daySprints,priv:dayPriv,isToday:di===0,dayIdx:di});
          }

          return<div>
            {days.map(function(day,di){
              var hasTasks=day.tasks.length>0||day.noDeadline.length>0||day.sprints.length>0||day.priv.length>0;
              if(!hasTasks&&di>1)return null;

              return<div key={day.date}>
                {/* Separator mellan dagar */}
                {di>0&&<div style={{height:1,background:"rgba(240,240,245,0.1)",margin:"12px 0"}}/>}

                {/* Dag-header */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  {day.isToday?<div style={{width:10,height:10,borderRadius:5,background:"linear-gradient(135deg,"+T.accent+","+T.accent2+")",boxShadow:"0 0 8px "+T.accent+"50",flexShrink:0}}/>:<div style={{width:6,height:6,borderRadius:3,background:di===1?T.accent:T.border,flexShrink:0}}/>}
                  <span style={{fontSize:day.isToday?14:11,fontWeight:day.isToday?800:700,color:day.isToday?T.text:di===1?T.accent:T.subtle}}>{day.label}</span>
                  {hasTasks&&<span style={{fontSize:8,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:day.isToday&&day.tasks.length?T.warning:T.muted}}>{day.tasks.length+day.sprints.length+day.priv.length}{day.noDeadline.length?" +"+day.noDeadline.length:""}</span>}
                  {!hasTasks&&<span style={{fontSize:8,color:T.success}}>✓ Tomt</span>}
                </div>

                {/* Sprint-kort */}
                {day.sprints.length>0&&<div style={{marginBottom:day.tasks.length>0||day.noDeadline.length>0||day.priv.length>0?6:0}}>
                  {day.sprints.map(renderSprintCard)}
                </div>}

                {/* Privat-projekt-kort */}
                {day.priv.length>0&&<div style={{marginBottom:day.tasks.length>0||day.noDeadline.length>0?6:0}}>
                  {day.priv.map(renderPrivCard)}
                </div>}

                {/* Tasks */}
                {day.tasks.length>0&&<div style={{borderLeft:"2px solid "+(day.isToday?T.accent:di===1?T.accent+"40":T.border),paddingLeft:12,marginLeft:4,marginBottom:day.noDeadline.length>0?4:0}}>
                  {day.tasks.map(renderTaskRow)}
                </div>}

                {/* Utan deadline — bara idag */}
                {day.noDeadline.length>0&&<div style={{borderLeft:"2px solid "+T.border,paddingLeft:12,marginLeft:4}}>
                  <div style={{fontSize:8,color:T.subtle,marginBottom:3}}>Utan deadline</div>
                  {day.noDeadline.slice(0,8).map(renderTaskRow)}
                  {day.noDeadline.length>8&&<div style={{fontSize:8,color:T.subtle,padding:3}}>+{day.noDeadline.length-8} till</div>}
                </div>}
              </div>;
            })}

  /* ══ FOKUS — OPERATIV CEO-LISTA ══ */
  function TabFocus({cos,D,save,togTask,togMyDay,isMyDay,goCo,today}){
    const[txt,setTxt]=useState("");const[cat,setCat]=useState("admin");const[prio,setPrio]=useState("medium");const[co,setCo]=useState("");const[dl,setDl]=useState("");const[filter,setFilter]=useState("all");const[coFilter,setCoFilter]=useState("");const[expId,setExpId]=useState(null);const[showPj,setShowPj]=useState(false);const[showRecur,setShowRecur]=useState(false);const[addRecur,setAddRecur]=useState(false);const[rTxt,setRTxt]=useState("");const[rCat,setRCat]=useState("admin");const[rCo,setRCo]=useState("");const[rRepeat,setRRepeat]=useState("daily");const[rDays,setRDays]=useState([1,2,3,4,5]);const[rPrio,setRPrio]=useState("medium");const[showPulse,setShowPulse]=useState(false);const[addRoutine,setAddRoutine]=useState(false);const[rtTxt,setRtTxt]=useState("");const[rtCo,setRtCo]=useState("");const[pulseCoFilter,setPulseCoFilter]=useState("");
    var CATS={comm:{l:"Komm",ic:"inbox",c:"#0984e3"},meeting:{l:"Moten",ic:"calendar",c:"#6c5ce7"},admin:{l:"Admin",ic:"file",c:"#00cec9"},decision:{l:"Beslut",ic:"zap",c:"#fdcb6e"}};
    var items=(D.focusItems||[]).slice();
    var recurring=(D.focusRecurring||[]);

    /* Generera dagens återkommande */
    var now=new Date();var dow=now.getDay();
    var todayRecurIds=(items).filter(i=>i.fromRecurring&&i.recurDate===today).map(i=>i.recurSrcId);
    var newRecur=[];
    recurring.forEach(function(r){
      if(todayRecurIds.includes(r.id))return;/* redan genererad */
      var show=false;
      if(r.repeat==="daily")show=true;
      if(r.repeat==="weekly"&&r.days&&r.days.includes(dow))show=true;
      if(show)newRecur.push({id:uid(),text:r.text,category:r.category,priority:r.priority||"medium",company:r.company||null,deadline:today,created:today,notes:"",pinned:false,waiting:false,snoozedUntil:null,fromRecurring:true,recurSrcId:r.id,recurDate:today});
    });
    if(newRecur.length>0){var ni=[...items,...newRecur];save({...D,focusItems:ni});items=ni}

    /* Filter + snooze */
    var visible=items.filter(function(it){
      if(it.snoozedUntil&&it.snoozedUntil>today)return false;
      if(filter!=="all"&&filter!=="waiting"&&it.category!==filter)return false;
      if(filter==="waiting"&&!it.waiting)return false;
      if(coFilter&&(it.company||"")!==coFilter)return false;
      return true;
    });

    /* Sortera: pinnade först, sedan urgency */
    visible.sort(function(a,b){
      if(a.pinned&&!b.pinned)return-1;if(!a.pinned&&b.pinned)return 1;
      var da=daysTo(a.deadline),db=daysTo(b.deadline);
      var ua=da===null?3:da<0?0:da===0?1:2;
      var ub=db===null?3:db<0?0:db===0?1:2;
      if(ua!==ub)return ua-ub;
      var pa={high:0,medium:1,low:2};
      if((pa[a.priority]||1)!==(pa[b.priority]||1))return(pa[a.priority]||1)-(pa[b.priority]||1);
      if(da!==null&&db!==null)return da-db;
      if(da!==null)return-1;if(db!==null)return 1;return 0;
    });

    var overdue=visible.filter(i=>daysTo(i.deadline)!==null&&daysTo(i.deadline)<0).length;
    var todayCount=visible.filter(i=>daysTo(i.deadline)===0).length;
    var waitingCount=items.filter(i=>i.waiting).length;

    function addItem(){if(!txt.trim())return;save({...D,focusItems:[...items,{id:uid(),text:txt.trim(),category:cat,priority:prio,company:co||null,deadline:dl||null,created:today,notes:"",pinned:false,waiting:false,snoozedUntil:null}]});setTxt("");setDl("")}
    function complete(id){var nd={...D,focusItems:items.filter(i=>i.id!==id)};if(D.streak.lastDate!==today){nd.streak={count:D.streak.lastDate===dk(new Date(Date.now()-86400000))?(D.streak.count||0)+1:1,lastDate:today}}save(nd)}
    function updItem(id,data){save({...D,focusItems:items.map(i=>i.id===id?{...i,...data}:i)})}
    function snooze(id,days){var d=new Date();d.setDate(d.getDate()+days);updItem(id,{snoozedUntil:dk(d)})}
    function addRecurring(){if(!rTxt.trim())return;save({...D,focusRecurring:[...recurring,{id:uid(),text:rTxt.trim(),category:rCat,company:rCo||null,repeat:rRepeat,days:rRepeat==="weekly"?rDays:null,priority:rPrio}]});setRTxt("");setAddRecur(false)}
    function delRecurring(id){save({...D,focusRecurring:recurring.filter(r=>r.id!==id)})}

    /* Fristående projekt */
    var projects=[];cos.forEach(c=>c.projects.filter(p=>!p.fromSprint).forEach(p=>projects.push({...p,coId:c.id,coName:c.name,coColor:c.color})));

    /* Unika företag för filter */
    var coNames=[...new Set(items.map(i=>i.company).filter(Boolean))];

    function handleFocusImport(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var data=JSON.parse(ev.target.result);var msg=[];
      /* Focus items */
      if(data.focusItems&&data.focusItems.length){var newFi=data.focusItems.map(function(fi){return{id:uid(),text:fi.text||"",category:fi.category||"admin",priority:fi.priority||"medium",company:fi.company||null,deadline:fi.deadline||null,created:today,notes:fi.notes||"",pinned:!!fi.pinned,waiting:!!fi.waiting,snoozedUntil:null}});save({...D,focusItems:[...items,...newFi]});msg.push(newFi.length+" focus-items")}
      /* Recurring */
      if(data.recurring&&data.recurring.length){var newRec=data.recurring.map(function(r2){return{id:uid(),text:r2.text||"",category:r2.category||"admin",company:r2.company||null,repeat:r2.repeat||"daily",days:r2.days||null,priority:r2.priority||"medium"}});save({...D,focusRecurring:[...recurring,...newRec]});msg.push(newRec.length+" aterkommande")}
      /* Routines (Operations Pulse) */
      if(data.routines&&data.routines.length){var newRt=data.routines.map(function(rt){return{id:uid(),text:rt.text||rt.name||"",company:rt.company||null}});save({...D,dailyRoutines:[...(D.dailyRoutines||[]),...newRt]});msg.push(newRt.length+" dagliga rutiner")}
      if(msg.length)alert("Importerat: "+msg.join(", "));else alert("Hittade ingen data att importera. Formatet ska ha focusItems, recurring, och/eller routines.")
    }catch(err){alert("Fel: "+err.message)}};r.readAsText(f);e.target.value=""}

    return<div style={{padding:"16px 16px 100px",animation:"fi .2s ease-out"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
        <div style={{fontSize:22,fontWeight:800}}>Fokus</div>
        <label style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+T.accent+"30",background:T.accent+"08",cursor:"pointer",fontSize:8,color:T.accent,fontWeight:700}}>📥 Importera<input type="file" accept=".json" onChange={handleFocusImport} style={{display:"none"}}/></label>
      </div>
      <div style={{fontSize:10,color:T.muted,marginBottom:10}}>Operativt — mail, moten, admin, beslut</div>

      {/* Stats */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{v:visible.length,l:"att hantera",c:visible.length?T.accent:T.success,ic:"target"},{v:overdue,l:"forsenade",c:overdue?T.danger:T.success,ic:"clock"},{v:todayCount,l:"idag",c:todayCount?T.warning:T.success,ic:"zap"},{v:waitingCount,l:"vantar svar",c:waitingCount?T.pin:T.success,ic:"bell"}].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"7px 4px",borderRadius:8,background:T.card,border:"1px solid "+T.border}}>
          <Ic n={s.ic} s={11} c={s.c}/><div style={{fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:s.c,marginTop:1}}>{s.v}</div><div style={{fontSize:7,color:T.muted}}>{s.l}</div>
        </div>)}
      </div>

      {/* Snabb-input */}
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 12px",marginBottom:12}}>
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <input value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addItem()}} placeholder="Ny uppgift..." style={{...IS,marginBottom:0,flex:1,fontSize:12}}/>
          <Btn primary onClick={addItem} style={{padding:"8px 14px"}}>+</Btn>
        </div>

                  {rtasks.length>0&&<span style={{fontSize:10,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:rpct===100?T.success:T.muted}}>{rpct}%</span>}
                  <button onClick={function(){updPj(pj.id,{roadmaps:rms.filter(function(_,j){return j!==ri})})}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.2}}><Ic n="x" s={9} c={T.muted}/></button>
                </div>
                {rtasks.length>0&&<div style={{height:2,borderRadius:1,background:T.surface,marginBottom:6}}><div style={{height:"100%",borderRadius:1,background:T.accent,width:rpct+"%"}}/></div>}
                {rtasks.map(function(t,ti){return<div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",marginBottom:1}}>
                  <button onClick={function(){var nrms=rms.map(function(x,k){return k===ri?{...x,tasks:x.tasks.map(function(tk,m){return m===ti?{...tk,done:!tk.done,doneDate:tk.done?null:today}:tk})}:x});updPj(pj.id,{roadmaps:nrms})}} style={{width:14,height:14,borderRadius:4,border:t.done?"none":"2px solid "+T.border,background:t.done?T.success:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{t.done&&<Ic n="check" s={8} c="#fff"/>}</button>
                  <span style={{fontSize:10,color:t.done?T.muted:T.text,textDecoration:t.done?"line-through":"none",flex:1}}>{t.text}</span>
                  {t.deadline&&<span style={{fontSize:7,fontWeight:600,color:dlC(daysTo(t.deadline),t.done)}}>{dlL(daysTo(t.deadline))}</span>}
                  <button onClick={function(){var nrms=rms.map(function(x,k){return k===ri?{...x,tasks:x.tasks.filter(function(_,m){return m!==ti})}:x});updPj(pj.id,{roadmaps:nrms})}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.2}}><Ic n="x" s={8} c={T.muted}/></button>
                </div>})}
                <RmTaskInline onAdd={function(t){var nrms=rms.map(function(x,k){return k===ri?{...x,tasks:[...(x.tasks||[]),{id:uid(),text:t.text,deadline:t.deadline,done:false}]}:x});updPj(pj.id,{roadmaps:nrms})}}/>
              </div>})}
            <RmInline onAdd={function(rm){updPj(pj.id,{roadmaps:[...(pj.roadmaps||[]),{id:uid(),name:rm.name,deadline:rm.deadline,tasks:[]}]})}}/>
          </div>;
        })()}

        {/* Lista (inköp etc) */}
        {(list.length>0||true)&&<div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>Lista ({listDone}/{list.length})</div>
          {list.map((l,i)=><div key={l.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:6,background:l.done?"rgba(0,206,201,0.04)":T.card,border:"1px solid "+(l.done?"rgba(0,206,201,0.08)":T.border),marginBottom:2}}>
            <button onClick={()=>{var nl=[...list];nl[i]={...l,done:!l.done};updPj(pj.id,{list:nl})}} style={{width:14,height:14,borderRadius:3,border:l.done?"none":"2px solid "+T.accent2,background:l.done?T.accent2:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{l.done&&<Ic n="check" s={8} c="#fff"/>}</button>
            <span style={{fontSize:10,color:l.done?T.muted:T.text,textDecoration:l.done?"line-through":"none",flex:1}}>{l.text}</span>
            <button onClick={()=>updPj(pj.id,{list:list.filter((_,j)=>j!==i)})} style={{background:"none",border:"none",cursor:"pointer",opacity:0.2}}><Ic n="x" s={9} c={T.muted}/></button>
          </div>)}
          <AddInline placeholder="Lagg till i listan..." onAdd={t=>updPj(pj.id,{list:[...list,{id:uid(),text:t,done:false}]})}/>
        </div>}

        {/* Anteckningar */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>Anteckningar</div>
          <textarea value={pj.notes||""} onChange={e=>updPj(pj.id,{notes:e.target.value})} placeholder="Kontext, tips, info..." rows={3} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid "+T.border,background:T.card,color:T.text,fontSize:10,outline:"none",resize:"vertical",lineHeight:1.5}}/>
        </div>

        {/* Länkar */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>Lankar ({links.length})</div>
          {links.map((l,i)=><div key={l.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:6,background:T.card,border:"1px solid "+T.border,marginBottom:2}}>
            <Ic n="globe" s={10} c={T.accent}/>
            <span style={{fontSize:10,color:T.accent,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.label||l.url}</span>
            <button onClick={()=>updPj(pj.id,{links:links.filter((_,j)=>j!==i)})} style={{background:"none",border:"none",cursor:"pointer",opacity:0.2}}><Ic n="x" s={9} c={T.muted}/></button>
          </div>)}
          <AddInline placeholder="Lagg till lank..." onAdd={t=>updPj(pj.id,{links:[...links,{id:uid(),url:t,label:t}]})}/>
        </div>

        {/* Actions */}
        <div style={{display:"flex",gap:6,marginTop:10}}>
          {!pj.archived&&<Btn primary onClick={()=>{archivePj(pj.id);setSelPj(null)}} style={{flex:1}}>✅ Klar — arkivera</Btn>}
          {pj.archived&&<Btn onClick={()=>unarchivePj(pj.id)} style={{flex:1}}>Ateraktivera</Btn>}
          <Btn danger onClick={()=>{if(confirm("Radera projektet?")){delPj(pj.id);setSelPj(null)}}} style={{padding:"9px 14px"}}>Radera</Btn>
        </div>
      </div>;
    }

    /* ── Översikts-vy ── */
    return<div style={{padding:"16px 16px 100px",animation:"fi .2s ease-out"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
        <div style={{fontSize:22,fontWeight:800}}>Privat</div>
        <label style={{padding:"5px 8px",borderRadius:6,border:"1px solid "+T.accent+"30",background:T.accent+"08",cursor:"pointer",fontSize:8,color:T.accent,fontWeight:700}}>📥 Importera<input type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/></label>
      </div>
      <div style={{fontSize:10,color:T.muted,marginBottom:10}}>Personliga projekt & uppgifter</div>

      {/* Stats */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[{v:stats.active,l:"aktiva",c:stats.active?T.accent:T.success,ic:"target"},{v:stats.sleeping,l:"sovande",c:stats.sleeping?T.warning:T.success,ic:"clock"},{v:stats.thisMonth,l:"klara/man",c:T.success,ic:"check"}].map((s,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"7px 4px",borderRadius:8,background:T.card,border:"1px solid "+T.border}}>
          <Ic n={s.ic} s={11} c={s.c}/><div style={{fontSize:15,fontWeight:800,fontFamily:"'JetBrains Mono',monospace",color:s.c,marginTop:1}}>{s.v}</div><div style={{fontSize:7,color:T.muted}}>{s.l}</div>
        </div>)}
      </div>

      {/* Tier-filter */}
      <div style={{display:"flex",gap:3,marginBottom:12}}>
        <button onClick={()=>setTier("all")} style={{padding:"5px 10px",borderRadius:6,fontSize:9,fontWeight:600,border:"1px solid "+(tier==="all"?T.accent:T.border),background:tier==="all"?T.accent+"12":"transparent",color:tier==="all"?T.accent:T.muted,cursor:"pointer"}}>Alla</button>
        {Object.entries(TIERS).map(([k,v])=><button key={k} onClick={()=>setTier(k)} style={{padding:"5px 10px",borderRadius:6,fontSize:9,fontWeight:600,border:"1px solid "+(tier===k?v.c:T.border),background:tier===k?v.bg:"transparent",color:tier===k?v.c:T.muted,cursor:"pointer"}}>{k} {v.l}</button>)}
      </div>

      {/* Sovande-varningar */}
      {sleeping.length>0&&tier==="all"&&<div style={{marginBottom:10}}>
        {sleeping.slice(0,3).map(p=><div key={p.id} onClick={()=>setSelPj(p.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:6,background:T.warning+"08",border:"1px solid "+T.warning+"20",marginBottom:2,cursor:"pointer"}}>
          <Ic n="clock" s={10} c={T.warning}/><span style={{fontSize:9,fontWeight:600,color:T.warning,flex:1}}>{p.text} — sovande {daysSince(p.lastActivity||p.created)}d</span>
        </div>)}
      </div>}

      {/* Projektlista */}
      {filtered.map((p,i)=>{var steps=p.steps||[];var subs=p.subprojects||[];var mainDone=steps.filter(s=>s.done).length;var subTotal=0;var subDone=0;subs.forEach(function(sp){(sp.steps||[]).forEach(function(s){subTotal++;if(s.done)subDone++})});var rmTotal=0;var rmDone=0;(p.roadmaps||[]).forEach(function(rm){(rm.tasks||[]).forEach(function(t){rmTotal++;if(t.done)rmDone++})});var totalS=steps.length+subTotal+rmTotal;var totalD=mainDone+subDone+rmDone;var pct=totalS?Math.round(totalD/totalS*100):0;var tierV=TIERS[p.tier]||TIERS["+"];var isSleeping=daysSince(p.lastActivity||p.created)>5;var nextStep=steps.find(s=>!s.done);
        return<div key={p.id} onClick={()=>setSelPj(p.id)} style={{background:T.card,border:"1px solid "+(isSleeping?T.warning+"20":T.border),borderRadius:10,padding:"11px 14px",cursor:"pointer",marginBottom:4,animation:"fi .08s ease-out "+(i*0.02)+"s both"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:5,height:28,borderRadius:3,background:tierV.c,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:12,fontWeight:700}}>{p.text}</span>
                <span style={{fontSize:7,fontWeight:700,padding:"1px 5px",borderRadius:3,background:tierV.bg,color:tierV.c}}>{p.tier}</span>
                {subs.length>0&&<span style={{fontSize:7,fontWeight:600,padding:"1px 4px",borderRadius:3,background:T.accent+"10",color:T.accent}}>{subs.length} sub</span>}
                {(p.roadmaps||[]).length>0&&<span style={{fontSize:7,fontWeight:600,padding:"1px 4px",borderRadius:3,background:T.warning+"10",color:T.warning}}>{(p.roadmaps||[]).length} rm</span>}
                {isSleeping&&<span style={{fontSize:7,color:T.warning}}>💤</span>}
              </div>
              {steps.length>0&&<div style={{marginTop:4}}>
                {/* Mini noder */}
                <div style={{display:"flex",alignItems:"center",gap:2,marginBottom:nextStep?4:0}}>
                  {steps.map(function(s,j){var isNxt=s===nextStep;return<div key={j} style={{width:isNxt?8:6,height:isNxt?8:6,borderRadius:"50%",background:s.done?T.success:isNxt?tierV.c:T.border,boxShadow:isNxt?"0 0 4px "+tierV.c+"60":"none",transition:"all .2s"}}/>})}
                  <span style={{fontSize:8,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:pct===100?T.success:T.muted,marginLeft:4}}>{totalD}/{totalS}</span>
                </div>
                {nextStep&&<div style={{fontSize:9,color:T.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>→ {nextStep.text}</div>}
              </div>}
              {steps.length===0&&<div style={{fontSize:8,color:T.subtle,marginTop:2}}>Inga steg annu</div>}
            </div>
            {p.deadline&&<span style={{fontSize:8,fontWeight:600,color:dlC(daysTo(p.deadline),false),flexShrink:0}}>{dlL(daysTo(p.deadline))}</span>}
          </div>
        </div>;
      })}

      {filtered.length===0&&<div style={{textAlign:"center",padding:20,color:T.subtle}}><div style={{fontSize:11}}>Inga projekt{tier!=="all"?" i denna tier":""}</div></div>}

      {/* Nytt projekt — inline */}
      <NewProjectInline onAdd={addProject}/>

      {/* Arkiverade */}
      {archived.length>0&&<div style={{marginTop:16}}>
        <button onClick={()=>setShowArchived(!showArchived)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",fontSize:9,fontWeight:600,color:T.subtle}}><Ic n={showArchived?"x":"check"} s={9} c={T.subtle}/> Arkiverade ({archived.length})</button>
        {showArchived&&archived.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:6,background:"rgba(0,184,148,0.03)",border:"1px solid rgba(0,184,148,0.06)",marginBottom:2,marginTop:2}}>
          <Ic n="check" s={10} c={T.success}/>
          <span style={{fontSize:10,color:T.muted,textDecoration:"line-through",flex:1}}>{p.text}</span>
          {p.doneDate&&<span style={{fontSize:8,color:T.subtle}}>{p.doneDate}</span>}
          <button onClick={()=>unarchivePj(p.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:8,color:T.accent,fontWeight:600}}>Ateraktivera</button>
        </div>)}
      </div>}
    </div>;
  }

  /* Inline add helpers */
  function AddInline({placeholder,onAdd}){const[v,setV]=useState("");return<div style={{display:"flex",gap:4,marginTop:3}}>
    <input value={v} onChange={e=>setV(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&v.trim()){onAdd(v.trim());setV("")}}} placeholder={placeholder} style={{flex:1,padding:"5px 8px",borderRadius:5,border:"1px dashed "+T.border,background:"transparent",color:T.text,fontSize:10,outline:"none"}}/>
    {v.trim()&&<button onClick={()=>{onAdd(v.trim());setV("")}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic n="plus" s={12} c={T.accent}/></button>}
  </div>}

  function StepSection({steps,stepsDone,tierC,pjId,updPj,today}){
    const[batchMode,setBatchMode]=useState(false);const[sel,setSel]=useState({});const[batchDl,setBatchDl]=useState("");
    var selCount=Object.keys(sel).filter(function(k){return sel[k]}).length;

    function toggleSel(i){setSel(function(prev){var n={...prev};n[i]=!n[i];return n})}
    function selectRange(from,to){var n={};for(var i=from;i<=to;i++)n[i]=true;setSel(n)}
    function applyBatch(){if(!batchDl||selCount===0)return;var ns=steps.map(function(s,i){return sel[i]?{...s,deadline:batchDl}:s});updPj(pjId,{steps:ns});setBatchMode(false);setSel({});setBatchDl("")}
    function clearDeadlines(){var indices=Object.keys(sel).filter(function(k){return sel[k]}).map(Number);if(indices.length===0)return;var ns=steps.map(function(s,i){return sel[i]?{...s,deadline:null}:s});updPj(pjId,{steps:ns});setSel({})}

    return<div style={{marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontSize:11,fontWeight:700}}>Steg ({stepsDone}/{steps.length})</div>
        {steps.length>0&&<button onClick={function(){setBatchMode(!batchMode);setSel({});setBatchDl("")}} style={{padding:"3px 8px",borderRadius:4,fontSize:8,fontWeight:700,border:"1px solid "+(batchMode?T.danger+"40":T.accent+"30"),background:batchMode?T.danger+"10":T.accent+"08",color:batchMode?T.danger:T.accent,cursor:"pointer"}}>{batchMode?"Avbryt":"📅 Satt deadlines"}</button>}
      </div>

      {/* Batch-bar */}
      {batchMode&&<div style={{background:T.accent+"08",border:"1px solid "+T.accent+"20",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
        <div style={{display:"flex",gap:3,marginBottom:6,flexWrap:"wrap"}}>
          <button onClick={function(){var n={};steps.forEach(function(_,i){n[i]=true});setSel(n)}} style={{padding:"3px 7px",borderRadius:4,fontSize:8,fontWeight:600,border:"1px solid "+T.border,background:"transparent",color:T.muted,cursor:"pointer"}}>Alla</button>
          <button onClick={function(){setSel({})}} style={{padding:"3px 7px",borderRadius:4,fontSize:8,fontWeight:600,border:"1px solid "+T.border,background:"transparent",color:T.muted,cursor:"pointer"}}>Ingen</button>
          {steps.length>3&&<button onClick={function(){var first=-1;steps.forEach(function(s,i){if(!s.done&&first<0)first=i});if(first>=0)selectRange(first,Math.min(first+4,steps.length-1))}} style={{padding:"3px 7px",borderRadius:4,fontSize:8,fontWeight:600,border:"1px solid "+T.accent+"30",background:T.accent+"08",color:T.accent,cursor:"pointer"}}>Nasta 5</button>}
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <span style={{fontSize:9,fontWeight:600,color:T.muted}}>{selCount} valda</span>
          <input type="date" value={batchDl} onChange={function(e){setBatchDl(e.target.value)}} style={{flex:1,padding:"5px 8px",borderRadius:5,border:"1px solid "+T.accent+"30",background:T.surface,color:T.text,fontSize:10,outline:"none"}}/>
          <Btn primary disabled={!batchDl||selCount===0} onClick={applyBatch} style={{padding:"6px 12px"}}>Satt</Btn>
        </div>
        {selCount>0&&<button onClick={clearDeadlines} style={{marginTop:4,padding:"3px 7px",borderRadius:4,fontSize:8,fontWeight:600,border:"1px solid "+T.danger+"20",background:"transparent",color:T.danger,cursor:"pointer"}}>Rensa deadlines pa valda</button>}
        {/* Snabbval */}
        <div style={{display:"flex",gap:3,marginTop:6}}>
          {[{l:"Idag",d:0},{l:"Imorgon",d:1},{l:"Om 3d",d:3},{l:"1 vecka",d:7},{l:"2 veckor",d:14}].map(function(opt){var dl=dk(new Date(Date.now()+opt.d*86400000));return<button key={opt.l} onClick={function(){setBatchDl(dl)}} style={{padding:"3px 6px",borderRadius:4,fontSize:7,fontWeight:600,border:"1px solid "+(batchDl===dl?T.accent:T.border),background:batchDl===dl?T.accent+"15":"transparent",color:batchDl===dl?T.accent:T.subtle,cursor:"pointer"}}>{opt.l}</button>})}
        </div>
      </div>}

      {/* Steg-lista */}
      <div style={{position:"relative",paddingLeft:batchMode?0:24}}>
        {!batchMode&&steps.length>1&&<div style={{position:"absolute",left:9,top:8,bottom:8,width:2,borderRadius:1,background:(function(){var donePct=steps.length>1?Math.round(stepsDone/(steps.length-1)*100):0;return"linear-gradient(180deg,"+T.success+" "+Math.min(donePct,100)+"%,"+T.border+" "+Math.min(donePct,100)+"%)"})()}}/>}
        {steps.map(function(s,i){var isNext=!s.done&&(i===0||steps[i-1].done);var nodeSize=isNext?18:s.done?14:12;var sDl=s.deadline?daysTo(s.deadline):null;

          if(batchMode){var isSel=!!sel[i];
            return<div key={s.id} onClick={function(){toggleSel(i)}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:7,background:isSel?T.accent+"10":s.done?"rgba(0,184,148,0.03)":"transparent",border:"1px solid "+(isSel?T.accent+"30":"transparent"),marginBottom:2,cursor:"pointer"}}>
              <div style={{width:18,height:18,borderRadius:4,border:"2px solid "+(isSel?T.accent:T.border),background:isSel?T.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{isSel&&<Ic n="check" s={10} c="#fff"/>}</div>
              <span style={{fontSize:9,fontWeight:600,color:T.subtle,fontFamily:"'JetBrains Mono',monospace",width:16,flexShrink:0}}>{i+1}</span>
              <span style={{fontSize:11,fontWeight:500,color:s.done?T.muted:T.text,textDecoration:s.done?"line-through":"none",flex:1}}>{s.text}</span>
              {s.deadline&&<span style={{fontSize:8,fontWeight:600,color:dlC(sDl,s.done),flexShrink:0}}>{dlL(sDl)}</span>}
              {s.done&&<Ic n="check" s={10} c={T.success}/>}
            </div>}

          return<div key={s.id} style={{position:"relative",marginBottom:i<steps.length-1?(isNext?8:4):0,animation:"fi .08s ease-out "+(i*0.02)+"s both"}}>
            <div style={{position:"absolute",left:-24,top:isNext?3:5,width:nodeSize,height:nodeSize,borderRadius:"50%",background:s.done?T.success:isNext?"linear-gradient(135deg,"+tierC+","+T.accent+")":T.surface,border:s.done||isNext?"none":"2px solid "+T.border,display:"flex",alignItems:"center",justifyContent:"center",zIndex:2,animation:isNext?"pulse 2s infinite":"none",boxShadow:isNext?"0 0 8px "+tierC+"40":"none"}}>
              {s.done&&<Ic n="check" s={nodeSize>14?8:7} c="#fff"/>}
              {isNext&&<div style={{width:6,height:6,borderRadius:3,background:"#fff"}}/>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:isNext?"8px 12px":"5px 12px",borderRadius:7,background:isNext?tierC+"10":s.done?"rgba(0,184,148,0.03)":"transparent",border:isNext?"1px solid "+tierC+"20":"1px solid transparent"}}>
              <button onClick={function(){var ns=[...steps];ns[i]={...s,done:!s.done,doneDate:s.done?null:today};updPj(pjId,{steps:ns})}} style={{width:18,height:18,borderRadius:5,border:s.done?"none":"2px solid "+(isNext?tierC:T.border),background:s.done?T.success:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s.done&&<Ic n="check" s={10} c="#fff"/>}</button>
              <span style={{fontSize:isNext?12:11,fontWeight:isNext?700:500,color:s.done?T.muted:T.text,textDecoration:s.done?"line-through":"none",flex:1}}>{s.text}</span>
              {sDl!==null&&<span style={{fontSize:8,fontWeight:600,color:dlC(sDl,s.done),flexShrink:0}}>{dlL(sDl)}</span>}
              {!s.deadline&&!s.done&&<input type="date" onChange={function(e){var ns=[...steps];ns[i]={...s,deadline:e.target.value||null};updPj(pjId,{steps:ns})}} style={{width:16,height:16,opacity:0.3,cursor:"pointer",background:"none",border:"none",color:T.muted,fontSize:0,padding:0}} title="Satt deadline"/>}
              {isNext&&<span style={{fontSize:7,fontWeight:700,padding:"2px 6px",borderRadius:4,background:tierC+"20",color:tierC}}>NASTA</span>}
              <button onClick={function(){updPj(pjId,{steps:steps.filter(function(_,j){return j!==i})})}} style={{background:"none",border:"none",cursor:"pointer",opacity:0.2}}><Ic n="x" s={9} c={T.muted}/></button>
            </div>
          </div>;

  }
  function exportRm(){var exp={version:"2.0",exported:today,roadmaps:{}};(D.companies||[]).forEach(c=>{if(c.roadmap&&c.roadmap.length){var rmData={roadmap:c.roadmap.map(function(v){var vTasks=(c.projects||[]).reduce(function(a,p){return a.concat((p.tasks||[]).filter(function(t){return t.version===v.v}).map(function(t){return{text:t.text,priority:t.priority,deadline:t.deadline,done:t.done}}))},[]);var vMs=(c.projects||[]).reduce(function(a,p){return a.concat((p.milestones||[]).filter(function(m){return m.version===v.v}).map(function(m){return{name:m.name,targetDate:m.targetDate,done:m.done}}))},[]);return{v:v.v,t:v.t,status:v.status,notes:v.notes||"",targetDate:v.targetDate||null,tasks:vTasks,milestones:vMs}}),context:c.lastContext||"",decisions:(c.decisions||[]).slice(0,10),phase:(c.projects&&c.projects[0]?c.projects[0].phase:null)||"idea"};exp.roadmaps[c.name]=rmData}});var blob=new Blob([JSON.stringify(exp,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="km-roadmaps-"+today+".json";a.click()}

        var nodeSize=isActive?24:isDone?16:14;

            </div>
            {/* Beskrivning */}
            <div style={{fontSize:8,fontWeight:600,color:T.subtle,marginBottom:4}}>Beskrivning</div>
            {v.description&&!v._editDesc?<div onClick={e=>{e.stopPropagation();updVersion(it.type,it.id,v.id,{_editDesc:true})}} style={{padding:"8px 10px",borderRadius:6,background:T.surface,border:"1px solid "+T.border,fontSize:10,color:T.text,lineHeight:1.5,marginBottom:8,cursor:"pointer",whiteSpace:"pre-wrap"}}>{v.description}</div>:<textarea value={v.description||""} onChange={e=>updVersion(it.type,it.id,v.id,{description:e.target.value,_editDesc:undefined})} placeholder="Detaljerad beskrivning av vad som ska byggas i denna version..." rows={3} style={{width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid "+T.accent+"30",background:T.surface,color:T.text,fontSize:10,outline:"none",resize:"vertical",lineHeight:1.5,marginBottom:8}} onClick={e=>e.stopPropagation()}/>}

              <option value="">Inget beroende</option>

/* ── ROADMAP WIZARD ── */
function RmWizard({onApply,onFullImport,onImport,itemName}){
  const[step,setStep]=useState(0);const[selTpl,setSelTpl]=useState(null);const[preview,setPreview]=useState([]);const[editIdx,setEditIdx]=useState(null);const[editTxt,setEditTxt]=useState("");
  function selectTemplate(k){setSelTpl(k);var tpl=RM_TEMPLATES[k];setPreview(tpl.items.map(i=>({...i})));setStep(1)}
  function removePreview(i){setPreview(preview.filter((_,j)=>j!==i))}
  function addPreview(){setPreview([...preview,{v:"V0."+(preview.length+1),t:"Ny version"}])}
  function startEdit(i){setEditIdx(i);setEditTxt(preview[i].t)}
  function saveEdit(){if(editIdx!==null){var np=[...preview];np[editIdx]={...np[editIdx],t:editTxt};setPreview(np);setEditIdx(null)}}
  function handleImport(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var data=JSON.parse(ev.target.result);
    /* Format 1: single company {company,roadmap,tasks,...} */
    if(data.company&&data.roadmap){
      if(data.company.toLowerCase()===itemName.toLowerCase()){
        var hasTasks=data.roadmap.some(function(v){return v.tasks&&v.tasks.length});
        if(hasTasks&&onFullImport){onFullImport(data);return}
        onImport(data.roadmap.map(v=>({...v,id:v.id||uid(),status:v.status||"pending",notes:v.notes||"",description:v.description||"",targetDate:v.targetDate||null})));return}
      alert("Filen ar for "+data.company+", inte "+itemName)}
    /* Format 2: multi {roadmaps:{Name:{roadmap,...}}} */
    else if(data.roadmaps){
      var rm=data.roadmaps[itemName];
      if(rm){
        if(rm.roadmap){var ht=rm.roadmap.some(function(v){return v.tasks&&v.tasks.length});if(ht&&onFullImport){onFullImport(rm);return}onImport(rm.roadmap.map(v=>({...v,id:v.id||uid(),status:v.status||"pending",notes:v.notes||"",description:v.description||"",targetDate:v.targetDate||null})));return}
        if(Array.isArray(rm)){onImport(rm.map(v=>({...v,id:v.id||uid()})));return}
      }
      alert("Hittade ingen roadmap for "+itemName+" i filen")}
    else alert("Okant filformat")
  }catch(e){alert("Kunde inte lasa filen: "+e.message)}};r.readAsText(f)}

  if(step===0)return<div style={{animation:"fi .2s ease-out"}}>
    <div style={{textAlign:"center",marginBottom:16}}>
      <div style={{fontSize:28,marginBottom:6}}>🗺️</div>
      <div style={{fontSize:16,fontWeight:800}}>Bygg din roadmap</div>
      <div style={{fontSize:11,color:T.muted,marginTop:4}}>Valj en mall, importera fran fil, eller bygg fran noll</div>
    </div>
    {/* Import fran fil — forval */}
    <div style={{background:"linear-gradient(135deg,rgba(108,92,231,0.08),rgba(0,206,201,0.06))",border:"1px solid rgba(108,92,231,0.15)",borderRadius:10,padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
      <label style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,"+T.accent+","+T.accent2+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="file" s={16} c="#fff"/></div>
        <div><div style={{fontSize:12,fontWeight:700,color:T.accent}}>Importera fran fil</div><div style={{fontSize:9,color:T.muted}}>Ladda upp JSON-fil fran en chatt med Claude</div></div>
        <input type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
      </label>
    </div>
    {/* Mallar */}
    <div style={{fontSize:10,fontWeight:600,color:T.subtle,marginBottom:6}}>Eller valj en mall:</div>
    {Object.entries(RM_TEMPLATES).map(([k,tpl])=><button key={k} onClick={()=>selectTemplate(k)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"11px 14px",borderRadius:9,border:"1px solid "+T.border,background:T.card,color:T.text,fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:4,textAlign:"left"}}>
      <div style={{width:28,height:28,borderRadius:6,background:T.surface,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:13}}>{{ecommerce:"🛒",platform:"🌐",affiliate:"🔗",tool:"⚙️",personal:"⭐",custom:"📝"}[k]}</span></div>
      <div style={{flex:1}}><div>{tpl.l}</div><div style={{fontSize:9,color:T.subtle}}>{tpl.items.length} versioner</div></div>
      <Ic n="target" s={12} c={T.subtle}/>
    </button>)}
  </div>;

  if(step===1)return<div style={{animation:"fi .2s ease-out"}}>
    <button onClick={()=>setStep(0)} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",color:T.accent,fontSize:10,fontWeight:600,cursor:"pointer",marginBottom:10}}>&larr; Tillbaka</button>
    <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>Anpassa din roadmap</div>
    <div style={{fontSize:10,color:T.muted,marginBottom:12}}>Redigera, ta bort eller lagg till versioner innan du skapar:</div>
    {preview.map((p,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 10px",borderRadius:7,background:T.card,border:"1px solid "+T.border,marginBottom:3}}>
      <span style={{fontSize:9,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:T.accent,minWidth:32}}>{p.v}</span>
      {editIdx===i?<input value={editTxt} onChange={e=>setEditTxt(e.target.value)} onBlur={saveEdit} onKeyDown={e=>{if(e.key==="Enter")saveEdit()}} autoFocus style={{flex:1,padding:"3px 6px",borderRadius:4,border:"1px solid "+T.accent,background:T.surface,color:T.text,fontSize:11,outline:"none"}}/>:<span onClick={()=>startEdit(i)} style={{fontSize:11,flex:1,cursor:"pointer"}}>{p.t}</span>}
      {p.v.includes("1.0")&&<span style={{fontSize:8}}>🚀</span>}
      <button onClick={()=>removePreview(i)} style={{background:"none",border:"none",cursor:"pointer",opacity:0.3}}><Ic n="x" s={9} c={T.muted}/></button>
    </div>)}
    <button onClick={addPreview} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 10px",borderRadius:6,border:"1px dashed "+T.border,background:"transparent",color:T.muted,fontSize:9,fontWeight:600,cursor:"pointer",width:"100%",marginTop:4,marginBottom:14}}><Ic n="plus" s={10} c={T.muted}/> Lagg till</button>
    <Btn primary onClick={()=>{var rm=preview.map(i=>({id:uid(),v:i.v,t:i.t,status:"pending",notes:"",targetDate:null}));onImport(rm)}} style={{width:"100%",padding:"12px 0",fontSize:13,borderRadius:10}}>Skapa roadmap ({preview.length} versioner)</Btn>
  </div>;
}

/* ── SCROLL TO TOP ── */
function ScrollTop(){
  const[show,setShow]=useState(false);
  useEffect(()=>{function onScroll(){setShow(window.scrollY>400)};window.addEventListener("scroll",onScroll);return()=>window.removeEventListener("scroll",onScroll)},[]);
  if(!show)return null;
  return<button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})} style={{position:"fixed",bottom:"calc(56px + env(safe-area-inset-bottom, 10px))",left:16,width:36,height:36,borderRadius:10,background:T.card,border:"1px solid "+T.border,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:88,boxShadow:"0 2px 10px rgba(0,0,0,0.3)",animation:"fi .15s ease-out"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.muted} strokeWidth="2" strokeLinecap="round"><path d="M18 15l-6-6-6 6"/></svg></button>;
}

/* ── COMPLETED TOGGLE ── */
function CompletedToggle({tasks,onClear,onToggle}){
  const[show,setShow]=useState(false);
  return<div style={{marginTop:8}}>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <button onClick={()=>setShow(!show)} style={{background:"none",border:"none",cursor:"pointer",fontSize:9,color:T.subtle,fontWeight:600,display:"flex",alignItems:"center",gap:3}}><Ic n={show?"x":"check"} s={9} c={T.subtle}/> {show?"Gom":"Visa"} klara ({tasks.length})</button>
      {show&&<button onClick={()=>{if(confirm("Rensa alla klara tasks?"))onClear()}} style={{background:"none",border:"none",cursor:"pointer",fontSize:8,color:T.danger,fontWeight:600}}>Rensa alla</button>}
    </div>
    {show&&tasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 10px",borderRadius:7,background:"rgba(0,184,148,0.03)",border:"1px solid rgba(0,184,148,0.06)",marginTop:2}}>
      <button onClick={()=>onToggle(t.id)} style={{width:16,height:16,borderRadius:4,background:T.success,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="check" s={9} c="#fff"/></button>
      <span style={{fontSize:11,color:T.muted,textDecoration:"line-through",flex:1}}>{t.text}</span>

/* ── GLOBAL SEARCH ── */
function GlobalSearch({D,goCo}){

  if(q.trim().length>=2){var lq=q.toLowerCase();
    (D.companies||[]).forEach(c=>{
      if(c.name.toLowerCase().includes(lq))results.push({type:"co",label:c.name,sub:"Foretag",color:c.color,go:()=>goCo(c.id)});
      c.projects.forEach(p=>{
        if(p.name.toLowerCase().includes(lq))results.push({type:"pj",label:p.name,sub:c.name,color:c.color,go:()=>goCo(c.id,p.id)});
        p.tasks.forEach(t=>{if(t.text.toLowerCase().includes(lq))results.push({type:"tk",label:t.text,sub:c.name+" → "+p.name,color:c.color,done:t.done,go:()=>goCo(c.id,p.id)})});

    });
    (D.inbox||[]).forEach(it=>{if(it.text.toLowerCase().includes(lq))results.push({type:"in",label:it.text,sub:"Inbox",color:T.accent2})});
  }
  return<div style={{position:"relative",marginBottom:14}}>
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 11px",borderRadius:9,background:T.card,border:"1px solid "+(open?T.accent:T.border)}}><Ic n="search" s={14} c={open?T.accent:T.subtle}/><input value={q} onChange={e=>{setQ(e.target.value);setOpen(true)}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),200)} placeholder="Sok foretag, projekt, tasks..." style={{flex:1,background:"none",border:"none",color:T.text,fontSize:12,fontWeight:500,outline:"none"}}/>{q&&<button onClick={()=>{setQ("");setOpen(false)}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic n="x" s={12} c={T.subtle}/></button>}</div>
    {open&&results.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:60,marginTop:4,background:T.card,border:"1px solid "+T.border,borderRadius:10,maxHeight:240,overflowY:"auto",boxShadow:"0 8px 30px rgba(0,0,0,0.4)"}}>
      {results.slice(0,12).map((r,i)=><div key={i} onMouseDown={e=>{e.preventDefault();if(r.go)r.go();setQ("");setOpen(false)}} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",borderBottom:i<results.length-1?"1px solid "+T.border:"none"}}>

      </div>)}
    </div>}
  </div>;
}

  var masterPrompt="Jag anvander KM Business Dashboard. Hjalp mig generera en JSON-fil som jag kan importera.\n\nMina foretag: "+coNames.join(", ")+"\n\nGenerera en JSON-fil i EXAKT detta format (fyll i relevant data baserat pa var diskussion):\n\n```json\n{\n  \"fokus\": {\n    \"items\": [\n      { \"text\": \"Beskrivning\", \"category\": \"comm|meeting|admin|decision\", \"priority\": \"high|medium|low\", \"company\": \"Foretagsnamn|null\", \"deadline\": \"2026-04-01|null\" }\n    ],\n    \"recurring\": [\n      { \"text\": \"Daglig uppgift\", \"category\": \"admin\", \"company\": \"Foretagsnamn|null\", \"repeat\": \"daily|weekly\", \"days\": [1,2,3,4,5] }\n    ],\n    \"routines\": [\n      { \"text\": \"Kolla X\", \"company\": \"Foretagsnamn|null\" }\n    ]\n  },\n  \"companies\": {\n    \"Foretagsnamn\": {\n      \"apps\": [\n        { \"name\": \"Appnamn\", \"type\": \"app|social|payment|email|hosting|analytics|other\", \"url\": \"https://...\", \"username\": \"user\", \"password\": \"pw\", \"apiKey\": \"\", \"notes\": \"\" }\n      ],\n      \"routines\": [\n        { \"text\": \"Daglig check\" }\n      ]\n    }\n  },\n  \"private\": {\n    \"projects\": [\n      { \"project\": \"Projektnamn\", \"tier\": \"+|++|+++\", \"steps\": [\"Steg 1\", \"Steg 2\"], \"list\": [\"Sak att kopa\"], \"notes\": \"Kontext\", \"links\": [\"https://...\"] }\n    ]\n  }\n}\n```\n\nVIKTIGT:\n- Inkludera BARA sektioner som ar relevanta\n- category: comm=mail/kommunikation, meeting=moten, admin=fakturor/avtal, decision=beslut\n- tier: +=klar idag, ++=vecka, +++=langtid\n- Svara med BARA JSON-filen, inget annat";

  var coPrompt=selCo?"Jag anvander KM Business Dashboard. Hjalp mig satta upp allt for "+selCo+".\n\nGenerera en JSON-fil med alla appar, konton, dagliga rutiner och fokus-items for "+selCo+".\n\nFormat:\n```json\n{\n  \"companies\": {\n    \""+selCo+"\": {\n      \"apps\": [\n        { \"name\": \"Appnamn\", \"type\": \"app|social|payment|email|hosting|analytics|other\", \"url\": \"\", \"username\": \"\", \"password\": \"\", \"apiKey\": \"\", \"notes\": \"\" }\n      ],\n      \"routines\": [\n        { \"text\": \"Daglig check att gora\" }\n      ]\n    }\n  },\n  \"fokus\": {\n    \"recurring\": [\n      { \"text\": \"Aterkommande uppgift\", \"category\": \"admin\", \"company\": \""+selCo+"\", \"repeat\": \"daily\" }\n    ]\n  }\n}\n```\n\nInkludera ALLA appar/tjanster som "+selCo+" anvander (Vercel, Stripe, Instagram, Google Analytics, etc). Skriv in mina riktiga inloggningsuppgifter om jag ger dem, annars lamna tomt.\nSvara med BARA JSON.":"";

  var privatPrompt="Jag anvander KM Business Dashboard. Hjalp mig organisera ett personligt projekt.\n\nNar vi diskuterat klart, generera en JSON-fil:\n```json\n{\n  \"private\": {\n    \"projects\": [\n      {\n        \"project\": \"Projektnamn\",\n        \"tier\": \"+|++|+++\",\n        \"steps\": [\"Steg 1\", \"Steg 2\", \"Steg 3\"],\n        \"list\": [\"Sak att kopa/skaffa\"],\n        \"notes\": \"Viktig info och kontext\",\n        \"links\": [\"https://relevant-lank.com\"]\n      }\n    ]\n  }\n}\n```\n\ntier: +=klar idag, ++=tar en vecka, +++=langtidsprojekt\nSvara med BARA JSON-filen.";

  var clipStyle={padding:"5px 8px",borderRadius:5,fontSize:8,fontWeight:700,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#e84393,#6c5ce7)",color:"#fff"};

  return<div style={{maxHeight:"70vh",overflowY:"auto"}}>
    <div style={{textAlign:"center",marginBottom:12}}><span style={{fontSize:24}}>⚡</span><div style={{fontSize:16,fontWeight:800,marginTop:2}}>Claude Synk</div><div style={{fontSize:10,color:T.muted,marginTop:2}}>Importera data fran Claude-chattar</div></div>

    {/* Tabs */}
    <div style={{display:"flex",gap:3,marginBottom:14}}>
      {[["import","📥 Master-import"],["prompt","📋 Prompts"],["format","📖 Format"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"7px 0",borderRadius:7,fontSize:10,fontWeight:700,border:"1px solid "+(tab===k?"#e84393":T.border),background:tab===k?"rgba(232,67,147,0.1)":"transparent",color:tab===k?"#e84393":T.muted,cursor:"pointer"}}>{l}</button>)}
    </div>

    {/* MASTER IMPORT */}
    {tab==="import"&&<div>
      <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Ladda upp en JSON-fil fran valfri Claude-chatt</div>
      <div style={{fontSize:9,color:T.muted,marginBottom:10}}>Filen kan innehalla fokus-items, aterkommande, rutiner, appar/konton och privata projekt — allt routas automatiskt till ratt stalle.</div>
      <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"20px 16px",borderRadius:10,border:"2px dashed #e84393"+"40",background:"rgba(232,67,147,0.04)",cursor:"pointer",marginBottom:10}}>
        <Ic n="activity" s={20} c="#e84393"/>
        <div><div style={{fontSize:12,fontWeight:700,color:"#e84393"}}>Valj JSON-fil</div><div style={{fontSize:9,color:T.muted}}>Master-import — allt hamnar pa ratt plats</div></div>
        <input type="file" accept=".json" onChange={masterImport} style={{display:"none"}}/>
      </label>
      <div style={{fontSize:9,color:T.subtle,lineHeight:1.5}}>Stod for: fokus.items, fokus.recurring, fokus.routines, companies.[namn].apps, companies.[namn].routines, private.projects</div>
    </div>}

    {/* PROMPTS */}
    {tab==="prompt"&&<div>
      {/* Master-prompt */}
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:700}}>⚡ Master-prompt (allt)</div>
          <button onClick={()=>copy(masterPrompt,"master")} style={clipStyle}>{copied==="master"?"✓ Kopierad!":"Kopiera"}</button>
        </div>
        <div style={{padding:"8px 10px",borderRadius:6,background:T.surface,border:"1px solid "+T.border,fontSize:8,color:T.muted,maxHeight:80,overflowY:"auto",lineHeight:1.5,fontFamily:"'JetBrains Mono',monospace",whiteSpace:"pre-wrap"}}>{masterPrompt.slice(0,200)}...</div>
      </div>

      {/* Per-företag */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,marginBottom:6}}>🏢 Per foretag</div>
        <select value={selCo} onChange={e=>setSelCo(e.target.value)} style={{...IS,fontSize:11}}>
          <option value="">Valj foretag...</option>
          {cos.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
        </select>
        {selCo&&<div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4}}>
            <button onClick={()=>copy(coPrompt,"co")} style={clipStyle}>{copied==="co"?"✓ Kopierad!":"Kopiera"}</button>
          </div>
          <div style={{padding:"8px 10px",borderRadius:6,background:T.surface,border:"1px solid "+T.border,fontSize:8,color:T.muted,maxHeight:80,overflowY:"auto",lineHeight:1.5,fontFamily:"'JetBrains Mono',monospace",whiteSpace:"pre-wrap"}}>{coPrompt.slice(0,200)}...</div>
        </div>}
      </div>

      {/* Privat */}
      <div style={{marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:700}}>🏠 Privat projekt</div>
          <button onClick={()=>copy(privatPrompt,"privat")} style={clipStyle}>{copied==="privat"?"✓ Kopierad!":"Kopiera"}</button>
        </div>
        <div style={{padding:"8px 10px",borderRadius:6,background:T.surface,border:"1px solid "+T.border,fontSize:8,color:T.muted,maxHeight:80,overflowY:"auto",lineHeight:1.5,fontFamily:"'JetBrains Mono',monospace",whiteSpace:"pre-wrap"}}>{privatPrompt.slice(0,200)}...</div>
      </div>
    </div>}

    {/* FORMAT-GUIDE */}
    {tab==="format"&&<div style={{fontSize:9,color:T.muted,lineHeight:1.7}}>
      <div style={{fontSize:11,fontWeight:700,color:T.text,marginBottom:6}}>JSON-format guide</div>

      <div style={{fontWeight:700,color:T.accent,marginTop:8}}>Fokus — items (operativa tasks)</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>category: "comm" | "meeting" | "admin" | "decision"</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>priority: "high" | "medium" | "low"</div>

      <div style={{fontWeight:700,color:T.accent2,marginTop:8}}>Fokus — recurring (aterkommande)</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>repeat: "daily" | "weekly"</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>days: [0-6] (0=son, 1=man...6=lor)</div>

      <div style={{fontWeight:700,color:T.success,marginTop:8}}>Foretag — apps</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>type: "app" | "social" | "payment" | "email" | "hosting" | "analytics" | "other"</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>falt: name, url, username, password, apiKey, notes</div>

      <div style={{fontWeight:700,color:"#e84393",marginTop:8}}>Privat — projects</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>tier: "+" (dag) | "++" (vecka) | "+++" (langtid)</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>falt: project, steps[], list[], notes, links[]</div>

      <div style={{fontWeight:700,color:T.warning,marginTop:8}}>Rutiner (Operations Pulse)</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,padding:"4px 8px",borderRadius:4,background:T.surface,marginTop:2}}>Kan ligga i fokus.routines ELLER companies.Namn.routines</div>
    </div>}

    <Btn onClick={onClose} style={{width:"100%",marginTop:12}}>Stang</Btn>
  </div>;
}

/* ── ANNUAL GOAL WIZARD ── */
function AnnualGoalWizard({cos,onSave,onClose}){
  const[step,setStep]=useState(0);const[co,setCo]=useState("");const[goal,setGoal]=useState("");const[dl,setDl]=useState("");const[subs,setSubs]=useState([]);const[subTxt,setSubTxt]=useState("");const[subMonth,setSubMonth]=useState("");
  var months=[];if(dl){var now=new Date();var end=new Date(dl+"T12:00");var cur=new Date(now.getFullYear(),now.getMonth(),1);while(cur<=end){months.push(cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0"));cur.setMonth(cur.getMonth()+1)}}
  function addSub(){if(!subTxt.trim())return;setSubs([...subs,{id:uid(),text:subTxt.trim(),targetMonth:subMonth||null,done:false}]);setSubTxt("");setSubMonth("")}
  function removeSub(id){setSubs(subs.filter(s=>s.id!==id))}
  var monthNames={"01":"Jan","02":"Feb","03":"Mar","04":"Apr","05":"Maj","06":"Jun","07":"Jul","08":"Aug","09":"Sep","10":"Okt","11":"Nov","12":"Dec"};
  function fmtMonth(m){if(!m)return"";var p=m.split("-");return(monthNames[p[1]]||p[1])+" "+p[0]}

  if(step===0)return<div style={{animation:"fi .15s ease-out"}}>
    <div style={{textAlign:"center",marginBottom:14}}><span style={{fontSize:28}}>🎯</span><div style={{fontSize:16,fontWeight:800,marginTop:4}}>Nytt arsmal</div><div style={{fontSize:10,color:T.muted,marginTop:2}}>Satt upp ett 6-manaders mal</div></div>
    <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Vilket foretag?</div>
    {cos.map(c=><button key={c.id} onClick={()=>{setCo(c.name);setStep(1)}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+(co===c.name?c.color:T.border),background:co===c.name?c.color+"10":"transparent",color:T.text,fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:3}}>
      <div style={{width:24,height:24,borderRadius:5,background:c.color,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n={c.icon||"briefcase"} s={11} c="#fff"/></div>{c.name}
    </button>)}
    <button onClick={()=>{setCo("Personligt");setStep(1)}} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"10px 14px",borderRadius:8,border:"1px dashed "+T.border,background:"transparent",color:T.muted,fontSize:12,fontWeight:600,cursor:"pointer",marginTop:4}}>
      <div style={{width:24,height:24,borderRadius:5,background:T.accent2+"30",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="user" s={11} c={T.accent2}/></div>Personligt mal
    </button>
    <Btn onClick={onClose} style={{width:"100%",marginTop:10}}>Avbryt</Btn>
  </div>;

  if(step===1)return<div style={{animation:"fi .15s ease-out"}}>
    <button onClick={()=>setStep(0)} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",color:T.accent,fontSize:10,fontWeight:600,cursor:"pointer",marginBottom:10}}>&larr; Tillbaka</button>
    <div style={{fontSize:9,fontWeight:700,color:T.accent,marginBottom:4}}>{co}</div>
    <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Vad ar malet?</div>
    <textarea value={goal} onChange={e=>setGoal(e.target.value)} placeholder="T.ex. Launcha DamSmycken och na 100 kunder..." rows={3} autoFocus style={{...IS,resize:"vertical",lineHeight:1.5}}/>
    <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>Deadline</div>
    <input type="date" value={dl} onChange={e=>setDl(e.target.value)} style={{...IS,fontSize:11}}/>
    {!dl&&<div style={{display:"flex",gap:4,marginBottom:8}}>{[{l:"3 man",d:90},{l:"6 man",d:180},{l:"1 ar",d:365}].map(opt=>{var dd=new Date();dd.setDate(dd.getDate()+opt.d);return<button key={opt.l} onClick={()=>setDl(dk(dd))} style={{flex:1,padding:"6px 0",borderRadius:6,border:"1px solid "+T.border,background:"transparent",color:T.muted,fontSize:10,fontWeight:600,cursor:"pointer"}}>{opt.l}</button>})}</div>}
    <Btn primary disabled={!goal.trim()||!dl} onClick={()=>setStep(2)} style={{width:"100%",padding:"10px 0",marginTop:4}}>Nasta: Delmal →</Btn>
  </div>;

  if(step===2)return<div style={{animation:"fi .15s ease-out"}}>
    <button onClick={()=>setStep(1)} style={{display:"flex",alignItems:"center",gap:3,background:"none",border:"none",color:T.accent,fontSize:10,fontWeight:600,cursor:"pointer",marginBottom:10}}>&larr; Tillbaka</button>
    <div style={{fontSize:9,fontWeight:700,color:T.accent,marginBottom:2}}>{co}</div>
    <div style={{fontSize:11,fontWeight:600,color:T.text,marginBottom:8,padding:"6px 10px",borderRadius:6,background:T.surface}}>{goal}</div>
    <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>Delmal (valfritt)</div>
    <div style={{fontSize:9,color:T.muted,marginBottom:8}}>Bryt ner ditt mal i steg — valj manad for varje</div>
    {subs.map((s,i)=><div key={s.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:6,background:T.card,border:"1px solid "+T.border,marginBottom:3}}>
      <div style={{width:6,height:6,borderRadius:3,background:T.accent}}/>
      <span style={{fontSize:11,flex:1}}>{s.text}</span>
      {s.targetMonth&&<span style={{fontSize:8,fontWeight:600,color:T.accent,padding:"1px 5px",borderRadius:3,background:T.accent+"12"}}>{fmtMonth(s.targetMonth)}</span>}
      <button onClick={()=>removeSub(s.id)} style={{background:"none",border:"none",cursor:"pointer",opacity:0.3}}><Ic n="x" s={9} c={T.muted}/></button>
    </div>)}
    <div style={{display:"flex",gap:4,marginBottom:4}}><input value={subTxt} onChange={e=>setSubTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addSub()}} placeholder="Delmal..." style={{...IS,marginBottom:0,flex:1,fontSize:11}}/>
      {months.length>0&&<select value={subMonth} onChange={e=>setSubMonth(e.target.value)} style={{...IS,marginBottom:0,width:90,fontSize:10,padding:"5px 6px"}}><option value="">Manad</option>{months.map(m=><option key={m} value={m}>{fmtMonth(m)}</option>)}</select>}
      <Btn onClick={addSub} style={{padding:"6px 10px"}}>+</Btn>
    </div>
    <div style={{display:"flex",gap:6,marginTop:14}}>
      <Btn onClick={onClose}>Avbryt</Btn>
      <Btn primary onClick={()=>onSave({company:co,goal:goal.trim(),deadline:dl,subgoals:subs})} style={{flex:1}}>Spara arsmal</Btn>
    </div>
  </div>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
