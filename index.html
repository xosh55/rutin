function TrackerPanel({trackerData,saveTracker,checks,items,ouraCache,pepConfig,savePepConfig}){
  var td=trackerData||DEFAULT_TRACKER;
  var pc=pepConfig||DEFAULT_PEPTIDE_CONFIG;
  var weightArr=td.weight||[];
  var vials=td.vials||DEFAULT_TRACKER.vials;
  var startW=td.startWeight||108;
  var goalW=td.goalWeight||68;
  var latestW=weightArr.length>0?weightArr[weightArr.length-1].kg:null;
  const[wInput,setWInput]=useState("");
  const[wDate,setWDate]=useState(dk(new Date()));
  const[wRange,setWRange]=useState("30d");
  const[editVial,setEditVial]=useState(null);
  const[vialInput,setVialInput]=useState("");
  const[editPep,setEditPep]=useState(null);
  const[photoNote,setPhotoNote]=useState("");
  const[photoDate,setPhotoDate]=useState(dk(new Date()));

  var photoLog=td.photoLog||[];

  function savePhotoEntry(){
    var np=photoLog.slice();
    np.push({date:photoDate,note:photoNote.trim()||"Progressfoto taget",id:uid()});
    np.sort(function(a,b){return a.date<b.date?-1:1});
    saveTracker(Object.assign({},td,{photoLog:np}));
    setPhotoNote("");setPhotoDate(dk(new Date()));
  }

  function removePhotoEntry(pid){
    var np=photoLog.filter(function(p){return p.id!==pid});
    saveTracker(Object.assign({},td,{photoLog:np}));
  }

  // Biweekly photo reminder check
  var needsPhoto=false;
  if(photoLog.length===0){needsPhoto=true}
  else{
    var lastPhoto=photoLog[photoLog.length-1];
    var daysSinceLast=Math.floor((now-new Date(lastPhoto.date))/86400000);
    if(daysSinceLast>=14)needsPhoto=true;
  }

  function saveWeight(){
    if(!wInput||isNaN(wInput))return;
    var useDate=wDate||dk(new Date());
    var nw=weightArr.filter(function(w){return w.date!==useDate});
    nw.push({date:useDate,kg:parseFloat(wInput)});
    nw.sort(function(a,b){return a.date<b.date?-1:1});
    saveTracker(Object.assign({},td,{weight:nw}));
    setWInput("");setWDate(dk(new Date()));
  }

  function updateVial(vid){
    if(!vialInput||isNaN(vialInput))return;
    var todayStr=dk(new Date());
    var nv=vials.map(function(v){return v.id===vid?Object.assign({},v,{remainingMl:parseFloat(vialInput),resetDate:todayStr,mlAtReset:parseFloat(vialInput)}):v});
    saveTracker(Object.assign({},td,{vials:nv}));
    setEditVial(null);setVialInput("");
  }

  function autoCalcVial(v){
    if(!v.doses||v.doses.length===0)return v.remainingMl;
    var rd=v.resetDate||"2026-03-28";
    var base=v.mlAtReset!=null?v.mlAtReset:v.totalMl;
    var consumed=0;
    var startD=new Date(rd);
    var today=new Date();today.setHours(0,0,0,0);
    var d=new Date(startD);
    while(d<=today){
      var ds=dk(d);
      var dayChecks=checks[ds];
      if(dayChecks){
        v.doses.forEach(function(dose){
          if(dayChecks[dose.itemId])consumed+=dose.ml;
        });
      }
      d.setDate(d.getDate()+1);
    }
    return Math.max(0,Math.round((base-consumed)*100)/100);
  }

  // Weight change calcs
  var now=new Date();
  var weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);
  var monthAgo=new Date(now);monthAgo.setDate(monthAgo.getDate()-30);
  var weekAgoStr=dk(weekAgo),monthAgoStr=dk(monthAgo);
  var wThisWeek=null,wThisMonth=null;
  if(latestW&&weightArr.length>1){
    var weekW=weightArr.filter(function(w){return w.date>=weekAgoStr});
    if(weekW.length>1)wThisWeek=Math.round((weekW[weekW.length-1].kg-weekW[0].kg)*10)/10;
    var monthW=weightArr.filter(function(w){return w.date>=monthAgoStr});
    if(monthW.length>1)wThisMonth=Math.round((monthW[monthW.length-1].kg-monthW[0].kg)*10)/10;
  }
  var totalLoss=latestW!=null?Math.round((startW-latestW)*10)/10:startW-72;

  // Weight graph data
  var filteredW=weightArr;
  if(wRange==="7d"){var d7=dk(new Date(now.getTime()-7*86400000));filteredW=weightArr.filter(function(w){return w.date>=d7})}
  else if(wRange==="30d"){var d30=dk(new Date(now.getTime()-30*86400000));filteredW=weightArr.filter(function(w){return w.date>=d30})}
  else if(wRange==="90d"){var d90=dk(new Date(now.getTime()-90*86400000));filteredW=weightArr.filter(function(w){return w.date>=d90})}
  var graphData=filteredW.map(function(w){return{v:w.kg,l:w.date.substring(5)}});

  // Peptide cycle status with phases
  var todayStr=dk(now);
  function getCycleStatus(c){
    var ov=pc.overrides&&pc.overrides[c.id];
    if(ov&&ov.paused)return{status:"PAUS",daysLeft:null,progress:null,dayNum:0,total:c.cycleLen,phase:null,phaseName:"Pausad manuellt"};
    var startD=new Date(c.start);
    var diffDays=Math.floor((now-startD)/86400000);
    if(diffDays<0)return{status:"KOMMANDE",daysLeft:Math.abs(diffDays),progress:0,dayNum:0,total:c.cycleLen||0,phase:null,phaseName:null};
    // Find active phase
    var activePhase=null;
    if(c.phases&&c.phases.length>0){
      for(var i=c.phases.length-1;i>=0;i--){
        var p=c.phases[i];
        if(p.startDay!=null&&diffDays>=p.startDay){
          if(p.endDay==null||diffDays<=p.endDay){activePhase=p;break}
        }
      }
      if(!activePhase)activePhase=c.phases[c.phases.length-1];
    }
    if(!c.cycleLen)return{status:"AKTIV",daysLeft:null,progress:null,dayNum:diffDays+1,total:null,phase:activePhase,phaseName:activePhase?activePhase.name:null};
    var pauseD=c.pauseDate?new Date(c.pauseDate):null;
    var daysLeft=pauseD?Math.max(0,Math.floor((pauseD-now)/86400000)):null;
    var pct=Math.min(100,Math.round(diffDays/c.cycleLen*100));
    if(pauseD&&now>=pauseD)return{status:"PAUS",daysLeft:0,progress:100,dayNum:diffDays+1,total:c.cycleLen,phase:activePhase,phaseName:"Paus"};
    return{status:"AKTIV",daysLeft:daysLeft,progress:pct,dayNum:diffDays+1,total:c.cycleLen,phase:activePhase,phaseName:activePhase?activePhase.name:null};
  }

  // Paus warnings (upcoming pauses within 7 days)
  function getPausWarnings(){
    var warnings=[];
    PEPTIDE_CYCLES.forEach(function(c){
      if(!c.pauseDate)return;
      var pd=new Date(c.pauseDate);
      var diff=Math.floor((pd-now)/86400000);
      if(diff>0&&diff<=7){
        warnings.push({name:c.name,color:c.color,days:diff,date:c.pauseDate});
      }
    });
    return warnings;
  }
  var pausWarnings=getPausWarnings();

  // Get current dose for a peptide (check overrides first)
  function getCurrentDose(c){
    var ov=pc.overrides&&pc.overrides[c.id];
    if(ov&&ov.dose)return ov.dose;
    var st=getCycleStatus(c);
    if(st.phase&&st.phase.dose)return st.phase.dose;
    return c.note;
  }

  // Save peptide override
  function savePepOverride(pepId,data){
    var npc=Object.assign({},pc);
    if(!npc.overrides)npc.overrides={};
    npc.overrides[pepId]=Object.assign({},npc.overrides[pepId]||{},data);
    // Log to history
    if(!npc.history)npc.history=[];
    var entry={pepId:pepId,date:dk(new Date()),time:new Date().toISOString()};
    if(data.dose)entry.action="Dos ändrad till "+data.dose;
    if(data.paused===true)entry.action="Pausad";
    if(data.paused===false)entry.action="Återaktiverad";
    if(data.note)entry.action=data.note;
    if(entry.action)npc.history.push(entry);
    savePepConfig(npc);
  }

  // Compliance calc
  function getCompliance(){
    var last28=[];
    for(var i=0;i<28;i++){var d=new Date(now);d.setDate(d.getDate()-i);last28.push(dk(d))}
    var streak=0;
    for(var i=0;i<last28.length;i++){
      var dc=checks[last28[i]];
      if(!dc||Object.keys(dc).length===0)break;
      streak++;
    }
    // Weekly compliance (4 weeks)
    var weeks=[];
    for(var w=0;w<4;w++){
      var total=0,done=0;
      for(var d=0;d<7;d++){
        var idx=w*7+d;
        if(idx>=last28.length)break;
        var dateStr=last28[idx];
        var dateObj=new Date(dateStr);
        var dayItems=items?items.filter(function(it){return shouldShow(it,dateObj)}):[];
        var training=getTraining(dateObj.getDay());
        var all=dayItems.concat(training);
        total+=all.length;
        var dc=checks[dateStr]||{};
        all.forEach(function(it){if(dc[it.id])done++});
      }
      weeks.push({pct:total>0?Math.round(done/total*100):0,label:"V"+(4-w)});
    }
    weeks.reverse();
    return{streak:streak,weeks:weeks};
  }
  var comp=getCompliance();

  // Recovery trend from Oura
  var recoveryData=[];
  if(ouraCache&&ouraCache.readiness){
    var readArr=ouraCache.readiness||[];
    var last7=readArr.slice(-7);
    recoveryData=last7.map(function(r){return{v:r.score||0,l:r.day?r.day.substring(5):""}});
  }

  var sbg=T.card,sb2="1px solid "+T.border;

  return(<div>
    {/* SEKTION 1: VIKT */}
    <div style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:10}}>Vikt</div>
      {/* Current weight display */}
      <div style={{background:"linear-gradient(135deg,"+T.accent+"18,"+T.accent2+"08)",border:"1px solid "+T.accent+"33",borderRadius:12,padding:16,marginBottom:10,textAlign:"center"}}>
        <div style={{fontSize:36,fontWeight:900,fontFamily:"'JetBrains Mono',monospace",color:T.text}}>{latestW!=null?latestW:"—"}<span style={{fontSize:14,fontWeight:400,color:T.muted}}> kg</span></div>
        {wThisWeek!=null&&<div style={{fontSize:11,color:wThisWeek<=0?T.success:T.danger,marginTop:2}}>{wThisWeek<=0?"▼":"▲"} {Math.abs(wThisWeek)} kg denna vecka</div>}
        <div style={{fontSize:10,color:T.subtle,marginTop:4}}>Startade: {startW}kg → Nu: {latestW!=null?latestW:"?"}kg → Mål: {goalW}kg</div>
        {/* Goal progress bar */}
        {(function(){
          var cur=latestW!=null?latestW:startW;
          var range=startW-goalW;
          var lost=startW-cur;
          var pct=range>0?Math.min(100,Math.max(0,Math.round(lost/range*100))):0;
          var remaining=Math.max(0,Math.round((cur-goalW)*10)/10);
          return <div style={{marginTop:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.subtle,marginBottom:3}}>
              <span>{startW}kg</span>
              <span style={{color:T.accent2,fontWeight:700}}>{pct}%</span>
              <span>{goalW}kg</span>
            </div>
            <div style={{height:8,borderRadius:4,background:T.surface,overflow:"hidden",position:"relative"}}>
              <div style={{height:"100%",borderRadius:4,background:"linear-gradient(90deg,"+T.accent+","+T.accent2+")",width:pct+"%",transition:"width .5s"}}/>
            </div>
            <div style={{fontSize:9,color:T.muted,marginTop:3,textAlign:"center"}}>{remaining}kg kvar till mål</div>
          </div>;
        })()}
      </div>
      {/* Quick log with date picker */}
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <input value={wDate} onChange={function(e){setWDate(e.target.value)}} type="date" style={{width:110,padding:"10px 6px",borderRadius:8,border:sb2,background:sbg,color:T.text,fontSize:11,fontFamily:"'JetBrains Mono'",outline:"none"}}/>
        <input value={wInput} onChange={function(e){setWInput(e.target.value)}} placeholder="kg" type="number" inputMode="decimal" step="0.1" style={{flex:1,padding:"10px 12px",borderRadius:8,border:sb2,background:sbg,color:T.text,fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none"}}/>
        <button onClick={saveWeight} style={{padding:"10px 16px",borderRadius:8,border:"none",background:wInput?"linear-gradient(135deg,"+T.accent+","+T.accent2+")":T.surface,color:wInput?"#fff":T.subtle,fontSize:12,fontWeight:700,cursor:wInput?"pointer":"not-allowed"}}>Spara</button>
      </div>
      {/* Weight graph */}
      {graphData.length>1&&<div>
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          {["7d","30d","90d","Allt"].map(function(r){return <button key={r} onClick={function(){setWRange(r)}} style={{padding:"3px 8px",borderRadius:5,border:wRange===r?"1px solid "+T.accent:sb2,background:wRange===r?T.accent+"15":"transparent",color:wRange===r?T.accent:T.subtle,fontSize:9,fontWeight:600,cursor:"pointer"}}>{r}</button>})}
        </div>
        <MiniGraph data={graphData} color={T.accent2} h={70} label="Vikt (kg)" markers={PEPTIDE_MARKERS}/>
      </div>}
      {/* Weight stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
        {[{l:"Denna vecka",v:wThisWeek!=null?(wThisWeek<=0?"":"+") +wThisWeek+" kg":"—",c:wThisWeek!=null?(wThisWeek<=0?T.success:T.danger):T.muted},{l:"Denna månad",v:wThisMonth!=null?(wThisMonth<=0?"":"+") +wThisMonth+" kg":"—",c:wThisMonth!=null?(wThisMonth<=0?T.success:T.danger):T.muted},{l:"Totalt",v:"-"+totalLoss+" kg",c:T.accent}].map(function(s,i){return <div key={i} style={{background:sbg,border:sb2,borderRadius:8,padding:"8px 6px",textAlign:"center"}}><div style={{fontSize:8,color:T.muted,marginBottom:2}}>{s.l}</div><div style={{fontSize:14,fontWeight:800,color:s.c,fontFamily:"'JetBrains Mono'"}}>{s.v}</div></div>})}
      </div>
    </div>

    {/* SEKTION 2: PEPTID-KURER */}
    <div style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:10}}>Peptid-kurer</div>
      {/* Paus-varningar */}
      {pausWarnings.length>0&&<div style={{marginBottom:10}}>
        {pausWarnings.map(function(w,i){return <div key={i} style={{background:T.warning+"15",border:"1px solid "+T.warning+"33",borderRadius:8,padding:"8px 12px",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:4,height:20,borderRadius:2,background:w.color}}/>
          <div style={{fontSize:11,color:T.warning,fontWeight:700}}>⚠ {w.name} paus om {w.days} dag{w.days>1?"ar":""}</div>
          <div style={{fontSize:9,color:T.subtle,marginLeft:"auto"}}>{w.date}</div>
        </div>})}
      </div>}
      {PEPTIDE_CYCLES.map(function(c){
        var st=getCycleStatus(c);
        var badge=st.status;
        var badgeColor=badge==="AKTIV"?T.success:badge==="PAUS"?T.warning:T.subtle;
        var curDose=getCurrentDose(c);
        var ov=pc.overrides&&pc.overrides[c.id];
        return <div key={c.id} style={{background:sbg,border:sb2,borderRadius:10,padding:12,marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:4,height:28,borderRadius:2,background:c.color}}/>
              <div><div style={{fontSize:13,fontWeight:700}}>{c.name}</div><div style={{fontSize:10,color:T.subtle}}>{c.note}</div></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:8,fontWeight:800,padding:"3px 8px",borderRadius:4,background:badgeColor+"18",color:badgeColor,border:"1px solid "+badgeColor+"33"}}>{badge}</span>
              <button onClick={function(e){e.stopPropagation();setEditPep(editPep===c.id?null:c.id)}} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Ic n="edit" s={13} c={T.subtle}/></button>
            </div>
          </div>
          {/* Current phase + dose */}
          {st.phaseName&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,background:c.color+"18",color:c.color}}>{st.phaseName}</span>
            <span style={{fontSize:10,color:T.muted,fontFamily:"'JetBrains Mono'"}}>{curDose}</span>
          </div>}
          {/* Maintenance dose info */}
          {c.maintenanceDose&&st.status==="AKTIV"&&<div style={{fontSize:9,color:T.accent2,marginBottom:4}}>Underhåll: {c.maintenanceDose}</div>}
          {/* Progress bar for cycles */}
          {st.status!=="KOMMANDE"&&st.total!=null&&<div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:T.muted,marginBottom:3}}>
              <span>Dag {st.dayNum} av {st.total}</span>
              {st.daysLeft!=null&&st.daysLeft>0&&<span>{st.daysLeft}d kvar</span>}
            </div>
            <div style={{height:5,borderRadius:3,background:T.surface,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:3,background:c.color,width:st.progress+"%",transition:"width .3s"}}/>
            </div>
          </div>}
          {st.status!=="KOMMANDE"&&st.total==null&&<div style={{fontSize:10,color:T.muted}}>Dag {st.dayNum} — löpande</div>}
          {st.status==="KOMMANDE"&&<div style={{fontSize:10,color:T.subtle}}>Startar {c.start} (om {st.daysLeft}d)</div>}
          <div style={{fontSize:9,color:T.subtle,marginTop:4}}>Start: {c.start}{c.pauseDate?" → Paus: "+c.pauseDate:""}</div>
          {/* Edit modal inline */}
          {editPep===c.id&&<PepEditPanel c={c} ov={ov} st={st} onSave={savePepOverride} onClose={function(){setEditPep(null)}}/>}
        </div>
      })}
    </div>

    {/* SEKTION 3: VIAL-TRACKER */}
    <div style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:10}}>Vial-tracker</div>
      {vials.map(function(v){
        var autoMl=autoCalcVial(v);
        var pct=v.totalMl>0?Math.round(autoMl/v.totalMl*100):0;
        var low=pct<20;
        var hasDoses=v.doses&&v.doses.length>0;
        return <div key={v.id} style={{background:sbg,border:low?"1px solid "+T.danger+"44":sb2,borderRadius:10,padding:12,marginBottom:6,cursor:"pointer"}} onClick={function(){setEditVial(v.id);setVialInput(String(autoMl))}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:4,height:22,borderRadius:2,background:v.color}}/>
              <span style={{fontSize:13,fontWeight:700}}>{v.name}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'",color:low?T.danger:T.text}}>{autoMl}ml <span style={{color:T.subtle,fontWeight:400}}>/ {v.totalMl}ml</span></div>
              <div style={{fontSize:9,color:T.subtle}}>{v.cost} kr{hasDoses?" · auto":""}</div>
            </div>
          </div>
          <div style={{height:5,borderRadius:3,background:T.surface,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:3,background:low?T.danger:v.color,width:pct+"%",transition:"width .3s"}}/>
          </div>
          {low&&<div style={{fontSize:10,color:T.danger,fontWeight:700,marginTop:4}}>⚠ Beställ snart!</div>}
          {editVial===v.id&&<div onClick={function(e){e.stopPropagation()}} style={{display:"flex",gap:6,marginTop:8}}>
            <input value={vialInput} onChange={function(e){setVialInput(e.target.value)}} type="number" inputMode="decimal" step="0.1" autoFocus style={{flex:1,padding:"8px 10px",borderRadius:6,border:"1px solid "+T.accent+"44",background:T.surface,color:T.text,fontSize:13,fontFamily:"'JetBrains Mono'",outline:"none"}}/>
            <button onClick={function(e){e.stopPropagation();updateVial(v.id)}} style={{padding:"8px 14px",borderRadius:6,border:"none",background:T.accent,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>OK</button>
            <button onClick={function(e){e.stopPropagation();setEditVial(null)}} style={{padding:"8px 10px",borderRadius:6,border:sb2,background:"transparent",color:T.subtle,fontSize:11,cursor:"pointer"}}>✕</button>
          </div>}
        </div>
      })}
    </div>

    {/* SEKTION 4: STATS & GRAFER */}
    <div style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:10}}>Stats</div>
      {/* Streak */}
      <div style={{background:"linear-gradient(135deg,"+T.success+"15,"+T.success+"05)",border:"1px solid "+T.success+"33",borderRadius:10,padding:14,marginBottom:10,textAlign:"center"}}>
        <div style={{fontSize:10,color:T.success,fontWeight:700,marginBottom:2}}>STREAK</div>
        <div style={{fontSize:28,fontWeight:900,fontFamily:"'JetBrains Mono'",color:T.success}}>{comp.streak}<span style={{fontSize:12,fontWeight:400,color:T.muted}}> dagar</span></div>
        <div style={{fontSize:10,color:T.subtle}}>Dagar i rad med allt bockat</div>
      </div>
      {/* Weekly compliance bars */}
      <div style={{background:sbg,border:sb2,borderRadius:10,padding:14,marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:700,color:T.muted,marginBottom:8}}>Vecko-compliance (senaste 4v)</div>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",height:50}}>
          {comp.weeks.map(function(w,i){return <div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{height:40,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
              <div style={{width:"100%",height:Math.max(3,w.pct*0.4),borderRadius:3,background:w.pct>=80?T.success:w.pct>=50?T.warning:T.danger,transition:"height .3s"}}/>
            </div>
            <div style={{fontSize:10,fontWeight:700,fontFamily:"'JetBrains Mono'",color:T.text,marginTop:3}}>{w.pct}%</div>
            <div style={{fontSize:8,color:T.subtle}}>{w.label}</div>
          </div>})}
        </div>
      </div>
      {/* Recovery trend */}
      {recoveryData.length>1&&<div>
        <MiniGraph data={recoveryData} color={T.accent} h={50} label="Recovery (Readiness)" markers={PEPTIDE_MARKERS}/>
      </div>}
    </div>

    {/* SEKTION 5: FOTOLOGG */}
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:800,color:T.text}}>Progressfoto</div>
        {needsPhoto&&<span style={{fontSize:9,fontWeight:700,padding:"3px 8px",borderRadius:4,background:T.warning+"18",color:T.warning,border:"1px solid "+T.warning+"33"}}>📸 Dags!</span>}
      </div>
      {needsPhoto&&<div style={{background:T.warning+"10",border:"1px solid "+T.warning+"22",borderRadius:8,padding:"8px 12px",marginBottom:8,fontSize:11,color:T.warning,fontWeight:600}}>
        {photoLog.length===0?"Inget foto loggat ännu — ta ditt första!":"Över 14 dagar sedan senaste fotot — dags att ta nytt!"}
      </div>}
      <div style={{background:sbg,border:sb2,borderRadius:10,padding:12,marginBottom:8}}>
        <div style={{fontSize:9,color:T.muted,marginBottom:6}}>Logga att du tagit progressfoto (spara bilden i telefonens album)</div>
        <div style={{display:"flex",gap:6}}>
          <input value={photoDate} onChange={function(e){setPhotoDate(e.target.value)}} type="date" style={{width:110,padding:"8px 6px",borderRadius:6,border:sb2,background:T.surface,color:T.text,fontSize:11,fontFamily:"'JetBrains Mono'",outline:"none"}}/>
          <input value={photoNote} onChange={function(e){setPhotoNote(e.target.value)}} placeholder="Notering (valfritt)" style={{flex:1,padding:"8px 10px",borderRadius:6,border:sb2,background:T.surface,color:T.text,fontSize:11,outline:"none"}}/>
          <button onClick={savePhotoEntry} style={{padding:"8px 12px",borderRadius:6,border:"none",background:"linear-gradient(135deg,"+T.accent+","+T.accent2+")",color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>📸</button>
        </div>
      </div>
      {photoLog.length>0&&<div style={{background:sbg,border:sb2,borderRadius:10,padding:12}}>
        <div style={{fontSize:9,color:T.muted,marginBottom:6}}>Loggade foton ({photoLog.length}st)</div>
        {photoLog.slice().reverse().slice(0,10).map(function(p,i){
          var daysBetween=i<photoLog.length-1?(function(){
            var rev=photoLog.slice().reverse();
            if(i+1<rev.length){return Math.abs(Math.floor((new Date(rev[i].date)-new Date(rev[i+1].date))/86400000))}return null})():null;
          return <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<9?"1px solid "+T.border+"44":"none"}}>
            <div style={{fontSize:16,flexShrink:0}}>📸</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:T.text}}>{p.note||"Progressfoto"}</div>
              {daysBetween!=null&&<div style={{fontSize:9,color:T.subtle}}>{daysBetween}d sedan förra</div>}
            </div>
            <div style={{fontSize:9,color:T.subtle,fontFamily:"'JetBrains Mono'",flexShrink:0}}>{p.date}</div>
            <button onClick={function(){removePhotoEntry(p.id)}} style={{background:"none",border:"none",cursor:"pointer",padding:6,minWidth:28,minHeight:28,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic n="x" s={14} c={T.subtle}/></button>
          </div>
        })}
      </div>}
    </div>

    {/* SEKTION 6: DOS-HISTORIK */}
    {pc.history&&pc.history.length>0&&<div style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:10}}>Dos-historik</div>
      <div style={{background:sbg,border:sb2,borderRadius:10,padding:12}}>
        {pc.history.slice().reverse().slice(0,15).map(function(h,i){
          var cyc=PEPTIDE_CYCLES.find(function(c){return c.id===h.pepId});
          var col=cyc?cyc.color:T.muted;
          var name=cyc?cyc.name:h.pepId;
          return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<14?"1px solid "+T.border+"44":"none"}}>
            <div style={{width:3,height:18,borderRadius:2,background:col,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:T.text}}>{name}</div>
              <div style={{fontSize:10,color:T.muted}}>{h.action||"—"}</div>
            </div>
            <div style={{fontSize:9,color:T.subtle,fontFamily:"'JetBrains Mono'",flexShrink:0}}>{h.date}</div>
          </div>
        })}
      </div>
    </div>}
  </div>);
}

function TabInfo({items,saveItems,setModal,trackerData,saveTracker,checks,ouraCache,pepConfig,savePepConfig}){
  const[sub,setSub]=useState("info");
  const[sel,setSel]=useState(null);
  var cats=[{k:"Peptider",items:Object.entries(INFO_DATA).filter(([,v])=>v.cat==="Peptider")},{k:"Kosttillskott",items:Object.entries(INFO_DATA).filter(([,v])=>v.cat==="Kosttillskott")},{k:"Hudvård",items:Object.entries(INFO_DATA).filter(([,v])=>v.cat==="Hudvård")}];
  if(sel){var info=INFO_DATA[sel];if(!info)return null;return(<div style={{padding:"14px 18px 120px",animation:"fi .15s ease-out"}}>
    <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",color:T.accent,fontSize:11,fontWeight:600,cursor:"pointer",marginBottom:12}}><Ic n="back" s={14} c={T.accent}/>Tillbaka</button>
    <div style={{fontSize:20,fontWeight:800,marginBottom:4}}>{info.title}</div>
    <div style={{fontSize:11,color:T.muted,marginBottom:16}}>{info.cat}</div>
    {info.dose&&<div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:10}}><div style={{fontSize:10,color:T.muted,marginBottom:4}}>Din dos</div><div style={{fontSize:14,fontWeight:700}}>{info.dose}</div>{info.concentration&&<div style={{fontSize:11,color:T.subtle,marginTop:2}}>{info.concentration}</div>}{info.zone&&<div style={{fontSize:11,color:T.subtle}}>Zon: {info.zone}</div>}{info.schedule&&<div style={{fontSize:11,color:T.accent,marginTop:2}}>{info.schedule}</div>}{info.pause&&<div style={{fontSize:11,color:T.warning,marginTop:2}}>Paus: {info.pause}</div>}</div>}
    {info.recDose&&<div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:10}}><div style={{fontSize:10,color:T.muted,marginBottom:4}}>Rekommenderade doser</div><div style={{fontSize:12,color:T.text}}>{info.recDose}</div></div>}
    {info.benefits&&<div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:10}}><div style={{fontSize:10,color:T.success,marginBottom:6}}>Fördelar</div>{info.benefits.map((b,i)=><div key={i} style={{fontSize:12,color:T.text,padding:"3px 0",paddingLeft:12,borderLeft:"2px solid "+T.success,marginBottom:4}}>{b}</div>)}</div>}
    {info.sideEffects&&<div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:10}}><div style={{fontSize:10,color:T.danger,marginBottom:6}}>Biverkningar att bevaka</div>{info.sideEffects.map((b,i)=><div key={i} style={{fontSize:12,color:T.text,padding:"3px 0",paddingLeft:12,borderLeft:"2px solid "+T.danger,marginBottom:4}}>{b}</div>)}</div>}
    {info.timeline&&<div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14,marginBottom:10}}><div style={{fontSize:10,color:T.accent,marginBottom:6}}>När ser du resultat?</div><div style={{fontSize:12,color:T.text,lineHeight:1.7}}>{info.timeline}</div></div>}
  </div>);}
  return(<div style={{padding:"14px 18px 120px",animation:"fi .2s ease-out"}}>
    <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>Info</div>
    <div style={{display:"flex",gap:3,marginBottom:14}}>
      {[{k:"info",l:"Substanser"},{k:"timeline",l:"Tidslinje"},{k:"routines",l:"Rutiner"},{k:"oura",l:"Oura"},{k:"tracker",l:"Tracker"}].map(function(s){return <button key={s.k} onClick={function(){setSub(s.k)}} style={{flex:1,padding:"7px 0",borderRadius:8,border:sub===s.k?"1px solid "+T.accent:"1px solid "+T.border,background:sub===s.k?"rgba(108,92,231,0.1)":T.card,color:sub===s.k?T.accent:T.muted,fontSize:10,fontWeight:600,cursor:"pointer"}}>{s.l}</button>})}
    </div>
    {sub==="info"&&<div>
      {cats.map(cat=><div key={cat.k} style={{marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:T.muted,marginBottom:8}}>{cat.k}</div>
        {cat.items.map(([k,v])=><div key={k} onClick={()=>setSel(k)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,background:T.card,border:"1px solid "+T.border,marginBottom:4,cursor:"pointer"}}>
          <div style={{width:4,height:30,borderRadius:2,background:CC[v.cat==="Peptider"?"peptide":v.cat==="Kosttillskott"?"supplement":"skincare"],flexShrink:0}}/>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{v.title}</div>{v.dose&&<div style={{fontSize:10,color:T.subtle}}>{v.dose}</div>}</div>
          <Ic n="chevR" s={14} c={T.subtle}/>
        </div>)}
      </div>)}
    </div>}
    {sub==="timeline"&&<TabPlan/>}
    {sub==="routines"&&<TabRoutines items={items} saveItems={saveItems} setModal={setModal}/>}
    {sub==="oura"&&<OuraPanel/>}
    {sub==="tracker"&&<TrackerPanel trackerData={trackerData} saveTracker={saveTracker} checks={checks} items={items} ouraCache={ouraCache} pepConfig={pepConfig} savePepConfig={savePepConfig}/>}
  </div>);
}

var PEPTIDE_MARKERS=[
  {date:"03-28",name:"Stack start",color:"#6c5ce7"},
  {date:"04-15",name:"Epitalon",color:"#e84393"},
  {date:"05-01",name:"CJC+Ipa",color:"#0984e3"},
  {date:"05-09",name:"Semax paus",color:"#00cec9"},
  {date:"05-23",name:"BPC+TB paus",color:"#00b894"}
];

var PEPTIDE_CYCLES=[
  {id:"reta",name:"Retatrutide",color:"#6c5ce7",start:"2026-03-28",cycleLen:null,pauseDate:null,
    phases:[{name:"Upptrappning",dose:"1mg→2mg→4mg/v",startDay:0,endDay:21},{name:"Full dos",dose:"4mg/v",startDay:22,endDay:null},{name:"Underhåll",dose:"2mg/v",trigger:"vid mål"}],
    maintenanceDose:"2mg/v",note:"Kör tills mål → nedtrappning"},
  {id:"cagri",name:"Cagrilintide",color:"#6c5ce7",start:"2026-03-28",cycleLen:null,pauseDate:null,
    phases:[{name:"Full dos",dose:"1mg/v",startDay:0,endDay:null},{name:"Underhåll",dose:"0.5mg/v",trigger:"vid mål"}],

function MiniGraph({data,color,h,label,markers}){
  if(!data||!data.length)return null;
  var vals=data.map(function(d){return d.v});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  if(mx===mn)mx=mn+1;
  var w=280,ht=h||60,pad=2;
  var pts=data.map(function(d,i){
    var x=pad+i/(data.length-1||1)*(w-pad*2);
    var y=ht-pad-(d.v-mn)/(mx-mn)*(ht-pad*2);
    return{x:x,y:y,v:d.v,l:d.l}
  });
  var path="M"+pts.map(function(p){return p.x+","+p.y}).join("L");
  var avg=Math.round(vals.reduce(function(s,v){return s+v},0)/vals.length);
  // Find marker positions
  var mks=[];
  if(markers&&data.length>1){
    markers.forEach(function(m){
      for(var i=0;i<data.length;i++){
        if(data[i].l===m.date){
          var x=pad+i/(data.length-1||1)*(w-pad*2);
          mks.push({x:x,name:m.name,color:m.color});
          break;
        }
      }
    });
  }
  return <div style={{marginBottom:12}}>
    {label&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
      <span style={{fontSize:10,fontWeight:700,color:color||T.accent}}>{label}</span>
      <span style={{fontSize:9,color:T.subtle,fontFamily:"'JetBrains Mono'"}}>snitt {avg}</span>
    </div>}
    <svg width="100%" viewBox={"0 0 "+w+" "+ht} style={{borderRadius:6,background:T.card,border:"1px solid "+T.border}}>
      {mks.map(function(mk,i){return <g key={"m"+i}><line x1={mk.x} y1={2} x2={mk.x} y2={ht-2} stroke={mk.color} strokeWidth="1" strokeDasharray="3,2" opacity="0.6"/><circle cx={mk.x} cy={4} r={3} fill={mk.color} opacity="0.8"/><text x={mk.x+4} y={10} fill={mk.color} fontSize="5" fontWeight="700" opacity="0.7">{mk.name}</text></g>})}
      <path d={path} fill="none" stroke={color||T.accent} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map(function(p,i){return <circle key={i} cx={p.x} cy={p.y} r={2.5} fill={color||T.accent}/>})}
    </svg>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:T.subtle,marginTop:2}}>
      {data.length>0&&<span>{data[0].l}</span>}
      {data.length>1&&<span>{data[data.length-1].l}</span>}
    </div>
  </div>;
}

function OuraPanel(){
  const[token,setToken]=useState("");
  const[oura,setOura]=useState(null);
  const[loading,setLoading]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const[err,setErr]=useState(null);
  const[range,setRange]=useState(7);

  // Load token + cached data from Supabase
  useEffect(function(){(async function(){
    try{
      var r=await sb.from('health_data').select('data').eq('id','oura').single();
      if(r.data&&r.data.data){
        if(r.data.data.token)setToken(r.data.data.token);
        if(r.data.data.cached)setOura(r.data.data.cached);
        if(r.data.data.lastSync)setLastSync(r.data.data.lastSync);
      }
    }catch(e){}
  })()},[]);

  // Auto-sync: on load if token exists + >1h since last sync
  useEffect(function(){
    if(!token)return;
    if(!oura){doSync();return}
    if(lastSync){var diff=Date.now()-new Date(lastSync).getTime();if(diff>3600000)doSync()}
  },[token]);

  async function saveOura(data,syncTime){
    var payload={token:token,cached:data,lastSync:syncTime};
    setOura(data);setLastSync(syncTime);
    await sb.from('health_data').upsert({id:'oura',data:payload,updated_at:new Date().toISOString()});
  }

  async function saveToken(t){
    setToken(t);
    await sb.from('health_data').upsert({id:'oura',data:{token:t,cached:oura,lastSync:lastSync},updated_at:new Date().toISOString()});
  }

  async function doSync(){
    if(!token){setErr("Ingen token");return}
    setLoading(true);setErr(null);
    try{
      var end=new Date();
      var start=new Date();start.setDate(start.getDate()-range);
      var sd=dk(start),ed=dk(end);
      // Ändra PROXY_URL till din deployade Vercel-proxy URL
      var PROXY_URL="https://oura-proxy.vercel.app/api/oura";
      function pf(endpoint,params){
        var url=PROXY_URL+"?endpoint="+endpoint+"&token="+token+"&"+params;
        return fetch(url).then(function(r){if(!r.ok)throw new Error(r.status+" — kolla token/proxy");return r.json()})
      }

      var results=await Promise.all([
        pf("daily_readiness","start_date="+sd+"&end_date="+ed),
        pf("daily_sleep","start_date="+sd+"&end_date="+ed),
        pf("daily_activity","start_date="+sd+"&end_date="+ed),
        pf("heart_rate","start_date="+sd+"T00:00:00&end_date="+ed+"T23:59:59"),
        pf("workout","start_date="+sd+"&end_date="+ed),
        pf("sleep","start_date="+sd+"&end_date="+ed)
      ]);

      var readiness=results[0].data||[];
      var sleep=results[1].data||[];
      var activity=results[2].data||[];
      var heartrate=results[3].data||[];
      var workouts=results[4].data||[];
      var sleepDetail=results[5].data||[];

      var data={readiness:readiness,sleep:sleep,activity:activity,heartrate:heartrate,workouts:workouts,sleepDetail:sleepDetail};
      var syncTime=new Date().toISOString();
      await saveOura(data,syncTime);
    }catch(e){setErr("Sync misslyckades: "+e.message)}
    setLoading(false);
  }

  // Extract today's data
  var todayStr=dk(new Date());
  var todayReady=(oura&&oura.readiness||[]).find(function(r){return r.day===todayStr});
  var todaySleep=(oura&&oura.sleep||[]).find(function(s){return s.day===todayStr});
  var todayActivity=(oura&&oura.activity||[]).find(function(a){return a.day===todayStr});

  // Yesterdays for comparison
  var yest=new Date();yest.setDate(yest.getDate()-1);var yestStr=dk(yest);
  var yestReady=(oura&&oura.readiness||[]).find(function(r){return r.day===yestStr});
  var yestSleep=(oura&&oura.sleep||[]).find(function(s){return s.day===yestStr});

  // Extract HRV from sleep contributors
  function getHRV(sleepItem){
    if(!sleepItem)return null;
    if(sleepItem.contributors&&sleepItem.contributors.deep_sleep!=null){}
    // Oura v2: hrv is in sleep.data items under "average_hrv" or we get from heart_rate
    return sleepItem.contributors&&sleepItem.contributors.hrv_balance!=null?sleepItem.contributors.hrv_balance:null;
  }

  // Build trend data
  function buildTrend(items,key,labelKey){
    if(!items)return[];
    return items.map(function(d){
      var val=0;
      if(key==="score")val=d.score||0;
      else if(key==="total_sleep")val=d.contributors&&d.contributors.total_sleep?d.contributors.total_sleep:0;
      else if(key==="steps")val=d.steps||0;
      else if(key==="active_calories")val=d.active_calories||0;
      else val=d[key]||0;
      return{v:val,l:(d.day||"").slice(5)}
    }).filter(function(d){return d.v>0});
  }

  var readinessTrend=buildTrend(oura&&oura.readiness,"score");
  var sleepTrend=buildTrend(oura&&oura.sleep,"score");
  var stepsTrend=buildTrend(oura&&oura.activity,"steps");

  // RHR trend from readiness contributors
  var rhrTrend=(oura&&oura.readiness||[]).map(function(r){
    var rhr=r.contributors&&r.contributors.resting_heart_rate?r.contributors.resting_heart_rate:0;
    return{v:rhr,l:(r.day||"").slice(5)}
  }).filter(function(d){return d.v>0});

  // No token yet
  if(!token){
    return <div>
      <div style={{textAlign:"center",padding:"30px 10px"}}>
        <div style={{fontSize:36,marginBottom:10}}>💍</div>
        <div style={{fontSize:14,fontWeight:700,marginBottom:4}}>Anslut Oura Ring</div>
        <div style={{fontSize:11,color:T.muted,marginBottom:16}}>Klistra in din Personal Access Token</div>
        <input id="oura-token" placeholder="Klistra in token..." style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:12,fontFamily:"'JetBrains Mono'",outline:"none",marginBottom:8}}/>
        <button onClick={function(){var v=document.getElementById("oura-token").value.trim();if(v)saveToken(v)}} style={{width:"100%",padding:12,borderRadius:10,border:"none",background:T.accent,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Anslut</button>
        <div style={{fontSize:9,color:T.subtle,marginTop:10}}>Hämta token: cloud.ouraring.com → Personal Access Tokens</div>
      </div>
    </div>;
  }

  return <div>
    {/* Sync bar */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div>
        <div style={{fontSize:9,color:T.subtle}}>Senast synkad</div>
        <div style={{fontSize:10,fontWeight:600,color:T.muted}}>{lastSync?new Date(lastSync).toLocaleString("sv",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):"Aldrig"}</div>
      </div>
      <div style={{display:"flex",gap:4}}>
        <button onClick={function(){saveToken("")}} style={{padding:"6px 10px",borderRadius:6,border:"1px solid "+T.border,background:"transparent",color:T.subtle,fontSize:9,fontWeight:600,cursor:"pointer"}}>Byt token</button>
        <button onClick={doSync} disabled={loading} style={{padding:"6px 14px",borderRadius:6,border:"none",background:loading?T.surface:T.accent,color:loading?T.muted:"#fff",fontSize:10,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>{loading?"Synkar...":"Synka nu"}</button>
      </div>
    </div>
    {err&&<div style={{padding:"8px 12px",borderRadius:8,background:T.danger+"15",color:T.danger,fontSize:11,fontWeight:600,marginBottom:10}}>{err}</div>}

    {!oura&&!loading&&<div style={{textAlign:"center",padding:30,color:T.subtle}}>Tryck "Synka nu" för att hämta data</div>}

    {oura&&<div>
      {/* Dagens kort */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
        {/* HRV */}
        <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 10px"}}>
          <div style={{fontSize:8,color:T.muted,marginBottom:2}}>HRV</div>
          <div style={{fontSize:22,fontWeight:900,color:"#a29bfe",fontFamily:"'JetBrains Mono'",lineHeight:1}}>{todayReady&&todayReady.contributors&&todayReady.contributors.hrv_balance!=null?todayReady.contributors.hrv_balance:"—"}</div>
          <div style={{fontSize:8,color:T.subtle}}>balans-score</div>
        </div>
        {/* Readiness */}
        <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 10px"}}>
          <div style={{fontSize:8,color:T.muted,marginBottom:2}}>Readiness</div>
          <div style={{display:"flex",alignItems:"baseline",gap:4}}>
            <span style={{fontSize:22,fontWeight:900,color:T.accent,fontFamily:"'JetBrains Mono'",lineHeight:1}}>{todayReady&&todayReady.score?todayReady.score:"—"}</span>
            {todayReady&&yestReady&&<span style={{fontSize:10,color:todayReady.score>=yestReady.score?T.success:T.danger}}>{todayReady.score>=yestReady.score?"▲":"▼"}{Math.abs(todayReady.score-yestReady.score)}</span>}

function getRecurringForDate(recurring,dateStr){
  if(!recurring||!recurring.length)return[];
  var d=new Date(dateStr+"T12:00"),dow=d.getDay();
  return recurring.filter(function(r){
    if(dateStr<r.startDate)return false;
    if(r.endDate&&dateStr>r.endDate)return false;
    if(r.repeat==="daily")return true;
    if(r.repeat==="weekly")return r.days&&r.days.includes(dow);
    return false;
  }).map(function(r){return{...r,id:"rec-"+r.id+"-"+dateStr,recurring:true,srcId:r.id}});
}

function getAutoEvents(dateStr){
  var d=new Date(dateStr+"T12:00"),dow=d.getDay(),out=[];
  // Jobb mån-fre
  if(dow>=1&&dow<=5)out.push({id:"auto-jobb",name:"Jobb",time:"08:00",duration:540,category:"business",auto:true});

  if(dow>=1&&dow<=5)out.push({id:"auto-lunch-gym",name:"Lunch: Kardio + Styrka",time:"12:00",duration:30,category:"training",auto:true});
  // MMA
  if(dow===1||dow===3||dow===5)out.push({id:"auto-mma",name:"MMA",time:"17:30",duration:60,category:"training",auto:true});
  if(dow===2||dow===4)out.push({id:"auto-mma",name:"Muay Thai",time:"19:00",duration:90,category:"training",auto:true});
  if(dow===6)out.push({id:"auto-mma-sat",name:"MMA / Sparring",time:"12:00",duration:60,category:"training",auto:true});
  // Gym efter MMA
  var gymByDay={0:{n:"Bröst + Sido-delts",t:"10:00",d:60},1:{n:"Rygg + Biceps (lätt)",t:"18:30",d:30},2:{n:"Ben + Axlar",t:"17:00",d:60},3:{n:"Armar + MMA-core",t:"18:30",d:30},4:{n:"Rygg + Biceps (tungt)",t:"17:00",d:60},5:{n:"Axlar + Triceps",t:"18:30",d:30},6:{n:"Bodybuilding svaga punkter",t:"13:00",d:60}};
  var g=gymByDay[dow];

}

function getOuraWorkouts(ouraCache,dateStr){
  if(!ouraCache||!ouraCache.workouts)return[];
  return(ouraCache.workouts||[]).filter(function(w){return w.day===dateStr}).map(function(w,i){
    var type=w.activity||w.type||"Workout";
    var dur=w.duration?Math.round(w.duration/60):0;

    if(w.start_datetime){var st=new Date(w.start_datetime);startTime=String(st.getHours()).padStart(2,"0")+":"+String(st.getMinutes()).padStart(2,"0")}

}

function TabEconomy({ecoData,saveEco}){
  var eco=(ecoData&&ecoData.entries)?ecoData:{...DEFAULT_ECO,...(ecoData||{})};
  var entries=eco.entries||{};
  var incomeData=eco.income||{};
  var budget=eco.budget||DEFAULT_ECO.budget;
  var fixedExp=eco.fixedExpenses||DEFAULT_ECO.fixedExpenses;
  var savingsData=eco.savings||DEFAULT_ECO.savings;
  var goals=(savingsData&&savingsData.goals)||DEFAULT_ECO.savings.goals;
  var investments=eco.investments||DEFAULT_ECO.investments;
  var baseLiq=eco.liquidity!=null?eco.liquidity:80000;
  var yearGoal=eco.yearGoal||DEFAULT_ECO.yearGoal;

  const[sub,setSub]=useState("daily");
  const[addMode,setAddMode]=useState(null);
  const[month,setMonth]=useState(function(){var d=new Date();return{y:d.getFullYear(),m:d.getMonth()}});
  const[editFixedOpen,setEditFixedOpen]=useState(false);
  const[txModal,setTxModal]=useState(null);
  const[newGoal,setNewGoal]=useState(null);

  function save(patch){saveEco({...eco,...patch})}

  // Totals
  var fixedTotal=fixedExp.reduce(function(s,f){return s+f.amount},0);
  var allIncome=0,allExpense=0;
  for(var k in incomeData){(incomeData[k]||[]).forEach(function(i){allIncome+=i.amount})}
  for(var k in entries){(entries[k]||[]).forEach(function(e){allExpense+=e.amount})}
  var liquidity=baseLiq+allIncome-allExpense;

  // Month totals
  function monthIncome(){var t=0;for(var k in incomeData){var p=k.split("-").map(Number);if(p[0]===month.y&&p[1]-1===month.m)(incomeData[k]||[]).forEach(function(i){t+=i.amount})}return t}
  function monthExpense(){var t=0;for(var k in entries){var p=k.split("-").map(Number);if(p[0]===month.y&&p[1]-1===month.m)(entries[k]||[]).forEach(function(e){t+=e.amount})}return t}

  // Budget period (25th to 25th)
  var rorligSpent=0;
  (function(){var now=new Date(),rd=budget.resetDay||25;
    var start;
    if(now.getDate()>=rd)start=new Date(now.getFullYear(),now.getMonth(),rd);
    else start=new Date(now.getFullYear(),now.getMonth()-1,rd);
    var sd=dk(start),ed=dk(now);
    for(var k in entries){if(k>=sd&&k<=ed)(entries[k]||[]).forEach(function(e){rorligSpent+=e.amount})}
  })();

  // Add income

    var d=todayStr,ni={...incomeData};if(!ni[d])ni[d]=[];
    ni[d]=[{id:uid(),time:new Date().toTimeString().slice(0,5),amount:Number(amount),note:note,type:type}].concat(ni[d]);
    save({income:ni});setAddMode(null);
  }
  // Add expense
  function addExp(amount,note){
    var d=todayStr,ne={...entries};if(!ne[d])ne[d]=[];
    ne[d]=[{id:uid(),time:new Date().toTimeString().slice(0,5),amount:Number(amount),note:note}].concat(ne[d]);
    save({entries:ne});setAddMode(null);
  }
  // Delete transaction
  function delTx(date,id,isIncome){
    if(isIncome){var ni={...incomeData};ni[date]=(ni[date]||[]).filter(function(x){return x.id!==id});if(!ni[date].length)delete ni[date];save({income:ni})}
    else{var ne={...entries};ne[date]=(ne[date]||[]).filter(function(x){return x.id!==id});if(!ne[date].length)delete ne[date];save({entries:ne})}
    setTxModal(null);
  }

  // Savings total
  var totalSaved=goals.reduce(function(s,g){return s+(g.saved||0)},0);

  // Savings streak: consecutive months with positive net
  var savStreak=0;
  (function(){var now3=new Date();for(var si=0;si<24;si++){var sm=new Date(now3.getFullYear(),now3.getMonth()-si,1);var sKey=sm.getFullYear()+"-"+String(sm.getMonth()+1).padStart(2,"0");var sIn=0,sEx=0;for(var sk in incomeData){if(sk.substring(0,7)===sKey)(incomeData[sk]||[]).forEach(function(ii){sIn+=ii.amount})}for(var sk2 in entries){if(sk2.substring(0,7)===sKey)(entries[sk2]||[]).forEach(function(ee){sEx+=ee.amount})}if(si===0&&sIn===0&&sEx===0)continue;if(sIn>sEx)savStreak++;else return}})();

  return(<div style={{padding:"14px 18px 120px",animation:"fi .2s ease-out"}}>

        <div>
          <div style={{fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:1}}>Likvida medel</div>
          <div style={{fontSize:24,fontWeight:900,color:T.text,fontFamily:"'JetBrains Mono'",lineHeight:1.2}}>{liquidity.toLocaleString("sv")} kr</div>

      </div>

      {/* Likvida medel — kompakt */}

        // 7-day daily net

        for(var i=6;i>=0;i--){var dd=new Date(now2);dd.setDate(dd.getDate()-i);var ds=dk(dd);var ad=allDates[ds];weekData.push({v:ad?((ad.inc||0)-(ad.exp||0)):0})}
        var weekNet=weekData.reduce(function(s,d){return s+d.v},0);
        // 30-day running liquidity
        var mData=[];var runL=baseLiq;var sortedD=Object.keys(allDates).sort();
        var d30=dk(new Date(now2.getTime()-30*86400000));
        sortedD.forEach(function(d){if(d<d30){runL+=(allDates[d].inc||0)-(allDates[d].exp||0)}});
        for(var i=30;i>=0;i--){var dd=new Date(now2);dd.setDate(dd.getDate()-i);var ds=dk(dd);var ad=allDates[ds];if(ad)runL+=(ad.inc||0)-(ad.exp||0);mData.push({v:runL})}
        var mNet=mData.length>1?mData[mData.length-1].v-mData[0].v:0;
        // 12-month net
        var yData=[];
        for(var m=0;m<12;m++){var mK=m+1,mi=0,me=0;
          for(var k in incomeData){var ps=k.split("-");if(Number(ps[0])===now2.getFullYear()&&Number(ps[1])===mK)(incomeData[k]||[]).forEach(function(i){mi+=i.amount})}
          for(var k in entries){var ps=k.split("-");if(Number(ps[0])===now2.getFullYear()&&Number(ps[1])===mK)(entries[k]||[]).forEach(function(e){me+=e.amount})}
          yData.push({v:mi-me})}
        var yNet=yData.reduce(function(s,d){return s+d.v},0);
        // Sparkline

              <div style={{display:"flex",justifyContent:"space-between",fontSize:8,marginBottom:3}}>
                <span style={{color:T.subtle}}>Resultat</span>
                <span style={{fontFamily:"'JetBrains Mono'",fontWeight:700,color:fundPL>=0?T.success:T.danger}}>{fundPL>=0?"+":""}{fundPL.toLocaleString("sv")} kr</span>
              </div>
              <div style={{display:"flex",gap:2,flexWrap:"wrap"}}>
                {rets.slice(-6).map(function(r,i){return <span key={i} style={{fontSize:7,padding:"1px 4px",borderRadius:3,background:r.pct>=0?T.success+"15":T.danger+"15",color:r.pct>=0?T.success:T.danger,fontFamily:"'JetBrains Mono'",fontWeight:600}}>{r.month.slice(5)} {r.pct>=0?"+":""}{r.pct}%</span>})}
              </div>
            </div>}
            {/* Log month button */}
            <button onClick={function(){var mo=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");var existing=rets.find(function(r){return r.month===mo});var p=prompt("Avkastning denna månad (%) "+(existing?"[uppdatera "+existing.pct+"%]":"")+":",existing?existing.pct:"");if(p!==null&&!isNaN(p)){var nr=existing?rets.map(function(r){return r.month===mo?{...r,pct:Number(p)}:r}):rets.concat([{month:mo,pct:Number(p)}]);save({savings:{goals:goals.map(function(x){return x.id===g.id?{...x,monthlyReturns:nr}:x})}})}}} style={{marginTop:4,padding:"4px 10px",borderRadius:5,border:"1px solid "+T.accent2+"44",background:T.accent2+"08",color:T.accent2,fontSize:9,fontWeight:700,cursor:"pointer"}}>Logga %</button>
          </div>}

          {/* Save button */}
          <button onClick={function(){var v=prompt("Spara till "+g.name+" (kr):");if(v&&!isNaN(v)){var amt=Number(v);save({savings:{goals:goals.map(function(x){return x.id===g.id?{...x,saved:(x.saved||0)+amt}:x})},liquidity:baseLiq-amt})}}} style={{marginTop:6,padding:"5px 12px",borderRadius:6,border:"1px solid "+cc+"44",background:cc+"08",color:cc,fontSize:10,fontWeight:700,cursor:"pointer"}}>Spara →</button>
        </div>
      })}

      {/* New goal form */}
      {newGoal?<div style={{background:T.card,border:"1px solid "+T.accent+"44",borderRadius:12,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:800,marginBottom:10}}>Nytt sparmål</div>
        {/* Type picker */}
        <div style={{display:"flex",gap:4,marginBottom:10}}>
          {[{k:"standard",l:"Vanligt",i:"📦",d:"Buffert, semester"},{k:"interest",l:"Fast ränta",i:"📈",d:"USDT, sparkonto"},{k:"fund",l:"Fond / Guld",i:"💎",d:"Variabel avkastning"}].map(function(t){return <div key={t.k} onClick={function(){setNewGoal({...newGoal,type:t.k})}} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"1px solid "+(newGoal.type===t.k?T.accent:T.border),background:newGoal.type===t.k?T.accent+"15":"transparent",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:16}}>{t.i}</div>
            <div style={{fontSize:9,fontWeight:700,color:newGoal.type===t.k?T.accent:T.text}}>{t.l}</div>
            <div style={{fontSize:7,color:T.subtle}}>{t.d}</div>
          </div>})}
        </div>
        {/* Name */}
        <input value={newGoal.name||""} onChange={function(e){setNewGoal({...newGoal,name:e.target.value})}} placeholder="Namn" style={{width:"100%",padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:12,fontWeight:600,marginBottom:6,outline:"none",boxSizing:"border-box"}}/>
        {/* Target — for standard */}
        {newGoal.type==="standard"&&<input value={newGoal.target||""} onChange={function(e){setNewGoal({...newGoal,target:e.target.value})}} placeholder="Mål (0 = inget tak)" type="number" inputMode="numeric" style={{width:"100%",padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:12,fontFamily:"'JetBrains Mono'",marginBottom:6,outline:"none",boxSizing:"border-box"}}/>}
        {/* Monthly deposit — for interest & fund */}
        {(newGoal.type==="interest"||newGoal.type==="fund")&&<input value={newGoal.monthlyDeposit||""} onChange={function(e){setNewGoal({...newGoal,monthlyDeposit:e.target.value})}} placeholder="Månadsinsättning (kr)" type="number" inputMode="numeric" style={{width:"100%",padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:12,fontFamily:"'JetBrains Mono'",marginBottom:6,outline:"none",boxSizing:"border-box"}}/>}
        {/* Interest rate — for interest */}
        {newGoal.type==="interest"&&<input value={newGoal.interestRate||""} onChange={function(e){setNewGoal({...newGoal,interestRate:e.target.value})}} placeholder="Årsränta (%)" type="number" inputMode="decimal" style={{width:"100%",padding:10,borderRadius:8,border:"1px solid "+T.border,background:T.surface,color:T.text,fontSize:12,fontFamily:"'JetBrains Mono'",marginBottom:6,outline:"none",boxSizing:"border-box"}}/>}
        {/* Buttons */}
        <div style={{display:"flex",gap:6,marginTop:4}}>
          <button onClick={function(){setNewGoal(null)}} style={{flex:1,padding:9,borderRadius:8,border:"1px solid "+T.border,background:"transparent",color:T.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>Avbryt</button>
          <button onClick={function(){if(!newGoal.name)return;var g={id:uid(),name:newGoal.name,type:newGoal.type,saved:0,deposits:[]};if(newGoal.type==="standard"){g.target=Number(newGoal.target)||0}else if(newGoal.type==="interest"){g.monthlyDeposit=Number(newGoal.monthlyDeposit)||0;g.interestRate=Number(newGoal.interestRate)||0;g.target=0}else if(newGoal.type==="fund"){g.monthlyDeposit=Number(newGoal.monthlyDeposit)||0;g.monthlyReturns=[];g.target=0}save({savings:{goals:goals.concat([g])}});setNewGoal(null)}} style={{flex:2,padding:9,borderRadius:8,border:"none",background:T.accent,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",opacity:newGoal.name?"1":"0.4"}}>Skapa</button>
        </div>
      </div>
      :<button onClick={function(){setNewGoal({type:"standard",name:"",target:""})}} style={{width:"100%",padding:10,borderRadius:10,border:"1px dashed "+T.accent,background:T.accent+"05",color:T.accent,fontSize:12,fontWeight:700,cursor:"pointer",marginBottom:20}}>+ Nytt sparmål</button>}

      {/* Lager / Investeringar */}
      <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>Lager & Investeringar</div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <div style={{flex:1,background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px",textAlign:"center"}}>
          <div style={{fontSize:8,color:T.muted}}>Investerat</div>
          <div style={{fontSize:14,fontWeight:800,fontFamily:"'JetBrains Mono'",color:T.warning}}>{investments.filter(function(i){return i.status==="active"}).reduce(function(s,i){return s+i.amount},0).toLocaleString("sv")}</div>
        </div>
        <div style={{flex:1,background:T.card,border:"1px solid "+T.border,borderRadius:8,padding:"8px",textAlign:"center"}}>
          <div style={{fontSize:8,color:T.muted}}>Sålt totalt</div>
          <div style={{fontSize:14,fontWeight:800,fontFamily:"'JetBrains Mono'",color:T.success}}>{investments.filter(function(i){return i.status==="active"}).reduce(function(s,i){return s+((i.sales||[]).reduce(function(ss,sl){return ss+sl.amount},0))},0).toLocaleString("sv")}</div>
        </div>
      </div>

      {investments.filter(function(i){return i.status==="active"}).map(function(inv){
        var sales=inv.sales||[];
        var totalSold=sales.reduce(function(s,sl){return s+sl.amount},0);
        var profit=totalSold-inv.amount;
        var expected=inv.expectedValue||inv.amount;
        var soldPct=expected>0?Math.round(totalSold/expected*100):0;
        var breakEvenPct=inv.amount>0?Math.round(totalSold/inv.amount*100):0;
        var atBreakEven=totalSold>=inv.amount;
        return <div key={inv.id} style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <div style={{fontSize:13,fontWeight:700}}>{inv.name}</div>
            <div style={{fontSize:9,color:T.subtle}}>{inv.date}</div>
          </div>
          {/* Progress bar */}
          <div style={{marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:T.muted,marginBottom:2}}>
              <span>Sålt {soldPct}%</span>
              <span style={{color:atBreakEven?T.success:T.warning}}>{atBreakEven?"Break-even nådd":"BE vid "+Math.round(inv.amount/expected*100)+"%"}</span>
            </div>
            <div style={{height:5,borderRadius:3,background:T.surface,overflow:"hidden",position:"relative"}}>
              <div style={{position:"absolute",left:0,top:0,height:"100%",width:soldPct+"%",borderRadius:3,background:atBreakEven?T.success:T.accent2}}/>
              {!atBreakEven&&<div style={{position:"absolute",left:Math.round(inv.amount/expected*100)+"%",top:0,width:1,height:"100%",background:T.warning}}/>}
            </div>
          </div>
          {/* Stats row */}
          <div style={{display:"flex",gap:4,marginBottom:6}}>
            {[{l:"Inköp",v:inv.amount,c:T.muted},{l:"Sålt",v:totalSold,c:T.accent2},{l:"Vinst",v:profit,c:profit>=0?T.success:T.danger}].map(function(s,i){return <div key={i} style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:7,color:T.subtle}}>{s.l}</div>
              <div style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'",color:s.c}}>{s.v>=0&&s.l==="Vinst"?"+":""}{s.v.toLocaleString("sv")}</div>
            </div>})}
          </div>
          {/* Sales log */}
          {sales.length>0&&<div style={{marginBottom:6}}>
            {sales.slice().reverse().slice(0,5).map(function(sl,i){return <div key={sl.id||i} style={{display:"flex",justifyContent:"space-between",padding:"3px 6px",fontSize:9,borderBottom:"1px solid "+T.border+"33"}}>
              <span style={{color:T.subtle}}>{sl.date}</span>
              <span style={{color:T.success,fontFamily:"'JetBrains Mono'",fontWeight:600}}>+{sl.amount.toLocaleString("sv")} kr</span>
              <button onClick={function(){save({investments:investments.map(function(x){return x.id===inv.id?Object.assign({},x,{sales:sales.filter(function(s){return s.id!==sl.id})}):x})})}} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Ic n="x" s={9} c={T.subtle}/></button>
            </div>})}
          </div>}
          {/* Action buttons */}
          <div style={{display:"flex",gap:3}}>
            <button onClick={function(){var v=prompt("Försäljning (kr):");if(v&&!isNaN(v)&&Number(v)>0){var amt=Number(v);var ns=sales.concat([{id:uid(),date:dk(new Date()),amount:amt}]);save({investments:investments.map(function(x){return x.id===inv.id?Object.assign({},x,{sales:ns}):x}),liquidity:baseLiq+amt})}}} style={{flex:1,padding:"6px 0",borderRadius:5,border:"1px solid "+T.success+"44",background:T.success+"08",color:T.success,fontSize:9,fontWeight:700,cursor:"pointer"}}>+ Försäljning</button>
            <button onClick={function(){var v=prompt("Förväntat värde (kr):",inv.expectedValue||inv.amount);if(v!==null&&!isNaN(v))save({investments:investments.map(function(x){return x.id===inv.id?Object.assign({},x,{expectedValue:Number(v)}):x})})}} style={{padding:"6px 8px",borderRadius:5,border:"1px solid "+T.border,background:"transparent",color:T.muted,fontSize:9,cursor:"pointer"}}><Ic n="edit" s={9} c={T.muted}/></button>
            <button onClick={function(){save({investments:investments.filter(function(x){return x.id!==inv.id})})}} style={{padding:"6px 8px",borderRadius:5,border:"1px solid "+T.danger+"33",background:"transparent",color:T.danger,fontSize:9,cursor:"pointer"}}><Ic n="trash" s={9} c={T.danger}/></button>
          </div>
        </div>
      })}

      {/* Avslutade */}
      {investments.filter(function(i){return i.status==="closed"}).length>0&&<div style={{marginTop:10}}>
        <div style={{fontSize:10,fontWeight:700,color:T.subtle,marginBottom:4}}>Avslutade</div>
        {investments.filter(function(i){return i.status==="closed"}).map(function(inv){
          var profit=(inv.actualReturn||0)-inv.amount;
          return <div key={inv.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 10px",background:T.card,border:"1px solid "+T.border,borderRadius:6,marginBottom:2,opacity:0.5}}>
            <span style={{fontSize:11}}>{inv.name}</span>
            <span style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'",color:profit>=0?T.success:T.danger}}>{profit>=0?"+":""}{profit.toLocaleString("sv")} kr</span>
          </div>
        })}
      </div>}

      <button onClick={function(){var n=prompt("Namn:");if(!n)return;var a=prompt("Inköpspris (kr):");if(!a||isNaN(a))return;var ev=prompt("Förväntat försäljningsvärde:");if(ev===null)return;var amt=Number(a);save({investments:investments.concat([{id:uid(),name:n,amount:amt,expectedValue:Number(ev)||amt,date:dk(new Date()),status:"active",sales:[]}]),liquidity:baseLiq-amt})}} style={{width:"100%",padding:10,borderRadius:10,border:"1px dashed "+T.warning,background:T.warning+"05",color:T.warning,fontSize:12,fontWeight:700,cursor:"pointer",marginTop:10}}>+ Ny lagerpost</button>
    </div>}
  </div>);
}

function EcoForm({type,onSave,onClose}){
  const[amount,setAmount]=useState("");
  var isInc=type==="inc";
  return(<div style={{display:"flex",gap:4,marginBottom:10,animation:"fi .1s ease-out"}}>
    <input value={amount} onChange={function(e){setAmount(e.target.value)}} placeholder="Belopp" type="number" inputMode="numeric" autoFocus style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid "+(isInc?T.success:T.danger)+"44",background:T.card,color:T.text,fontSize:16,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none"}}/>
    <button onClick={function(){if(amount&&!isNaN(amount)){if(isInc)onSave(Number(amount),"","rorlig");else onSave(Number(amount),"")}}} style={{padding:"12px 20px",borderRadius:10,border:"none",background:isInc?T.success:T.danger,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",opacity:amount?"1":"0.4"}}>Spara</button>
    <button onClick={onClose} style={{padding:"12px",borderRadius:10,border:"1px solid "+T.border,background:"transparent",color:T.subtle,fontSize:11,fontWeight:600,cursor:"pointer"}}>✕</button>
  </div>);
}


function App(){
  const[items,setItems]=useState(null);
  const[checks,setChecks]=useState({});
  const[ecoData,setEcoData]=useState(DEFAULT_ECO);
  const[calData,setCalData]=useState({events:[],tasks:[]});
  const[loading,setLoading]=useState(true);
  const[selDate,setSelDate]=useState(new Date());
  const[modal,setModal]=useState(null);
  const[tab,setTab]=useState("today");
  const[ouraCache,setOuraCache]=useState(null);
  const[trackerData,setTrackerData]=useState(DEFAULT_TRACKER);
  const[pepConfig,setPepConfig]=useState(DEFAULT_PEPTIDE_CONFIG);
  const skipRef=useRef(false);

  useEffect(()=>{(async()=>{try{
    var r1=await sb.from('health_data').select('data').eq('id','config').single();
    if(r1.data&&r1.data.data&&r1.data.data.items)setItems(r1.data.data.items);
    else{setItems(DEFAULT_ITEMS);await sb.from('health_data').upsert({id:'config',data:{items:DEFAULT_ITEMS},updated_at:new Date().toISOString()})}
    var r2=await sb.from('health_data').select('data').eq('id','checks').single();
    if(r2.data&&r2.data.data)setChecks(r2.data.data);
    else{setChecks({});await sb.from('health_data').upsert({id:'checks',data:{},updated_at:new Date().toISOString()})}
    var r3=await sb.from('health_data').select('data').eq('id','economy').single();
    if(r3.data&&r3.data.data)setEcoData(r3.data.data);
    else{await sb.from('health_data').upsert({id:'economy',data:DEFAULT_ECO,updated_at:new Date().toISOString()})}
    var r4=await sb.from('health_data').select('data').eq('id','calendar').single();
    if(r4.data&&r4.data.data)setCalData(r4.data.data);
    else{await sb.from('health_data').upsert({id:'calendar',data:{events:[],tasks:[],recurring:[]},updated_at:new Date().toISOString()})}
    var r5=await sb.from('health_data').select('data').eq('id','oura').single();
    if(r5.data&&r5.data.data&&r5.data.data.cached)setOuraCache(r5.data.data.cached);
    var r6=await sb.from('health_data').select('data').eq('id','tracker').single();
    if(r6.data&&r6.data.data)setTrackerData(r6.data.data);
    else{await sb.from('health_data').upsert({id:'tracker',data:DEFAULT_TRACKER,updated_at:new Date().toISOString()})}
    var r7=await sb.from('health_data').select('data').eq('id','peptide_config').single();
    if(r7.data&&r7.data.data)setPepConfig(r7.data.data);
    else{await sb.from('health_data').upsert({id:'peptide_config',data:DEFAULT_PEPTIDE_CONFIG,updated_at:new Date().toISOString()})}
  }catch(e){setItems(DEFAULT_ITEMS);setChecks({})}setLoading(false)})()},[]);

  useEffect(()=>{try{var ch=sb.channel('health-sync').on('postgres_changes',{event:'*',schema:'public',table:'health_data'},payload=>{if(!skipRef.current&&payload.new){if(payload.new.id==='config'&&payload.new.data&&payload.new.data.items)setItems(payload.new.data.items);if(payload.new.id==='checks'&&payload.new.data)setChecks(payload.new.data);if(payload.new.id==='economy'&&payload.new.data)setEcoData(payload.new.data);if(payload.new.id==='calendar'&&payload.new.data)setCalData(payload.new.data);if(payload.new.id==='oura'&&payload.new.data&&payload.new.data.cached)setOuraCache(payload.new.data.cached);if(payload.new.id==='tracker'&&payload.new.data)setTrackerData(payload.new.data);if(payload.new.id==='peptide_config'&&payload.new.data)setPepConfig(payload.new.data)}skipRef.current=false}).subscribe();return()=>sb.removeChannel(ch)}catch(e){console.warn('Realtime disabled:',e)}},[]);

  const saveItems=useCallback(async(ni)=>{setItems(ni);skipRef.current=true;try{await sb.from('health_data').upsert({id:'config',data:{items:ni},updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveChecks=useCallback(async(nc)=>{setChecks(nc);skipRef.current=true;try{await sb.from('health_data').upsert({id:'checks',data:nc,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveEco=useCallback(async(ne)=>{setEcoData(ne);skipRef.current=true;try{await sb.from('health_data').upsert({id:'economy',data:ne,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveCal=useCallback(async(nc)=>{setCalData(nc);skipRef.current=true;try{await sb.from('health_data').upsert({id:'calendar',data:nc,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const saveTracker=useCallback(async(nt)=>{setTrackerData(nt);skipRef.current=true;try{await sb.from('health_data').upsert({id:'tracker',data:nt,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);
  const savePepConfig=useCallback(async(np)=>{setPepConfig(np);skipRef.current=true;try{await sb.from('health_data').upsert({id:'peptide_config',data:np,updated_at:new Date().toISOString()})}catch(e){console.error(e)}},[]);

  function toggleCheck(id){var nc={...checks},d=dk(selDate);if(!nc[d])nc[d]={};nc[d][id]=!nc[d][id];if(!nc[d][id])delete nc[d][id];saveChecks(nc)}
  function toggleAllSlot(ids,check){var nc={...checks},d=dk(selDate);if(!nc[d])nc[d]={};ids.forEach(function(id){if(check)nc[d][id]=true;else delete nc[d][id]});saveChecks(nc)}
  function updateItem(item){saveItems(items.map(i=>i.id===item.id?item:i));setModal(null)}
  function deleteItem(id){saveItems(items.filter(i=>i.id!==id));setModal(null)}
  function addItem(item){saveItems([...items,item]);setModal(null)}

  if(loading||!items)return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",color:T.muted}}>Laddar...</div>;

  return(<div style={{minHeight:"100vh",background:T.bg,color:T.text,maxWidth:480,margin:"0 auto",paddingTop:"env(safe-area-inset-top, 0px)"}}>
    {tab==="today"&&<TabToday items={items} checks={checks} selDate={selDate} setSelDate={setSelDate} toggleCheck={toggleCheck} toggleAllSlot={toggleAllSlot} ouraCache={ouraCache} calData={calData} pepConfig={pepConfig} trackerData={trackerData}/>}
    {tab==="calendar"&&<TabCalendar calData={calData} saveCal={saveCal} ouraCache={ouraCache}/>}
    {tab==="info"&&<TabInfo items={items} saveItems={saveItems} setModal={setModal} trackerData={trackerData} saveTracker={saveTracker} checks={checks} ouraCache={ouraCache} pepConfig={pepConfig} savePepConfig={savePepConfig}/>}
    {tab==="economy"&&<TabEconomy ecoData={ecoData} saveEco={saveEco}/>}

    <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",justifyContent:"space-around",padding:"8px 0 calc(14px + env(safe-area-inset-bottom, 0px))",borderTop:"1px solid "+T.border,background:"rgba(10,10,15,0.97)",backdropFilter:"blur(20px)",zIndex:50}}>
      {[{k:"today",n:"check",l:"Idag"},{k:"calendar",n:"calendar",l:"Kalender"},{k:"info",n:"info",l:"Info"},{k:"economy",n:"bar",l:"Ekonomi"}].map(n=>
        <button key={n.k} onClick={()=>setTab(n.k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",color:tab===n.k?T.accent:T.subtle,fontSize:9,fontWeight:600}}><Ic n={n.n} s={18} c={tab===n.k?T.accent:T.subtle}/>{n.l}</button>
      )}
    </nav>

    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={()=>setModal(null)}>
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:22,width:"100%",maxWidth:380,maxHeight:"80vh",overflowY:"auto",animation:"fi .1s ease-out"}} onClick={e=>e.stopPropagation()}>
        {modal==="add"&&<AddForm onSave={addItem} onClose={()=>setModal(null)}/>}
        {(modal&&modal.type)==="edit"&&<EditForm item={modal.item} onSave={updateItem} onDelete={deleteItem} onClose={()=>setModal(null)}/>}
      </div>
    </div>}
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
